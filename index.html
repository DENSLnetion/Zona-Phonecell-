                                                    return (
                                                        <tr key={item.id} onClick={() => isSelectionMode ? toggleSelection(item.id) : setSelectedItem(item)}
                                                            className={`border-t border-[var(--md-sys-color-outline-variant)] cursor-pointer transition-colors ${selected ? 'bg-[var(--md-sys-color-secondary-container)]' : 'hover:bg-[var(--md-sys-color-surface-container)]'}`}>
                                                            <td className="px-5 py-3">
                                                                <div className="w-9 h-9 rounded-xl bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)] flex items-center justify-center">
                                                                    <span className="material-symbols-rounded text-[18px]">{ICON_MAP[item.jenis] || 'build'}</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-3 py-3 font-bold text-[var(--md-sys-color-on-surface)] max-w-[260px] truncate">
                                                                {item.nama || 'Tanpa Nama'}
                                                                {(item.jumlah || 1) > 1 && <span className="ml-1.5 text-[11px] font-extrabold text-[var(--md-sys-color-on-surface-variant)]">x{item.jumlah}</span>}
                                                            </td>
                                                            <td className="px-3 py-3 text-[var(--md-sys-color-on-surface-variant)] font-medium truncate max-w-[160px]">{item.jenis === 'Belanja' || item.jenis === 'Rejeki' ? item.jenis : (item.pelanggan || 'Hamba Allah')}</td>
                                                            <td className="px-3 py-3 text-[var(--md-sys-color-on-surface-variant)] font-medium whitespace-nowrap">{formatDateShort(item.tanggal)}</td>
                                                            <td className="px-3 py-3 text-right font-bold text-[var(--md-sys-color-on-surface-variant)] whitespace-nowrap">Rp{formatRupiah(item.modal || 0)}</td>
                                                            <td className="px-3 py-3 text-right font-bold text-[var(--md-sys-color-on-surface-variant)] whitespace-nowrap">Rp{formatRupiah(item.jual || 0)}</td>
                                                            <td className={`px-3 py-3 text-right font-extrabold whitespace-nowrap ${isNombok ? 'text-[var(--md-sys-color-error)]' : isRejeki ? 'text-[var(--md-sys-color-success)]' : 'text-[var(--md-sys-color-primary)]'}`}>{formatModeUang(item.laba, settings.gwBanget, 'list')}</td>
                                                            <td className="px-3 py-3 text-center"><span className={`text-[10px] px-2.5 py-1 rounded-full font-extrabold uppercase tracking-wide ${statusColor}`}>{item.status || 'Jalan'}</span></td>
                                                            <td className="px-5 py-3 text-right"><span className="material-symbols-rounded text-[18px] text-[var(--md-sys-color-on-surface-variant)]">chevron_right</span></td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 4: ANALISIS (TAMBAH DATA TABLE LEADERBOARD DI PC) ---
        const TabAnalisis = () => {
            const { transactions, settings } = useContext(AppContext);
            const refLine = useRef(null); const refPie = useRef(null); const refBar = useRef(null);
            const inst = useRef({ line: null, pie: null, bar: null });
            const [sheetInfo, setSheetInfo] = useState(null);

            const getColors = useCallback(() => {
                const style = getComputedStyle(document.body);
                return {
                    primary: style.getPropertyValue('--md-sys-color-primary').trim(), tertiary: style.getPropertyValue('--md-sys-color-tertiary').trim(),
                    error: style.getPropertyValue('--md-sys-color-error').trim(), secondary: style.getPropertyValue('--md-sys-color-secondary').trim(),
                    success: style.getPropertyValue('--md-sys-color-success').trim(),
                    text: style.getPropertyValue('--md-sys-color-on-surface-variant').trim(), grid: style.getPropertyValue('--md-sys-color-outline-variant').trim(),
                    bg: style.getPropertyValue('--md-sys-color-surface-container-low').trim()
                };
            }, [settings.theme]);

            const getChartData = () => {
                let labels = []; let dataPoints = [];
                const format = settings.periodFormat;
                
                if (format === 'Hari') {
                    labels = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d.toLocaleDateString('id-ID', { weekday:'short'}); });
                    dataPoints = [...Array(7)].map((_, i) => {
                        const d = new Date(); d.setDate(d.getDate() - (6 - i)); const targetDate = d.toISOString().split('T')[0];
                        return transactions.filter(t => t?.tanggal?.startsWith(targetDate) && t.status === 'Beres').reduce((s,i) => s + (i.laba || 0), 0);
                    });
                } else if (format === 'Minggu') {
                    for (let i = 3; i >= 0; i--) { labels.push(`M-${i === 0 ? 'Ini' : i}`); const wData = filterByPeriod(transactions, 'Minggu', -i); dataPoints.push(wData.filter(t => t.status === 'Beres').reduce((s,x) => s + (x.laba || 0), 0)); }
                } else {
                    for (let i = 5; i >= 0; i--) { const d = new Date(); d.setMonth(d.getMonth() - i); labels.push(d.toLocaleDateString('id-ID', { month: 'short' })); const mData = filterByPeriod(transactions, 'Bulan', -i); dataPoints.push(mData.filter(t => t.status === 'Beres').reduce((s,x) => s + (x.laba || 0), 0)); }
                }
                return { labels, dataPoints };
            };

            useEffect(() => {
                if (transactions.length === 0) return;
                if (typeof Chart === 'undefined') return; 
                
                const c = getColors(); 
                Object.values(inst.current).forEach(chart => chart && chart.destroy());
                
                Chart.defaults.font.family = "'Readex Pro', sans-serif"; Chart.defaults.font.weight = 'bold'; Chart.defaults.color = c.text;
                const { labels: lineLabels, dataPoints: lineData } = getChartData();
                
                if (refLine.current) {
                    inst.current.line = new Chart(refLine.current.getContext('2d'), { type: 'line', data: { labels: lineLabels, datasets: [{ label: 'Cuan', data: lineData, borderColor: c.primary, backgroundColor: `${c.primary}30`, fill: true, tension: 0.4, pointBackgroundColor: c.bg, pointBorderColor: c.primary, pointBorderWidth: 4, pointRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: c.grid, borderDash: [5,5] }, ticks: { callback: v => `${v/1000}k` } } } } });
                }

                const counts = ['Servis', 'Sparepart', 'Aksesoris', 'Top Up', 'Belanja', 'Rejeki'].map(j => transactions.filter(t => t.jenis === j && t.status === 'Beres').length);
                if (refPie.current) {
                    inst.current.pie = new Chart(refPie.current.getContext('2d'), { type: 'doughnut', data: { labels: ['Servis', 'Spare', 'Aks', 'Top Up', 'Belanja', 'Rejeki'], datasets: [{ data: counts, backgroundColor: [c.primary, c.tertiary, c.error, c.secondary, '#e74c3c', c.success], borderColor: c.bg, borderWidth: 4, hoverOffset: 8 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { padding: 15 } } } } });
                }

                const itemsMap = {}; transactions.filter(t=>t.status==='Beres' && (t.jenis==='Sparepart' || t.jenis==='Aksesoris')).forEach(t => { itemsMap[t.nama || 'Tanpa Nama'] = (itemsMap[t.nama || 'Tanpa Nama'] || 0) + (t.jumlah || 1); }); const topItems = Object.entries(itemsMap).sort((a,b)=>b[1]-a[1]).slice(0, 4);
                if(topItems.length > 0 && refBar.current) { 
                    inst.current.bar = new Chart(refBar.current.getContext('2d'), { type: 'bar', data: { labels: topItems.map(i=>i[0]), datasets: [{ data: topItems.map(i=>i[1]), backgroundColor: c.tertiary, borderRadius: 8 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x: { display: false }, y: { grid: {display:false} } } } }); 
                }
                
                return () => Object.values(inst.current).forEach(chart => chart && chart.destroy());
            }, [transactions, settings.theme, settings.periodFormat, getColors]);

            const totalSelesai = transactions.filter(t => t.status === 'Beres');
            const totalOmset = totalSelesai.filter(t => t.jenis !== 'Belanja' && t.jenis !== 'Rejeki').reduce((s,i) => s + ((i.jual||0) * (i.jumlah||1)), 0);
            const totalLaba = totalSelesai.reduce((s,i) => s + (i.laba||0), 0);
            const margin = totalOmset > 0 ? ((totalLaba / totalOmset) * 100).toFixed(1) : 0;
            
            const groupedByMonth = useMemo(() => {
                const groups = {};
                totalSelesai.forEach(t => {
                    if(!t.tanggal) return;
                    const d = new Date(t.tanggal);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    const monthName = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                    if (!groups[key]) groups[key] = { label: monthName, totalOmset: 0, totalLaba: 0, totalModal: 0, count: 0, countServis: 0, countBarang: 0, countTopUp: 0, countBelanja: 0, countRejeki: 0, itemsLaku: 0 };
                    
                    if (t.jenis !== 'Belanja' && t.jenis !== 'Rejeki') {
                        groups[key].totalOmset += ((t.jual||0) * (t.jumlah||1)); 
                        groups[key].totalModal += ((t.modal||0) * (t.jumlah||1));
                    }
                    groups[key].totalLaba += (t.laba||0); 
                    groups[key].count += 1;
                    
                    if(t.jenis === 'Servis') { groups[key].countServis += 1; } 
                    else if (t.jenis === 'Top Up') { groups[key].countTopUp += 1; } 
                    else if (t.jenis === 'Belanja') { groups[key].countBelanja += 1; }
                    else if (t.jenis === 'Rejeki') { groups[key].countRejeki += 1; }
                    else { groups[key].countBarang += 1; groups[key].itemsLaku += (t.jumlah||1); }
                });
                return Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(k => groups[k]); 
            }, [totalSelesai]);

            // Untuk Desktop Leaderboard
            const pelanggans = {};
            totalSelesai.forEach(t => { const n = t.pelanggan.trim() || 'Hamba Allah'; if(n !== 'Hamba Allah' && t.jenis !== 'Belanja' && t.jenis !== 'Rejeki'){ pelanggans[n] = (pelanggans[n] || 0) + (t.laba||0); } });
            const topSpenders = Object.entries(pelanggans).sort((a,b) => b[1]-a[1]).slice(0,5);

            return (
                <div className="p-4 md:p-8 lg:p-12 h-full overflow-y-auto no-scrollbar pb-32 md:pb-12 flex flex-col items-center" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <div className="w-full max-w-3xl lg:max-w-7xl 2xl:max-w-[1600px] space-y-6 md:space-y-8 lg:space-y-10">
                        <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] mb-2 tracking-tight px-2 md:hidden">Ngecek Cuan.</h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 lg:gap-10">
                            
                            {/* KIRI: GRAFIK UTAMA */}
                            <div className="md:col-span-8 space-y-6 md:space-y-8 lg:space-y-10">
                                <div className="grid grid-cols-2 gap-4 md:gap-6 lg:gap-8">
                                    <Ripple onClick={() => setSheetInfo('margin')} className={`text-[var(--md-sys-color-on-primary-container)] p-6 md:p-8 lg:p-10 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl spring-bounce active:scale-95 ${margin < 0 ? 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]' : 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]'}`}>
                                        <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px] md:text-[100px] lg:text-[140px]">percent</span></div>
                                        <p className="text-xs md:text-sm lg:text-base font-extrabold uppercase tracking-widest opacity-80 mb-2">Persentase Untung</p>
                                        <h2 className="text-4xl md:text-5xl lg:text-7xl font-extrabold tracking-tighter">{margin}%</h2>
                                    </Ripple>
                                    <Ripple onClick={() => setSheetInfo('beres')} className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-6 md:p-8 lg:p-10 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl spring-bounce active:scale-95">
                                        <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px] md:text-[100px] lg:text-[140px]">done_all</span></div>
                                        <p className="text-xs md:text-sm lg:text-base font-extrabold uppercase tracking-widest opacity-80 mb-2">Total Data Beres</p>
                                        <h2 className="text-4xl md:text-5xl lg:text-7xl font-extrabold tracking-tighter">{totalSelesai.length} <span className="text-base lg:text-2xl font-bold">Data</span></h2>
                                    </Ripple>
                                </div>

                                <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 md:p-8 lg:p-10 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-extrabold text-lg md:text-xl lg:text-2xl text-[var(--md-sys-color-on-surface)]">Grafik Cuan Bersih ({settings.periodFormat})</h3>
                                        <div className="w-10 h-10 md:w-12 md:h-12 lg:w-16 lg:h-16 rounded-full bg-[var(--md-sys-color-surface-variant)] flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)]"><span className="material-symbols-rounded text-xl md:text-2xl lg:text-3xl">show_chart</span></div>
                                    </div>
                                    <div className="h-[250px] md:h-[350px] lg:h-[450px] relative">{transactions.length > 0 ? <canvas ref={refLine}></canvas> : <p className="text-center mt-24 text-[var(--md-sys-color-on-surface-variant)] font-bold">Sepi amat bos, belom ada data</p>}</div>
                                </div>
                            </div>

                            {/* KANAN: GRAFIK KECIL */}
                            <div className="md:col-span-4 flex flex-col gap-6 md:gap-8 lg:gap-10">
                                <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 md:p-8 lg:p-10 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] flex-1">
                                    <h3 className="font-extrabold text-lg lg:text-xl text-[var(--md-sys-color-on-surface)] mb-6">Sebaran Kategori</h3>
                                    <div className="h-[200px] md:h-[220px] lg:h-[260px] relative">{transactions.length > 0 ? <canvas ref={refPie}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)] font-bold">Belom ada data</p>}</div>
                                </div>

                                <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 md:p-8 lg:p-10 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] flex-1">
                                    <h3 className="font-extrabold text-lg lg:text-xl text-[var(--md-sys-color-on-surface)] mb-6">Barang Paling Laku</h3>
                                    <div className="h-[200px] md:h-[220px] lg:h-[260px] relative">{transactions.filter(t=>t.jenis!=='Servis' && t.jenis!=='Top Up' && t.jenis!=='Belanja' && t.jenis!=='Rejeki' && t.status==='Beres').length > 0 ? <canvas ref={refBar}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)] font-bold">Barang belom ada yang laku nih</p>}</div>
                                </div>
                            </div>
                        </div>

                        {/* TAMBAHAN DESKTOP: LEADERBOARD ROW BAWAH */}
                        <div className="hidden lg:grid grid-cols-2 gap-10 mt-10">
                            <div className="bg-[var(--md-sys-color-surface-container-low)] p-8 rounded-[var(--md-shape-3xl)] border border-[var(--md-sys-color-outline-variant)] shadow-sm">
                                <h3 className="font-extrabold text-2xl text-[var(--md-sys-color-on-surface)] mb-6 flex items-center gap-3"><span className="material-symbols-rounded text-[var(--md-sys-color-primary)]">military_tech</span> Top 5 Sultan Konter</h3>
                                <div className="space-y-4">
                                    {topSpenders.length > 0 ? topSpenders.map((p, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-[var(--md-sys-color-surface-container)] p-4 rounded-xl border border-[var(--md-sys-color-outline-variant)]">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] flex items-center justify-center font-bold">{idx+1}</div>
                                                <span className="font-bold text-lg">{p[0]}</span>
                                            </div>
                                            <span className="font-extrabold text-[var(--md-sys-color-primary)]">Kasih Untung Rp{formatRupiah(p[1])}</span>
                                        </div>
                                    )) : <p className="text-sm opacity-60">Belum ada catatan detail pelanggan dari jualan.</p>}
                                </div>
                            </div>

                            <div className="bg-[var(--md-sys-color-surface-container-low)] p-8 rounded-[var(--md-shape-3xl)] border border-[var(--md-sys-color-outline-variant)] shadow-sm">
                                <h3 className="font-extrabold text-2xl text-[var(--md-sys-color-on-surface)] mb-6 flex items-center gap-3"><span className="material-symbols-rounded text-[var(--md-sys-color-secondary)]">analytics</span> Rata-Rata Per Performa</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center bg-[var(--md-sys-color-surface-container)] p-4 rounded-xl border border-[var(--md-sys-color-outline-variant)]">
                                        <span className="font-bold text-lg">Untung Bersih / Data</span>
                                        <span className={`font-extrabold text-xl ${totalLaba < 0 ? 'text-[var(--md-sys-color-error)]' : 'text-[var(--md-sys-color-on-surface)]'}`}>Rp{totalSelesai.length > 0 ? formatRupiah(Math.round(totalLaba/totalSelesai.length)) : 0}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-[var(--md-sys-color-surface-container)] p-4 rounded-xl border border-[var(--md-sys-color-outline-variant)]">
                                        <span className="font-bold text-lg">Persentase Sukses</span>
                                        <span className="font-extrabold text-xl text-[var(--md-sys-color-success)]">{transactions.length > 0 ? ((totalSelesai.length / transactions.length)*100).toFixed(0) : 0}%</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-[var(--md-sys-color-surface-container)] p-4 rounded-xl border border-[var(--md-sys-color-outline-variant)]">
                                        <span className="font-bold text-lg">Barang Terjual (Total Pcs)</span>
                                        <span className="font-extrabold text-xl text-[var(--md-sys-color-on-surface)]">{totalSelesai.filter(t=>t.jenis!=='Servis'&&t.jenis!=='Top Up'&&t.jenis!=='Belanja'&&t.jenis!=='Rejeki').reduce((s,i)=>s+(i.jumlah||1),0)} Pcs</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <BottomSheet isOpen={!!sheetInfo} onClose={() => setSheetInfo(null)} title={sheetInfo === 'margin' ? 'Rincian Persentase' : 'Rincian Data Beres'}>
                            <div className="space-y-4 pt-2">
                                <p className="text-[var(--md-sys-color-on-surface-variant)] font-medium mb-4">{sheetInfo === 'margin' ? 'Rincian detail perputaran duit & persentase margin laba per-bulan bos.' : 'Rekap mendalam hasil data per-bulannya bos.'}</p>
                                {groupedByMonth.length === 0 && (<div className="py-8 text-center text-[var(--md-sys-color-on-surface-variant)] border border-[var(--md-sys-color-outline-variant)] rounded-[var(--md-shape-2xl)]"><span className="material-symbols-rounded text-6xl mb-2 opacity-50">inbox</span><p className="font-bold text-lg">Belom ada data kelar bos</p></div>)}
                                {groupedByMonth.map((grp, idx) => {
                                    const mrg = grp.totalOmset > 0 ? ((grp.totalLaba / grp.totalOmset) * 100).toFixed(1) : 0;
                                    return (
                                        <div key={idx} className="bg-[var(--md-sys-color-surface-container)] p-5 rounded-[var(--md-shape-2xl)] space-y-3 shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                                            <h4 className="font-extrabold text-[var(--md-sys-color-primary)] text-lg mb-2">{grp.label}</h4>
                                            {sheetInfo === 'margin' ? (
                                                <>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Modal Jualan Dikeluarin</span><span className="font-bold text-[14px] text-[var(--md-sys-color-error)]">Rp{formatRupiah(grp.totalModal)}</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Omset Jualan (Kotor)</span><span className="font-bold text-[14px] text-[var(--md-sys-color-success)]">Rp{formatRupiah(grp.totalOmset)}</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Rata² Bersih per Data</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">Rp{formatRupiah(Math.round(grp.totalLaba/grp.count))}</span></div>
                                                    <div className="border-t border-dashed border-[var(--md-sys-color-outline-variant)] pt-3 flex justify-between items-center mt-2">
                                                        <span className="font-bold text-[13px] uppercase tracking-wide">Cuan Bersih Akhir</span>
                                                        <div className="text-right">
                                                            <span className={`block text-xl font-extrabold ${grp.totalLaba < 0 ? 'text-[var(--md-sys-color-error)]' : 'text-[var(--md-sys-color-primary)]'}`}>Rp{formatRupiah(grp.totalLaba)}</span>
                                                            <span className="block text-sm font-bold text-[var(--md-sys-color-on-surface-variant)]">{mrg}% thd Omset</span>
                                                        </div>
                                                    </div>
                                                </>
                                            ) : (
                                                <>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Dari Servis</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">{grp.countServis} Data</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Dari Top Up</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">{grp.countTopUp} Trx</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Dari Jual Barang</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">{grp.countBarang} Data</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-error)]">Pengeluaran (Belanja)</span><span className="font-extrabold text-base text-[var(--md-sys-color-error)]">{grp.countBelanja} Data</span></div>
                                                    <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-success)]">Tambahan (Rejeki)</span><span className="font-extrabold text-base text-[var(--md-sys-color-success)]">{grp.countRejeki} Data</span></div>

        // --- TAB 5: SETING (GRID PC 3 KOLOM) ---
        const TabSeting = () => {

            const [showPasteModal, setShowPasteModal] = useState(false);
            const [pasteText, setPasteText] = useState('');

            const themes = [

                { id: 'purple', color: '#d0bcff' }, { id: 'red', color: '#ffb4ab' }, { id: 'teal', color: '#4fd8eb' }
            ];

            const handleExportFile = async (type) => {
                if (transactions.length === 0) { showSnackbar('Data masih kosong bos, ga ada yang bisa di-export.'); return; }
                const isCSV = type === 'csv'; const dateStr = new Date().getTime(); const fileName = `ZonaPoncell_Export_${dateStr}.${isCSV ? 'csv' : 'json'}`;
                let fileContent = ''; let mimeType = '';
                if (isCSV) { fileContent = jsonToCsv(transactions); mimeType = 'text/csv'; } else { fileContent = JSON.stringify(transactions); mimeType = 'application/json'; }
                const blob = new Blob([fileContent], { type: mimeType });
                
                if (navigator.share && navigator.canShare) {
                    const file = new File([blob], fileName, { type: mimeType });
                    if (navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: `Export Data ${isCSV ? 'Excel/CSV' : 'JSON'}`, text: 'Nih bos datanya.' }); showSnackbar('Mantap, file berhasil dikirim/disimpen 🚀'); return; } catch (err) { if (err.name !== 'AbortError') showSnackbar('Share gagal, nyoba cara download biasa...'); else return; }
                    }
                }
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                showSnackbar(`Sip, Data di-download sbg ${type.toUpperCase()}`);
            };

            const handleRestoreFile = (e) => {
                const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
                reader.onload = (event) => { try { const json = JSON.parse(event.target.result); if(Array.isArray(json)) { setTransactions(json); showSnackbar('Mantap, Data balik lagi'); } } catch(err) { showSnackbar('File ga jelas bos, gagal!'); } };
                reader.readAsText(file); e.target.value = ''; 
            };

            const handleRestorePaste = () => {
                if(!pasteText.trim()) { showSnackbar('Isi dulu woi teksnya!'); return; }
                try { const json = JSON.parse(pasteText); if(Array.isArray(json)) { setTransactions(json); showSnackbar('Cakep! Data berhasil disedot dari teks.'); setPasteText(''); setShowPasteModal(false); } else { showSnackbar('Teksnya bukan format data yang bener bos!'); } } catch(err) { showSnackbar('Teks ga valid / rusak, coba copy ulang file JSON nya.'); }
            };

            const handleClear = () => { if(confirm('WOI PERINGATAN! Ini bakal hapus SEMUA data lo secara permanen. Lanjutin bakar data?')) { setTransactions([]); showSnackbar('BUM! Semua data udah hangus 🔥'); } };

                                    </div>
                                    <div className={`w-14 md:w-16 h-8 md:h-10 rounded-full flex items-center p-1 transition-colors duration-300 ${settings.gwBanget ? 'bg-[var(--md-sys-color-primary)]' : 'bg-[var(--md-sys-color-surface-variant)]'}`}>

                                        <div className="w-12 h-12 rounded-[20px] bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] flex items-center justify-center mr-4 shrink-0"><span className="material-symbols-rounded">upload_file</span></div>

                                    <Ripple className="w-full flex items-center p-3 rounded-[var(--md-shape-2xl)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] transition-colors" onClick={() => setShowPasteModal(true)}>
                                        <div className="w-12 h-12 rounded-[20px] bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)] flex items-center justify-center mr-4 shrink-0"><span className="material-symbols-rounded">content_paste</span></div>

                                    <div className="w-full h-[1px] bg-[var(--md-sys-color-outline-variant)] my-2 opacity-50"></div>

        const DetailSheet = () => {
            const { transactions, setTransactions, showSnackbar, selectedItem: item, setSelectedItem } = useContext(AppContext);
            const onClose = () => setSelectedItem(null);
            if (!item) return null;
            const currentItem = transactions.find(t => t.id === item.id) || item;
            
            const isBelanja = currentItem?.jenis === 'Belanja';
            const isRejeki = currentItem?.jenis === 'Rejeki';
            const isNombok = (currentItem?.laba || 0) < 0;

            const updateStatus = (newStatus) => { setTransactions(prev => prev.map(t => t.id === currentItem.id ? {...t, status: newStatus} : t)); showSnackbar(`Sip, Status diubah ke ${newStatus}`); };
            const handleDelete = () => { if(confirm('Yakin mau buang data ini?')) { setTransactions(prev => prev.filter(t => t.id !== currentItem.id)); showSnackbar('Satu data dibuang'); onClose(); } };

            return (
                <BottomSheet isOpen={!!item} onClose={onClose} title="Detailnya Nih">

                        <div className="text-center bg-[var(--md-sys-color-surface)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] relative overflow-hidden">

            return (
                <div className="px-4 pb-6 pt-2 shrink-0">
                    <div className={`rounded-2xl p-4 ${labaToday < 0 ? 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]' : 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]'}`}>
                        <p className="text-[10px] font-extrabold uppercase tracking-widest opacity-70 mb-1">Cuan Hari Ini</p>
                        <p className="text-lg font-extrabold tracking-tight">{formatModeUang(labaToday, settings.gwBanget, 'cuan')}</p>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const { settings, activeTab, setActiveTab } = useContext(AppContext);
            const containerRef = useRef(null);
            const tabsRef = useRef([]);

            const [isDesktopLayout, setIsDesktopLayout] = useState(() => (typeof window !== 'undefined' ? window.matchMedia('(min-width: 768px)').matches : false));
            useEffect(() => {
                const mq = window.matchMedia('(min-width: 768px)');
                const handler = (e) => setIsDesktopLayout(e.matches);
                if (mq.addEventListener) mq.addEventListener('change', handler); else mq.addListener(handler);
                return () => { if (mq.removeEventListener) mq.removeEventListener('change', handler); else mq.removeListener(handler); };
            }, []);

            const tabsConfig = [
                { id: 'dasbor', icon: 'home', label: 'Beranda' },
                { id: 'catet', icon: 'add_circle', label: 'Catet' },
                { id: 'riwayat', icon: 'history', label: 'Riwayat' },
                { id: 'analisis', icon: 'monitoring', label: 'Ngecek' },
                { id: 'seting', icon: 'tune', label: 'Seting' }
            ];

            const activeIndex = TABS_ORDER.indexOf(activeTab);

            useEffect(() => {
                if (!settings.hasStarted) return;
                tabsRef.current.forEach((el, i) => {
                    if (!el) return;
                    el.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';

                    if (i < activeIndex) {
                        el.style.transform = isDesktopLayout ? 'translate3d(0, -25%, 0) scale(0.95)' : 'translate3d(-25%, 0, 0) scale(0.95)';
                        el.style.opacity = '0';
                        el.style.pointerEvents = 'none';
                    } else if (i === activeIndex) {
                        el.style.transform = 'translate3d(0, 0, 0) scale(1)';
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                    } else {
                        el.style.transform = isDesktopLayout ? 'translate3d(0, 100%, 0) scale(1)' : 'translate3d(100%, 0, 0) scale(1)';
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'none';
                    }
                });
            }, [activeIndex, settings.hasStarted, isDesktopLayout]);

            useEffect(() => {
                if (!settings.hasStarted) return;
                if (isDesktopLayout) return; 
                const container = containerRef.current;
                if (!container) return;

                let startX = 0, startY = 0, startTime = 0;
                let isDragging = false;
                let isScrolling = null; 
                let hScrollEl = null; 
                let hScrollStartLeft = 0;

                const onStart = (e) => {
                    if (e.touches.length > 1) return;

                    const isNativeSlider = e.target && e.target.tagName === 'INPUT' && e.target.type === 'range';
                    const isExempt = isNativeSlider || (e.target.closest && e.target.closest('.no-tab-swipe'));
                    if (isExempt) { isDragging = false; hScrollEl = null; return; }

                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    startTime = Date.now();
                    isDragging = true;
                    isScrolling = null;

                    const candidate = e.target.closest ? e.target.closest('.hscroll-x') : null;
                    hScrollEl = (candidate && candidate.scrollWidth > candidate.clientWidth) ? candidate : null;
                    hScrollStartLeft = hScrollEl ? hScrollEl.scrollLeft : 0;

                    if (!hScrollEl) tabsRef.current.forEach(el => { if (el) el.style.transition = 'none'; });
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    const x = e.touches[0].clientX;
                    const y = e.touches[0].clientY;
                    const deltaX = x - startX;
                    const deltaY = y - startY;

                    if (isScrolling === null) {
                        if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 5) {
                            isScrolling = true;
                        } else if (Math.abs(deltaX) > 5) {
                            isScrolling = false;
                        }
                    }

                    if (isScrolling) return; 

                    if (hScrollEl) {
                        if (isScrolling === false && e.cancelable) e.preventDefault();
                        hScrollEl.scrollLeft = hScrollStartLeft - deltaX;
                        return;
                    }

                    if (isScrolling === false && e.cancelable) e.preventDefault(); 

                    const sw = window.innerWidth;
                    const currentTab = tabsRef.current[activeIndex];
                    const nextTab = tabsRef.current[activeIndex + 1];
                    const prevTab = tabsRef.current[activeIndex - 1];

                    if (deltaX < 0) {
                        if (nextTab) {
                            nextTab.style.transform = `translate3d(${sw + deltaX}px, 0, 0)`;
                            const progress = Math.min(Math.abs(deltaX) / sw, 1);
                            currentTab.style.transform = `translate3d(${deltaX * 0.25}px, 0, 0) scale(${1 - progress * 0.05})`;
                            currentTab.style.opacity = 1 - progress;
                        } else {
                            currentTab.style.transform = `translate3d(${deltaX * 0.2}px, 0, 0)`; 
                        }
                    }
                    else if (deltaX > 0) {
                        if (prevTab) {
                            currentTab.style.transform = `translate3d(${deltaX}px, 0, 0)`;
                            const progress = Math.min(deltaX / sw, 1);
                            prevTab.style.transform = `translate3d(${-sw * 0.25 * (1 - progress)}px, 0, 0) scale(${0.95 + progress * 0.05})`;
                            prevTab.style.opacity = progress;
                        } else {
                            currentTab.style.transform = `translate3d(${deltaX * 0.2}px, 0, 0)`;
                        }
                    }
                };

                const onEnd = (e) => {
                    if (!isDragging) return;
                    isDragging = false;

                    if (hScrollEl) { hScrollEl = null; return; } 

                    if (isScrolling) { triggerReset(); return; }

                    const x = e.changedTouches[0].clientX;
                    const deltaX = x - startX;
                    const sw = window.innerWidth;
                    const velocity = Math.abs(deltaX) / (Date.now() - startTime);

                    const crossedThreshold = Math.abs(deltaX) > sw * 0.3 || velocity > 0.6;

                    if (crossedThreshold) {
                        if (deltaX < 0 && activeIndex < TABS_ORDER.length - 1) {
                            setActiveTab(TABS_ORDER[activeIndex + 1]);
                        } else if (deltaX > 0 && activeIndex > 0) {
                            setActiveTab(TABS_ORDER[activeIndex - 1]);
                        } else {
                            triggerReset();
                        }
                    } else {
                        triggerReset();
                    }
                };

                const triggerReset = () => {
                    tabsRef.current.forEach((el, i) => {
                        if (!el) return;
                        el.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';
                        if (i < activeIndex) { el.style.transform = 'translate3d(-25%, 0, 0) scale(0.95)'; el.style.opacity = '0'; } 
                        else if (i === activeIndex) { el.style.transform = 'translate3d(0, 0, 0) scale(1)'; el.style.opacity = '1'; } 
                        else { el.style.transform = 'translate3d(100%, 0, 0) scale(1)'; el.style.opacity = '1'; }
                    });
                }

                container.addEventListener('touchstart', onStart, { passive: false });
                container.addEventListener('touchmove', onMove, { passive: false });
                container.addEventListener('touchend', onEnd);

                return () => {
                    container.removeEventListener('touchstart', onStart);
                    container.removeEventListener('touchmove', onMove);
                    container.removeEventListener('touchend', onEnd);
                };
            }, [activeIndex, setActiveTab, settings.hasStarted, isDesktopLayout]);


            if (!settings.hasStarted) return <SplashScreen />;

            return (
                <div className="h-[100dvh] w-full mx-auto flex flex-col md:flex-row relative bg-[var(--md-sys-color-background)] overflow-hidden">
                    
                    {/* --- DESKTOP SIDEBAR (KIRI, LEBAR & BERLABEL) --- */}
                    <nav className="hidden md:flex flex-col w-[264px] lg:w-[280px] shrink-0 h-full bg-[var(--md-sys-color-surface-container)] z-50 border-r border-[var(--md-sys-color-outline-variant)]">
                        {/* Brand header */}
                        <div className="flex items-center gap-3 px-6 shrink-0 border-b border-[var(--md-sys-color-outline-variant)]" style={{ height: 'calc(84px + var(--sa-top))', paddingTop: 'var(--sa-top)' }}>
                            <div className="w-11 h-11 rounded-2xl bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] flex items-center justify-center shrink-0 shadow-sm">
                                <span className="material-symbols-rounded text-[24px]">storefront</span>
                            </div>
                            <div className="min-w-0">
                                <h1 className="font-extrabold text-[15px] text-[var(--md-sys-color-on-surface)] leading-tight truncate">Zona Phonecell</h1>
                                <p className="text-[11px] font-bold text-[var(--md-sys-color-on-surface-variant)] tracking-wide uppercase truncate">Padarincang</p>
                            </div>
                        </div>

                        {/* Nav list */}
                        <div className="flex flex-col gap-1.5 px-4 py-6 flex-1 overflow-y-auto no-scrollbar">
                            {tabsConfig.map(t => {
                                const active = activeTab === t.id;
                                return (
                                    <div key={t.id} onClick={() => setActiveTab(t.id)}
                                         className={`flex items-center gap-3.5 px-4 h-[52px] rounded-2xl cursor-pointer relative spring-bounce active:scale-[0.97] ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] shadow-sm' : 'text-[var(--md-sys-color-on-surface-variant)] hover:bg-[var(--md-sys-color-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded text-[22px] shrink-0 ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                        <span className="font-bold text-[14px] tracking-wide truncate">{t.label}</span>
                                        {active && <span className="absolute right-3 w-1.5 h-1.5 rounded-full bg-[var(--md-sys-color-on-secondary-container)]" />}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Mini widget cuan hari ini */}
                        <SidebarFooterStat />
                    </nav>

                    {/* --- AREA KONTEN UTAMA (TOPBAR + KONTEN) --- */}
                    <div className="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
                        <DesktopTopbar activeTab={activeTab} tabsConfig={tabsConfig} setActiveTab={setActiveTab} />
                        <main ref={containerRef} className="flex-1 relative overflow-hidden bg-black touch-none">
                            {TABS_ORDER.map((tabId, index) => (
                                <div 
                                    key={tabId}
                                    ref={el => tabsRef.current[index] = el}
                                    className="absolute inset-0 bg-[var(--md-sys-color-background)] tab-layer"
                                    style={{ zIndex: (index + 1) * 10 }}
                                >
                                    {tabId === 'dasbor' && <TabDasbor />}
                                    {tabId === 'catet' && <TabCatet />}
                                    {tabId === 'riwayat' && <TabRiwayat />}
                                    {tabId === 'analisis' && <TabAnalisis />}
                                    {tabId === 'seting' && <TabSeting />}
                                </div>
                            ))}
                        </main>
                    </div>

                    {/* --- MOBILE BOTTOM NAVIGATION (BAWAH) --- */}
                    <nav className="md:hidden absolute bottom-0 w-full h-[96px] bg-[var(--md-sys-color-surface-container)] flex justify-center z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.5)] transition-all duration-300" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        <div className="w-full flex justify-around items-center px-2 h-full">
                            {tabsConfig.map(t => {
                                const active = activeTab === t.id;
                                return (
                                    <div key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 pb-1 relative group cursor-pointer active:scale-95 spring-bounce">
                                        <div className={`w-14 h-8 rounded-full flex items-center justify-center spring-bounce ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] scale-110 shadow-sm' : 'text-[var(--md-sys-color-on-surface-variant)] scale-100 group-hover:bg-[var(--md-sys-color-surface-variant)]'}`}>
                                            <span className={`material-symbols-rounded text-2xl spring-bounce ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                        </div>
                                        <span className={`text-[12px] font-extrabold mt-1.5 spring-bounce tracking-wide ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>{t.label}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </nav>

                    <DetailSheet />
                    <SnackbarContainer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

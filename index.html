<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zona Poncell</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Base Material You Variables (Default: Blue) */
        :root {
            /* Light Theme */
            --md-sys-color-primary: #0061a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d1e4ff;
            --md-sys-color-on-primary-container: #001d36;
            
            --md-sys-color-secondary: #535f70;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f7;
            --md-sys-color-on-secondary-container: #101c2b;
            
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;
            
            --md-sys-color-background: #fdfcff;
            --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-surface: #fdfcff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #73777f;
            --md-sys-color-outline-variant: #c3c7cf;
        }

        /* Dark Theme Variables */
        .dark-theme {
            --md-sys-color-primary: #9ecaeb;
            --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497d;
            --md-sys-color-on-primary-container: #d1e4ff;
            
            --md-sys-color-secondary: #bbc7db;
            --md-sys-color-on-secondary: #253140;
            --md-sys-color-secondary-container: #3b4858;
            --md-sys-color-on-secondary-container: #d7e3f7;
            
            --md-sys-color-error: #ffb4ab;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a;
            --md-sys-color-on-error-container: #ffb4ab;
            
            --md-sys-color-background: #1a1c1e;
            --md-sys-color-on-background: #e2e2e6;
            --md-sys-color-surface: #1a1c1e;
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-variant: #42474e;
            --md-sys-color-on-surface-variant: #c3c7cf;
            --md-sys-color-outline: #8d9199;
            --md-sys-color-outline-variant: #42474e;
        }

        /* Theme Variations - Green */
        .theme-green {
            --md-sys-color-primary: #146c2e;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #9ff7ae;
            --md-sys-color-on-primary-container: #002108;
            --md-sys-color-secondary: #526350;
            --md-sys-color-secondary-container: #d5e8cf;
            --md-sys-color-on-secondary-container: #101f10;
        }
        .dark-theme.theme-green {
            --md-sys-color-primary: #83da93;
            --md-sys-color-on-primary: #003911;
            --md-sys-color-primary-container: #00531a;
            --md-sys-color-on-primary-container: #9ff7ae;
            --md-sys-color-secondary: #b9ccb4;
            --md-sys-color-secondary-container: #3a4b39;
        }

        /* Theme Variations - Purple */
        .theme-purple {
            --md-sys-color-primary: #6750a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #eaddff;
            --md-sys-color-on-primary-container: #21005d;
            --md-sys-color-secondary: #625b71;
            --md-sys-color-secondary-container: #e8def8;
            --md-sys-color-on-secondary-container: #1d192b;
        }
        .dark-theme.theme-purple {
            --md-sys-color-primary: #d0bcff;
            --md-sys-color-on-primary: #381e72;
            --md-sys-color-primary-container: #4f378b;
            --md-sys-color-on-primary-container: #eaddff;
            --md-sys-color-secondary: #ccc2dc;
            --md-sys-color-secondary-container: #4a4458;
        }

        /* Global Reset & Utility */
        body { 
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        ::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Material Symbols Config */
        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
        }
        .icon-outlined { font-variation-settings: 'FILL' 0; }

        /* Animations */
        .page-enter { animation: slideUpFade 0.3s cubic-bezier(0.2, 0, 0, 1) forwards; }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.4s, opacity 0.4s;
        }
        .ripple:active::after {
            transform: translate(-50%, -50%) scale(2);
            opacity: 0.12;
            transition: 0s;
        }

        /* Material UI Classes */
        .md-surface { background-color: var(--md-sys-color-surface); }
        .md-surface-variant { background-color: var(--md-sys-color-surface-variant); color: var(--md-sys-color-on-surface-variant); }
        .md-primary { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
        .md-primary-container { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .md-text-primary { color: var(--md-sys-color-primary); }
        .md-error-container { background-color: var(--md-sys-color-error-container); color: var(--md-sys-color-on-error-container); }
        
        .md-input {
            width: 100%;
            background-color: transparent;
            color: var(--md-sys-color-on-surface);
            border: none;
            outline: none;
            padding: 16px;
            font-size: 16px;
        }
        .md-input-container {
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 4px 4px 0 0;
            border-bottom: 1px solid var(--md-sys-color-on-surface-variant);
            transition: background-color 0.2s, border-color 0.2s;
            position: relative;
        }
        .md-input-container:focus-within {
            border-bottom: 2px solid var(--md-sys-color-primary);
        }
        .md-input-container.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <div id="root" class="h-full w-full max-w-xl mx-auto flex flex-col relative shadow-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Helper ---
        const formatRupiah = (angkaStr) => {
            if (!angkaStr) return '';
            const number = parseInt(angkaStr.replace(/[^0-9]/g, ''), 10);
            if (isNaN(number)) return '';
            return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(number);
        };
        const getRawNumber = (rpStr) => {
            if (!rpStr) return 0;
            return parseInt(rpStr.replace(/[^0-9]/g, ''), 10) || 0;
        };

        // --- Komponen Input Material ---
        const TextField = ({ label, value, onChange, type = "text", inputMode = "text", disabled = false, isCurrency = false, list }) => {
            const displayValue = isCurrency ? (value ? `Rp ${formatRupiah(value.toString())}` : '') : value;
            
            const handleChange = (e) => {
                if (isCurrency) {
                    const raw = e.target.value.replace(/[^0-9]/g, '');
                    onChange(raw);
                } else {
                    onChange(e.target.value);
                }
            };

            return (
                <div class={`md-input-container mt-2 ${disabled ? 'disabled' : ''}`}>
                    <label class="absolute top-2 left-4 text-[12px] text-[var(--md-sys-color-on-surface-variant)]">{label}</label>
                    <input
                        type={type}
                        inputMode={inputMode}
                        value={displayValue}
                        onChange={handleChange}
                        disabled={disabled}
                        list={list}
                        placeholder=" "
                        class="md-input pt-6 pb-2"
                        autoComplete="off"
                    />
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [transactions, setTransactions] = useState([]);
            const [activeTab, setActiveTab] = useState('input');
            const [isLoaded, setIsLoaded] = useState(false);
            
            // Pengaturan
            const [isDark, setIsDark] = useState(false);
            const [themeColor, setThemeColor] = useState('blue'); // blue, green, purple

            // Load Data & Settings
            useEffect(() => {
                const savedDb = localStorage.getItem('zp_db_v3');
                if (savedDb) setTransactions(JSON.parse(savedDb));
                
                const savedSettings = localStorage.getItem('zp_settings');
                if (savedSettings) {
                    const s = JSON.parse(savedSettings);
                    setIsDark(s.isDark);
                    setThemeColor(s.themeColor);
                }
                setIsLoaded(true);
            }, []);

            // Save Data
            useEffect(() => {
                if (isLoaded) localStorage.setItem('zp_db_v3', JSON.stringify(transactions));
            }, [transactions, isLoaded]);

            // Apply Theme to Body
            useEffect(() => {
                if (!isLoaded) return;
                const body = document.body;
                body.className = 'h-screen flex flex-col overflow-hidden'; // reset
                if (isDark) body.classList.add('dark-theme');
                if (themeColor !== 'blue') body.classList.add(`theme-${themeColor}`);
                
                localStorage.setItem('zp_settings', JSON.stringify({ isDark, themeColor }));
            }, [isDark, themeColor, isLoaded]);

            const itemsDictionary = useMemo(() => [...new Set(transactions.map(t => t.nama))], [transactions]);

            const handleSave = (data) => {
                setTransactions([...transactions, data]);
                setActiveTab('history');
            };

            const handleDelete = (id) => {
                if (confirm('Hapus catatan ini?')) {
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            if (!isLoaded) return null;

            return (
                <>
                    {/* Top App Bar */}
                    <header class="h-16 px-4 flex items-center justify-between md-surface z-10">
                        <h1 class="text-xl font-medium" style={{ color: 'var(--md-sys-color-on-surface)' }}>Zona Poncell</h1>
                        <button onClick={() => setIsDark(!isDark)} class="p-2 rounded-full ripple text-[var(--md-sys-color-on-surface-variant)]">
                            <span class="material-symbols-rounded icon-outlined">{isDark ? 'light_mode' : 'dark_mode'}</span>
                        </button>
                    </header>

                    {/* Content Area */}
                    <main class="flex-1 overflow-y-auto relative page-enter" key={activeTab}>
                        {activeTab === 'input' && <InputTab onSave={handleSave} itemsDict={itemsDictionary} />}
                        {activeTab === 'dash' && <DashTab data={transactions} />}
                        {activeTab === 'history' && <HistoryTab data={transactions} onDelete={handleDelete} />}
                        {activeTab === 'settings' && <SettingsTab 
                            data={transactions} 
                            setRestore={setTransactions}
                            themeColor={themeColor} setThemeColor={setThemeColor} 
                        />}
                    </main>

                    {/* Navigation Bar (Material 3) */}
                    <nav class="md-surface-variant pb-safe pt-2 pb-3 px-2 flex justify-between items-center shadow-[0_-1px_3px_rgba(0,0,0,0.1)] z-20">
                        <NavBtn icon="edit_square" label="Catat" active={activeTab === 'input'} onClick={() => setActiveTab('input')} />
                        <NavBtn icon="bar_chart" label="Laporan" active={activeTab === 'dash'} onClick={() => setActiveTab('dash')} />
                        <NavBtn icon="receipt_long" label="Histori" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        <NavBtn icon="settings" label="Seting" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                    </nav>
                </>
            );
        };

        const InputTab = ({ onSave, itemsDict }) => {
            const [jenis, setJenis] = useState('Servis');
            const [nama, setNama] = useState('');
            const [modalVal, setModalVal] = useState('');
            const [jualVal, setJualVal] = useState('');

            // Reset modal saat pilih servis
            useEffect(() => {
                if (jenis === 'Servis') setModalVal('0');
                else if (modalVal === '0') setModalVal('');
            }, [jenis]);

            const submit = (e) => {
                e.preventDefault();
                if (!nama.trim() || !jualVal) return alert("Lengkapi nama dan harga jual.");
                
                const m = getRawNumber(modalVal);
                const j = getRawNumber(jualVal);
                
                onSave({
                    id: Date.now(),
                    tanggal: new Date().toISOString(),
                    jenis,
                    nama: nama.trim(),
                    modal: m,
                    jual: j,
                    laba: j - m
                });
            };

            return (
                <div class="p-4 pb-20">
                    <form onSubmit={submit} class="space-y-6">
                        {/* Segmented Button (Material 3) */}
                        <div class="flex rounded-full border border-[var(--md-sys-color-outline)] overflow-hidden h-10">
                            {['Servis', 'Sparepart', 'Aksesoris'].map((j, i) => (
                                <button 
                                    type="button" key={j} onClick={() => setJenis(j)}
                                    class={`flex-1 text-sm font-medium transition-colors ripple ${jenis === j ? 'md-primary-container' : 'bg-transparent text-[var(--md-sys-color-on-surface)]'} ${i !== 2 ? 'border-r border-[var(--md-sys-color-outline)]' : ''}`}
                                >
                                    {jenis === j && <span class="material-symbols-rounded text-[16px] mr-1 align-middle">check</span>}
                                    {j}
                                </button>
                            ))}
                        </div>

                        <div class="space-y-2">
                            <TextField label="Nama Barang / Garapan" value={nama} onChange={setNama} list="item-list" />
                            <datalist id="item-list">
                                {itemsDict.map((item, idx) => <option key={idx} value={item} />)}
                            </datalist>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <TextField label="Harga Modal" value={modalVal} onChange={setModalVal} inputMode="numeric" isCurrency={true} disabled={jenis === 'Servis'} />
                            </div>
                            <div class="flex-1">
                                <TextField label="Harga Jual" value={jualVal} onChange={setJualVal} inputMode="numeric" isCurrency={true} />
                            </div>
                        </div>

                        {/* Laba Card */}
                        <div class="md-primary-container p-4 rounded-2xl flex justify-between items-center mt-2">
                            <span class="text-sm font-medium">Estimasi Laba</span>
                            <span class="text-xl font-bold">
                                Rp {formatRupiah((getRawNumber(jualVal) - getRawNumber(modalVal)).toString())}
                            </span>
                        </div>

                        {/* FAB Style Button */}
                        <button type="submit" class="w-full md-primary h-14 rounded-full font-medium text-[16px] shadow-md ripple mt-6 flex items-center justify-center gap-2">
                            <span class="material-symbols-rounded">save</span>
                            Simpan Catatan
                        </button>
                    </form>
                </div>
            );
        };

        const DashTab = ({ data }) => {
            const chartRef = useRef(null);
            const chartInst = useRef(null);

            const tOmset = data.reduce((a, c) => a + c.jual, 0);
            const tModal = data.reduce((a, c) => a + c.modal, 0);
            const tLaba = data.reduce((a, c) => a + c.laba, 0);

            useEffect(() => {
                if (chartInst.current) chartInst.current.destroy();
                if (data.length === 0) return;

                const dates = [...Array(7)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (6 - i));
                    return d.toISOString().split('T')[0];
                });

                const laba = dates.map(date => data.filter(d => d.tanggal.startsWith(date)).reduce((s, i) => s + i.laba, 0));
                const labels = dates.map(d => new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }));

                const ctx = chartRef.current.getContext('2d');
                // Get CSS variable color for chart
                const rootStyle = getComputedStyle(document.body);
                const primaryColor = rootStyle.getPropertyValue('--md-sys-color-primary').trim() || '#0061a4';

                chartInst.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Laba',
                            data: laba,
                            backgroundColor: primaryColor,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { display: false },
                            x: { grid: { display: false }, ticks: { color: rootStyle.getPropertyValue('--md-sys-color-on-surface').trim() } }
                        }
                    }
                });
                return () => { if (chartInst.current) chartInst.current.destroy(); }
            }, [data, document.body.className]); // Re-render chart if theme changes

            return (
                <div class="p-4 pb-20 space-y-4">
                    {/* Hero Card */}
                    <div class="md-primary-container p-6 rounded-3xl shadow-sm">
                        <p class="text-sm font-medium opacity-80 mb-1">Total Laba Bersih</p>
                        <p class="text-3xl font-bold">Rp {formatRupiah(tLaba.toString())}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="md-surface-variant p-4 rounded-2xl">
                            <p class="text-xs font-medium opacity-70 mb-1">Total Omset</p>
                            <p class="text-lg font-bold">Rp {formatRupiah(tOmset.toString())}</p>
                        </div>
                        <div class="md-error-container p-4 rounded-2xl">
                            <p class="text-xs font-medium opacity-80 mb-1">Modal Keluar</p>
                            <p class="text-lg font-bold">Rp {formatRupiah(tModal.toString())}</p>
                        </div>
                    </div>

                    <div class="md-surface border border-[var(--md-sys-color-outline-variant)] p-4 rounded-3xl mt-4">
                        <p class="text-sm font-medium mb-4 text-[var(--md-sys-color-on-surface)]">Laba 7 Hari Terakhir</p>
                        <div class="h-48 w-full">
                            {data.length === 0 ? 
                                <div class="h-full flex items-center justify-center text-sm opacity-50">Belum ada data</div> : 
                                <canvas ref={chartRef}></canvas>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ data, onDelete }) => {
            const sorted = [...data].sort((a, b) => b.id - a.id);

            return (
                <div class="p-4 pb-20 space-y-3">
                    {sorted.length === 0 && <p class="text-center text-sm opacity-50 mt-10">Histori kosong.</p>}
                    
                    {sorted.map(item => (
                        <div key={item.id} class="md-surface border border-[var(--md-sys-color-outline-variant)] p-4 rounded-2xl flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-medium px-2 py-0.5 md-primary-container rounded-sm">{item.jenis}</span>
                                    <span class="text-[11px] opacity-60">{new Date(item.tanggal).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</span>
                                </div>
                                <p class="font-medium text-[15px]">{item.nama}</p>
                                <p class="text-sm font-bold md-text-primary mt-1">Laba: Rp {formatRupiah(item.laba.toString())}</p>
                            </div>
                            <button onClick={() => onDelete(item.id)} class="p-2 text-[var(--md-sys-color-error)] ripple rounded-full">
                                <span class="material-symbols-rounded icon-outlined">delete</span>
                            </button>
                        </div>
                    ))}
                </div>
            );
        };

        const SettingsTab = ({ data, setRestore, themeColor, setThemeColor }) => {
            const backup = () => {
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ZP_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const restore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if(Array.isArray(parsed)) { setRestore(parsed); alert("Data dipulihkan."); }
                    } catch(err) { alert("File tidak valid."); }
                };
                r.readAsText(file);
            };

            return (
                <div class="p-4 pb-20 space-y-6">
                    {/* Theme Selector */}
                    <div>
                        <p class="text-sm font-medium mb-3 opacity-70">Warna Tema</p>
                        <div class="flex gap-4">
                            {['blue', 'green', 'purple'].map(c => (
                                <button 
                                    key={c} onClick={() => setThemeColor(c)}
                                    class={`w-12 h-12 rounded-full flex items-center justify-center ripple border-2 ${themeColor === c ? 'border-[var(--md-sys-color-on-background)]' : 'border-transparent'}`}
                                    style={{ backgroundColor: c === 'blue' ? '#0061a4' : c === 'green' ? '#146c2e' : '#6750a4' }}
                                >
                                    {themeColor === c && <span class="material-symbols-rounded text-white">check</span>}
                                </button>
                            ))}
                        </div>
                    </div>

                    <hr class="border-[var(--md-sys-color-outline-variant)]" />

                    {/* Data Management */}
                    <div>
                        <p class="text-sm font-medium mb-3 opacity-70">Manajemen Data</p>
                        <div class="space-y-3">
                            <button onClick={backup} class="w-full flex items-center gap-4 p-4 md-surface-variant rounded-2xl ripple text-left">
                                <span class="material-symbols-rounded">download</span>
                                <div>
                                    <p class="font-medium">Backup Data</p>
                                    <p class="text-xs opacity-70">Simpan catatan ke JSON</p>
                                </div>
                            </button>
                            
                            <label class="w-full flex items-center gap-4 p-4 md-surface-variant rounded-2xl ripple text-left cursor-pointer">
                                <span class="material-symbols-rounded">upload</span>
                                <div>
                                    <p class="font-medium">Restore Data</p>
                                    <p class="text-xs opacity-70">Pulihkan dari file JSON</p>
                                </div>
                                <input type="file" accept=".json" class="hidden" onChange={restore} />
                            </label>
                        </div>
                    </div>
                </div>
            );
        };

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} class={`flex flex-col items-center justify-center w-16 h-14 rounded-xl ripple ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>
                <div class={`px-4 py-1 rounded-full mb-0.5 transition-colors ${active ? 'md-primary-container' : 'bg-transparent'}`}>
                    <span class={`material-symbols-rounded ${active ? '' : 'icon-outlined'}`}>{icon}</span>
                </div>
                <span class="text-[12px] font-medium tracking-wide">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

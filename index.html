<body class="theme-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

        // ==========================================================================
        // UTILITIES & DATA (SAFEGUARDED)
        // ==========================================================================
        const formatRupiah = (angka) => {
            if (!angka && angka !== 0) return '0';
            return new Intl.NumberFormat('id-ID').format(angka);
        };
        const getRawNumber = (str) => parseInt(str?.toString().replace(/[^0-9]/g, ''), 10) || 0;
        
        const formatDateLong = (isoString) => {
            if (!isoString) return '-';
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));
        };
        const formatDateShort = (isoString) => {
            if (!isoString) return '-';
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' }).format(new Date(isoString));
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        const formatModeUang = (angka, isGwBanget, context) => {
            if (isGwBanget) {
                const abs = Math.abs(angka || 0);
                const isNeg = angka < 0;
                let res = '';
                let hasSlang = false;

                const slangs = { 10000: 'Ceban', 50000: 'Goban', 100000: 'Cepe', 150000: 'Pego' };
                if (slangs[abs]) { res = slangs[abs]; hasSlang = true; } 
                else if (abs < 1000) { res = abs.toString(); } 
                else if (abs < 1000000) { res = Math.round(abs / 1000) + 'k'; } 
                else if (abs < 1000000000) { let val = parseFloat((abs / 1000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Juta'; } 
                else if (abs < 1000000000000) { let val = parseFloat((abs / 1000000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Miliar'; } 
                else { let val = parseFloat((abs / 1000000000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Triliun'; }

                if (isNeg) return `Nombok ${res}`;
                if (context === 'cuan') return hasSlang ? res : `Rp${res}`;
                return res; 
            } else {
                const valStr = formatRupiah(Math.abs(angka || 0));
                return angka < 0 ? `Rp-${valStr}` : `Rp${valStr}`;
            }
        };

        const filterByPeriod = (data, format, offset) => {
             const target = new Date();
             if (format === 'Hari') {
                 target.setDate(target.getDate() + offset);
                 const y = target.getFullYear(), m = target.getMonth(), d = target.getDate();
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m && id.getDate() === d; });
             } else if (format === 'Minggu') {
                 target.setDate(target.getDate() + (offset * 7));
                 const day = target.getDay();
                 const diff = target.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(target.setDate(diff)); monday.setHours(0,0,0,0);
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6); sunday.setHours(23,59,59,999);
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id >= monday && id <= sunday; });
             } else {
                 target.setMonth(target.getMonth() + offset);
                 const y = target.getFullYear(), m = target.getMonth();
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m; });
             }
        };

        const getPeriodLabel = (format, offset) => {
             const d = new Date();
             if (format === 'Hari') {
                 d.setDate(d.getDate() + offset);
                 if (offset === 0) return 'Hari Ini';
                 if (offset === -1) return 'Kemarin';
                 return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric'}).format(d);
             } else if (format === 'Minggu') {
                 d.setDate(d.getDate() + (offset * 7));
                 const day = d.getDay();
                 const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(d.setDate(diff));
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
                 return `${monday.getDate()} - ${sunday.getDate()} ${new Intl.DateTimeFormat('id-ID', { month: 'short'}).format(sunday)}`;
             } else {
                 d.setMonth(d.getMonth() + offset);
                 if (offset === 0) return 'Bulan Ini';
                 return new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric'}).format(d);
             }
        };

        const jsonToCsv = (items) => {
            if (!items || !items.length) return '';
            const headers = ['ID', 'Tanggal', 'Jenis', 'Nama / Keterangan', 'Pelanggan', 'Modal', 'Jual', 'Jumlah', 'Total Laba', 'Status'];
            let csvContent = headers.join(',') + '\r\n';
            items.forEach(item => {
                const row = [`"${item?.id || ''}"`, `"${item?.tanggal || ''}"`, `"${item?.jenis || ''}"`, `"${(item?.nama || '').replace(/"/g, '""')}"`, `"${(item?.pelanggan || '').replace(/"/g, '""')}"`, item?.modal || 0, item?.jual || 0, item?.jumlah || 1, item?.laba || 0, `"${item?.status || ''}"`];
                csvContent += row.join(',') + '\r\n';
            });
            return csvContent;
        };

        // URUTAN TAB FIX
        const TABS_ORDER = ['dasbor', 'catet', 'riwayat', 'analisis', 'seting'];

        // ==========================================================================
        // CONTEXT: GLOBAL STATE
        // ==========================================================================
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [activeTab, setActiveTab] = useState('dasbor');
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({ theme: 'blue', hasStarted: false, periodFormat: 'Bulan', gwBanget: false });
            const [snackbars, setSnackbars] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);

            // ANTI CRASH LOCALSTORAGE SAFEGUARD

        // ==========================================================================
        // M3 UI COMPONENTS
        // ==========================================================================
        const Ripple = ({ children, className = '', onClick, onPointerDown, onPointerUp, onPointerMove, onPointerLeave, style }) => {
            const [ripples, setRipples] = useState([]);
            
            const addRipple = (e) => {
                if (onPointerDown) onPointerDown(e);
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                setRipples(prev => [...prev, { x, y, size, id: Date.now() }]);
            };
            const cleanUp = (e) => {
                if (onPointerUp && e.type === 'pointerup') onPointerUp(e);
                if (onPointerLeave && e.type === 'pointerleave') onPointerLeave(e);
                setTimeout(() => setRipples([]), 600); 
            };
            const handleMove = (e) => { if(onPointerMove) onPointerMove(e); }

            return (
                <div className={`ripple-root active:scale-[0.98] spring-bounce ${className}`} style={style}
                     onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp} onPointerMove={handleMove} onClick={onClick}>
                    {children}
                    {ripples.map(r => (
                        <span key={r.id} className="ripple-span" style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />
                    ))}

            );

            if (variant === 'error') colors = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            return (

            useEffect(() => { setMounted(true); }, []);

            useEffect(() => {
                if (isOpen) window.history.pushState({ modal: title }, '');
                const handlePopState = (e) => { if (isOpen) executeClose(); };
                if (isOpen) window.addEventListener('popstate', handlePopState);
                
                return () => { if (isOpen) window.removeEventListener('popstate', handlePopState); };
            }, [isOpen, title]);

            const executeClose = () => {
                setIsClosing(true);
                setTimeout(() => { onClose(); setIsClosing(false); }, 350); 
            };

            const handleUIClose = () => {
                if (window.history.state && window.history.state.modal === title) {

                const m = getRawNumber(modalStr); const j = getRawNumber(jualStr) || 0;

                if(isTopUp) finalNama = `Top Up ${subTopUp} (${viaTopUp}) - ${finalNama}`;

                const newData = {
                    id: generateId(), tanggal: new Date().toISOString(),
                    jenis, nama: finalNama, pelanggan: pelanggan.trim() || 'Hamba Allah',
                    modal: m, jual: j, jumlah: jumlah, laba: (j - m) * jumlah, status: 'Beres'
                };

                setTransactions(prev => [newData, ...prev]); showSnackbar('Mantap! Duit dicatet 🤑'); 
                setNama(''); setPelanggan(''); setModalStr(''); setJualStr(''); setJumlah(1);
            };

            const laba = ((getRawNumber(jualStr) || 0) - getRawNumber(modalStr)) * jumlah;
            const iconMap = { 'Servis': 'build', 'Sparepart': 'memory', 'Aksesoris': 'shopping_bag', 'Top Up': 'phone_iphone' };

            return (
                <div className="p-4 space-y-4 h-full overflow-y-auto no-scrollbar pb-32" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] tracking-tight mb-4 px-2">Catet Duit Bos.</h1>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <p className="text-sm font-extrabold tracking-widest uppercase text-[var(--md-sys-color-primary)] mb-4 ml-1">Pilih Kategori Dulu</p>
                        <div className="grid grid-cols-2 gap-3">
                            {['Servis', 'Sparepart', 'Aksesoris', 'Top Up'].map(j => (
                                <button key={j} type="button" onClick={() => setJenis(j)}
                                    className={`py-4 px-3 text-[15px] font-bold rounded-[var(--md-shape-xl)] spring-bounce active:scale-95 ${
                                        jenis === j ? 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] shadow-md scale-[1.02]' 
                                        : 'bg-black/20 text-[var(--md-sys-color-on-surface-variant)] border border-transparent hover:bg-black/30'
                                    }`}>{j}</button>
                            ))}
                        </div>
                    </div>
                    
                    {isTopUp && (
                        <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] space-y-4">
                            <div>
                                <p className="text-xs font-bold text-[var(--md-sys-color-on-surface-variant)] mb-3 uppercase tracking-wide">Top Up Apa?</p>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                    {['Pulsa', 'Token Listrik', 'Game', 'E-Wallet', 'Paket Data'].map(sub => (
                                        <button key={sub} onClick={() => setSubTopUp(sub)} className={`shrink-0 px-5 py-2.5 rounded-[var(--md-shape-lg)] font-bold text-[13px] transition-colors border ${subTopUp === sub ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent' : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)] hover:bg-[var(--md-sys-color-surface-variant)]'}`}>{sub}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <p className="text-xs font-bold text-[var(--md-sys-color-on-surface-variant)] mb-3 uppercase tracking-wide">Via Apa (Jalurnya)?</p>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                    {['Bank', 'Gopay', 'ShopeePay', 'Dana', 'OVO', 'Saldo Konter'].map(via => (
                                        <button key={via} onClick={() => setViaTopUp(via)} className={`shrink-0 px-5 py-2.5 rounded-[var(--md-shape-lg)] font-bold text-[13px] transition-colors border ${viaTopUp === via ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent' : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)] hover:bg-[var(--md-sys-color-surface-variant)]'}`}>{via}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] space-y-4">
                        <TextField label={isTopUp ? 'Nomor Tujuan / Ket' : 'Nama Kerjaan / Barang'} value={nama} onChange={setNama} icon={iconMap[jenis]} />
                        <TextField label="Orangnya (Boleh Kosong)" value={pelanggan} onChange={setPelanggan} icon="person" />
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <TextField label="Modal Keluar" value={modalStr ? formatRupiah(getRawNumber(modalStr)) : ''} onChange={setModalStr} inputMode="numeric" prefix="Rp" />
                            <TextField label="Jual Berapa" value={jualStr ? formatRupiah(getRawNumber(jualStr)) : ''} onChange={setJualStr} inputMode="numeric" prefix="Rp" />
                        </div>

                        <div className={`bg-[var(--md-sys-color-surface-container-highest)] p-5 rounded-[var(--md-shape-2xl)] relative pt-8 mt-2 transition-all duration-500 ${(isServis || isTopUp) ? 'opacity-40 grayscale pointer-events-none' : ''}`}>
                            <span className="absolute left-5 top-3 text-[13px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jumlah Laku</span>
                            <div className="flex items-center gap-5 mt-2">
                                <input type="range" min="1" max="50" value={jumlah} onChange={e => setJumlah(parseInt(e.target.value))} className="m3-slider flex-1" disabled={isServis || isTopUp} />
                                <span className="w-12 text-center font-extrabold text-2xl text-[var(--md-sys-color-primary)]">{jumlah}</span>
                            </div>
                        </div>

                        <div className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-6 rounded-[var(--md-shape-2xl)] flex justify-between items-center shadow-md">
                            <div>
                                <span className="text-sm font-extrabold uppercase tracking-widest opacity-80 block mb-1">Dapet Cuan</span>
                                <span className="text-[11px] opacity-70 font-medium">Udah dikali jumlah</span>
                            </div>
                            <span className="text-3xl font-extrabold">Rp{formatRupiah(laba)}</span>
                        </div>
                    </div>

                    <Button onClick={handleSave} icon="local_atm" fullWidth className="mt-6 h-16 text-lg shadow-[var(--md-elevation-3)] mb-4">Sikat Bos! Catet</Button>
                </div>
            );
        };

        // --- TAB 3: RIWAYAT ---
        const TabRiwayat = () => {
            const { transactions, setTransactions, showSnackbar, setSelectedItem } = useContext(AppContext);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            
            const [selectedIds, setSelectedIds] = useState([]);
            const isSelectionMode = selectedIds.length > 0;

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    // SAFEGUARD PENTING: || '' nahan crash kalo nama/pelanggan undefined dari cache lama
                    const matchSearch = (t.nama || '').toLowerCase().includes(search.toLowerCase()) || 
                                        (t.pelanggan || '').toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            useEffect(() => {
                const handlePopState = () => { if (selectedIds.length > 0) { setSelectedIds([]); } };
                if (selectedIds.length > 0) { window.history.pushState({ selectionMode: true }, ''); window.addEventListener('popstate', handlePopState); }
                return () => { if (selectedIds.length > 0) window.removeEventListener('popstate', handlePopState); };
            }, [selectedIds]);

            const closeSelectionModeUI = () => { if (window.history.state && window.history.state.selectionMode) { window.history.back(); } else { setSelectedIds([]); } };
            const toggleSelection = (id) => { setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]); };

            const handleBulkDelete = () => {
                if(confirm(`Buang ${selectedIds.length} catetan ini ke tong sampah?`)) {
                    setTransactions(prev => prev.filter(t => !selectedIds.includes(t.id)));
                    closeSelectionModeUI(); showSnackbar(`${selectedIds.length} catetan dibakar 🔥`);
                }
            };

            const handleBulkCopy = () => {
                const toCopy = transactions.filter(t => selectedIds.includes(t.id));
                const newItems = toCopy.map(item => ({ ...item, id: generateId(), tanggal: new Date().toISOString(), status: 'Jalan' }));
                setTransactions(prev => [...newItems, ...prev]);
                closeSelectionModeUI(); showSnackbar(`${newItems.length} dicopy, gasss!`);
            };

            return (
                <div className="flex flex-col h-full relative" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    
                    {isSelectionMode && (
                        <div className="absolute top-0 left-0 right-0 z-[60] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] h-20 flex items-center justify-between px-4 animate-appbar-down shadow-lg rounded-b-[var(--md-shape-2xl)] border-b border-[var(--md-sys-color-outline-variant)]" style={{ paddingTop: 'var(--sa-top)', height: 'calc(80px + var(--sa-top))' }}>
                            <div className="flex items-center gap-4">
                                <button onClick={closeSelectionModeUI} className="w-12 h-12 rounded-full flex items-center justify-center bg-black/10 hover:bg-black/20 spring-bounce active:scale-90">
                                    <span className="material-symbols-rounded text-2xl">close</span>
                                </button>
                                <span className="text-xl font-bold">{selectedIds.length} Dipilih</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleBulkCopy} className="w-12 h-12 rounded-full flex items-center justify-center bg-black/10 hover:bg-black/20 spring-bounce active:scale-90"><span className="material-symbols-rounded text-2xl">content_copy</span></button>
                                <button onClick={handleBulkDelete} className="w-12 h-12 rounded-full flex items-center justify-center bg-[var(--md-sys-color-error)]/20 hover:bg-[var(--md-sys-color-error)]/30 text-[var(--md-sys-color-error)] spring-bounce active:scale-90"><span className="material-symbols-rounded text-2xl">delete</span></button>
                            </div>
                        </div>
                    )}

                    <div className="px-4 space-y-5 pb-2 z-10 bg-[var(--md-sys-color-background)]">
                        <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] tracking-tight">Catetan Lama.</h1>
                        
                        <div className="flex items-center h-16 bg-[var(--md-sys-color-surface-container-highest)] rounded-[var(--md-shape-2xl)] px-5 text-[var(--md-sys-color-on-surface)] shadow-inner focus-within:ring-2 ring-[var(--md-sys-color-primary)] spring-bounce">
                            <span className="material-symbols-rounded mr-4 opacity-70 text-[24px]">search</span>
                            <input type="text" placeholder="Nyari kerjaan siapa bos?..." value={search} onChange={e => setSearch(e.target.value)}
                                className="bg-transparent border-none outline-none flex-1 text-[16px] font-bold placeholder:text-[var(--md-sys-color-on-surface-variant)]/60 placeholder:font-medium" />
                            {search && <span className="material-symbols-rounded cursor-pointer opacity-70 ml-2 p-1 bg-black/20 rounded-full" onClick={() => setSearch('')}>close</span>}
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 px-1 pt-1">
                            {['Semua', 'Servis', 'Sparepart', 'Aksesoris', 'Top Up'].map(f => (
                                <button key={f} onClick={() => setFilterType(f)}
                                    className={`px-6 h-12 rounded-full text-[15px] font-extrabold border-2 spring-bounce active:scale-95 shrink-0 ${
                                        filterType === f ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent shadow-sm' 
                                        : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)] bg-transparent hover:bg-[var(--md-sys-color-surface-variant)]'
                                    }`}>{f}</button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 pb-32 space-y-3 pt-2 no-scrollbar">
                        {filteredData.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-24 text-[var(--md-sys-color-on-surface-variant)]">
                                <span className="material-symbols-rounded text-[80px] mb-4 opacity-30">manage_search</span>
                                <p className="font-bold text-xl opacity-60">Kosong melompong bos</p>
                            </div>
                        ) : (
                            filteredData.map(item => (
                                <ActivityItem key={item.id} item={item} selectable={isSelectionMode} selected={selectedIds.includes(item.id)} onSelect={() => toggleSelection(item.id)} onClick={() => setSelectedItem(item)} />
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // --- TAB 4: ANALISIS ---
        const TabAnalisis = () => {
            const { transactions, settings } = useContext(AppContext);
            const refLine = useRef(null); const refPie = useRef(null); const refBar = useRef(null);
            const inst = useRef({ line: null, pie: null, bar: null });
            const [sheetInfo, setSheetInfo] = useState(null);

            const getColors = useCallback(() => {
                const style = getComputedStyle(document.body);
                return {
                    primary: style.getPropertyValue('--md-sys-color-primary').trim(), tertiary: style.getPropertyValue('--md-sys-color-tertiary').trim(),
                    error: style.getPropertyValue('--md-sys-color-error').trim(), secondary: style.getPropertyValue('--md-sys-color-secondary').trim(),
                    text: style.getPropertyValue('--md-sys-color-on-surface-variant').trim(), grid: style.getPropertyValue('--md-sys-color-outline-variant').trim(),
                    bg: style.getPropertyValue('--md-sys-color-surface-container-low').trim()
                };
            }, [settings.theme]);

            const getChartData = () => {
                let labels = []; let dataPoints = [];
                const format = settings.periodFormat;
                
                if (format === 'Hari') {
                    labels = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d.toLocaleDateString('id-ID', { weekday:'short'}); });
                    dataPoints = [...Array(7)].map((_, i) => {
                        const d = new Date(); d.setDate(d.getDate() - (6 - i)); const targetDate = d.toISOString().split('T')[0];
                        return transactions.filter(t => t?.tanggal?.startsWith(targetDate) && t.status === 'Beres').reduce((s,i) => s + (i.laba || 0), 0);
                    });
                } else if (format === 'Minggu') {
                    for (let i = 3; i >= 0; i--) { labels.push(`M-${i === 0 ? 'Ini' : i}`); const wData = filterByPeriod(transactions, 'Minggu', -i); dataPoints.push(wData.filter(t => t.status === 'Beres').reduce((s,x) => s + (x.laba || 0), 0)); }
                } else {
                    for (let i = 5; i >= 0; i--) { const d = new Date(); d.setMonth(d.getMonth() - i); labels.push(d.toLocaleDateString('id-ID', { month: 'short' })); const mData = filterByPeriod(transactions, 'Bulan', -i); dataPoints.push(mData.filter(t => t.status === 'Beres').reduce((s,x) => s + (x.laba || 0), 0)); }
                }
                return { labels, dataPoints };
            };

            // SAFEGUARD CHART.JS: Cek apakah canvas siap
            useEffect(() => {
                if (transactions.length === 0) return;
                if (typeof Chart === 'undefined') return; // Jaga-jaga loading gagal
                
                const c = getColors(); 
                Object.values(inst.current).forEach(chart => chart && chart.destroy());
                
                Chart.defaults.font.family = "'Readex Pro', sans-serif"; Chart.defaults.font.weight = 'bold'; Chart.defaults.color = c.text;
                const { labels: lineLabels, dataPoints: lineData } = getChartData();
                
                if (refLine.current) {
                    inst.current.line = new Chart(refLine.current.getContext('2d'), { type: 'line', data: { labels: lineLabels, datasets: [{ label: 'Cuan', data: lineData, borderColor: c.primary, backgroundColor: `${c.primary}30`, fill: true, tension: 0.4, pointBackgroundColor: c.bg, pointBorderColor: c.primary, pointBorderWidth: 4, pointRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: c.grid, borderDash: [5,5] }, ticks: { callback: v => `${v/1000}k` } } } } });
                }

                const counts = ['Servis', 'Sparepart', 'Aksesoris', 'Top Up'].map(j => transactions.filter(t => t.jenis === j && t.status === 'Beres').length);
                if (refPie.current) {
                    inst.current.pie = new Chart(refPie.current.getContext('2d'), { type: 'doughnut', data: { labels: ['Servis', 'Spare', 'Aks', 'Top Up'], datasets: [{ data: counts, backgroundColor: [c.primary, c.tertiary, c.error, c.secondary], borderColor: c.bg, borderWidth: 4, hoverOffset: 8 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { padding: 20 } } } } });
                }

                const itemsMap = {}; transactions.filter(t=>t.status==='Beres' && (t.jenis==='Sparepart' || t.jenis==='Aksesoris')).forEach(t => { itemsMap[t.nama || 'Tanpa Nama'] = (itemsMap[t.nama || 'Tanpa Nama'] || 0) + (t.jumlah || 1); }); const topItems = Object.entries(itemsMap).sort((a,b)=>b[1]-a[1]).slice(0, 4);
                if(topItems.length > 0 && refBar.current) { 
                    inst.current.bar = new Chart(refBar.current.getContext('2d'), { type: 'bar', data: { labels: topItems.map(i=>i[0]), datasets: [{ data: topItems.map(i=>i[1]), backgroundColor: c.tertiary, borderRadius: 8 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x: { display: false }, y: { grid: {display:false} } } } }); 
                }
                
                return () => Object.values(inst.current).forEach(chart => chart && chart.destroy());
            }, [transactions, settings.theme, settings.periodFormat, getColors]);

            const totalSelesai = transactions.filter(t => t.status === 'Beres');
            const totalOmset = totalSelesai.reduce((s,i) => s + ((i.jual||0) * (i.jumlah||1)), 0);
            const totalLaba = totalSelesai.reduce((s,i) => s + (i.laba||0), 0);
            const margin = totalOmset > 0 ? ((totalLaba / totalOmset) * 100).toFixed(1) : 0;
            
            const groupedByMonth = useMemo(() => {
                const groups = {};
                totalSelesai.forEach(t => {
                    if(!t.tanggal) return;
                    const d = new Date(t.tanggal);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    const monthName = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                    if (!groups[key]) groups[key] = { label: monthName, totalOmset: 0, totalLaba: 0, totalModal: 0, count: 0, countServis: 0, countBarang: 0, countTopUp: 0, itemsLaku: 0 };
                    groups[key].totalOmset += ((t.jual||0) * (t.jumlah||1)); groups[key].totalLaba += (t.laba||0); groups[key].totalModal += ((t.modal||0) * (t.jumlah||1)); groups[key].count += 1;
                    if(t.jenis === 'Servis') { groups[key].countServis += 1; } else if (t.jenis === 'Top Up') { groups[key].countTopUp += 1; } else { groups[key].countBarang += 1; groups[key].itemsLaku += (t.jumlah||1); }
                });
                return Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(k => groups[k]); 
            }, [totalSelesai]);

            return (
                <div className="p-4 space-y-5 h-full overflow-y-auto no-scrollbar pb-32" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] mb-2 tracking-tight px-2">Ngecek Cuan.</h1>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <Ripple onClick={() => setSheetInfo('margin')} className="bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] p-6 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl spring-bounce active:scale-95">
                            <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px]">percent</span></div>
                            <p className="text-xs font-extrabold uppercase tracking-widest opacity-80 mb-2">Persentase Untung</p>
                            <h2 className="text-4xl font-extrabold tracking-tighter">{margin}%</h2>
                        </Ripple>
                        <Ripple onClick={() => setSheetInfo('beres')} className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-6 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl spring-bounce active:scale-95">
                            <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px]">done_all</span></div>
                            <p className="text-xs font-extrabold uppercase tracking-widest opacity-80 mb-2">Total Beres</p>
                            <h2 className="text-4xl font-extrabold tracking-tighter">{totalSelesai.length} <span className="text-base font-bold">Nota</span></h2>
                        </Ripple>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)]">Grafik Cuan ({settings.periodFormat})</h3>
                            <div className="w-10 h-10 rounded-full bg-[var(--md-sys-color-surface-variant)] flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)]"><span className="material-symbols-rounded text-xl">show_chart</span></div>
                        </div>
                        <div className="h-[220px] relative">{transactions.length > 0 ? <canvas ref={refLine}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)] font-bold">Sepi amat bos, belom ada data</p>}</div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)] mb-6">Dari Mana Aja?</h3>
                        <div className="h-[180px] relative">{transactions.length > 0 ? <canvas ref={refPie}></canvas> : <p className="text-center mt-16 text-[var(--md-sys-color-on-surface-variant)] font-bold">Belom ada data</p>}</div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)] mb-6">Barang Paling Laku</h3>
                        <div className="h-[180px] relative">{transactions.filter(t=>t.jenis!=='Servis' && t.jenis!=='Top Up' && t.status==='Beres').length > 0 ? <canvas ref={refBar}></canvas> : <p className="text-center mt-16 text-[var(--md-sys-color-on-surface-variant)] font-bold">Barang belom ada yang laku nih</p>}</div>
                    </div>
                    
                    <BottomSheet isOpen={!!sheetInfo} onClose={() => setSheetInfo(null)} title={sheetInfo === 'margin' ? 'Rincian Persentase' : 'Rincian Nota Beres'}>
                        <div className="space-y-4 pt-2">
                            <p className="text-[var(--md-sys-color-on-surface-variant)] font-medium mb-4">{sheetInfo === 'margin' ? 'Rincian detail perputaran duit & persentase margin laba per-bulan bos.' : 'Rekap mendalam hasil garapan per-bulannya bos.'}</p>

        // --- TAB 5: SETING ---
        const TabSeting = () => {

            const handleExportFile = async (type) => {
                if (transactions.length === 0) { showSnackbar('Data masih kosong bos, ga ada yang bisa di-export.'); return; }
                const isCSV = type === 'csv'; const dateStr = new Date().getTime(); const fileName = `ZonaPoncell_Export_${dateStr}.${isCSV ? 'csv' : 'json'}`;
                let fileContent = ''; let mimeType = '';
                if (isCSV) { fileContent = jsonToCsv(transactions); mimeType = 'text/csv'; } else { fileContent = JSON.stringify(transactions); mimeType = 'application/json'; }
                const blob = new Blob([fileContent], { type: mimeType });
                
                if (navigator.share && navigator.canShare) {
                    const file = new File([blob], fileName, { type: mimeType });
                    if (navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: `Export Data ${isCSV ? 'Excel/CSV' : 'JSON'}`, text: 'Nih bos datanya.' }); showSnackbar('Mantap, file berhasil dikirim/disimpen 🚀'); return; } catch (err) { if (err.name !== 'AbortError') showSnackbar('Share gagal, nyoba cara download biasa...'); else return; }
                    }
                }
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                showSnackbar(`Sip, Data di-download sbg ${type.toUpperCase()}`);

            const handleRestoreFile = (e) => {

                        <Ripple className="w-full flex items-center p-4 rounded-[var(--md-shape-2xl)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] transition-colors mt-2" onClick={() => handleExportFile('csv')}>

        const DetailSheet = () => {
            const { transactions, setTransactions, showSnackbar, selectedItem: item, setSelectedItem } = useContext(AppContext);
            const onClose = () => setSelectedItem(null);
            if (!item) return null;
            const currentItem = transactions.find(t => t.id === item.id) || item;
            const updateStatus = (newStatus) => { setTransactions(prev => prev.map(t => t.id === currentItem.id ? {...t, status: newStatus} : t)); showSnackbar(`Sip, Status diubah ke ${newStatus}`); };
            const handleDelete = () => { if(confirm('Yakin mau buang data ini ke tong sampah?')) { setTransactions(prev => prev.filter(t => t.id !== currentItem.id)); showSnackbar('Satu data dibuang'); onClose(); } };
            const iconMap = { 'Servis': 'build', 'Sparepart': 'memory', 'Aksesoris': 'shopping_bag', 'Top Up': 'account_balance_wallet' };

            return (
                <BottomSheet isOpen={!!item} onClose={onClose} title="Detailnya Nih">

                            <div className="absolute top-0 right-0 p-4 opacity-10"><span className="material-symbols-rounded text-[100px]">{iconMap[currentItem?.jenis] || 'build'}</span></div>

                        <div className="bg-[var(--md-sys-color-surface-container)] rounded-[var(--md-shape-3xl)] p-6 shadow-md border border-[var(--md-sys-color-outline-variant)]">
                            <div className="flex justify-between items-center mb-4"><span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jumlah</span><span className="font-extrabold text-[var(--md-sys-color-on-surface)] text-lg">{currentItem?.jumlah || 1}x</span></div>
                            <div className="flex justify-between items-center mb-4"><span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Modal Keluar /pcs</span><span className="font-extrabold text-[var(--md-sys-color-error)] text-lg">Rp{formatRupiah(currentItem?.modal || 0)}</span></div>
                            <div className="flex justify-between items-center mb-6"><span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jual Harga /pcs</span><span className="font-extrabold text-[var(--md-sys-color-success)] text-lg">Rp{formatRupiah(currentItem?.jual || 0)}</span></div>
                            <div className="border-t-2 border-dashed border-[var(--md-sys-color-outline-variant)] pt-5 flex justify-between items-center"><div><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)] block tracking-wide uppercase">Cuan Murni</span></div><span className="text-3xl font-extrabold text-[var(--md-sys-color-primary)] tracking-tighter">Rp{formatRupiah(currentItem?.laba || 0)}</span></div>

                        <div>

                                    else if (s === 'Jalan') activeClass = 'bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)] border-transparent shadow-lg scale-[1.03]';
                                    else if (s === 'Gagal') activeClass = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)] border-transparent shadow-lg scale-[1.03]';

        // ==========================================================================
        // APP SHELL (WITH REAL PHYSICAL PHYSICS STACK SWIPE)
        // ==========================================================================
        const MainApp = () => {
            const { settings, activeTab, setActiveTab } = useContext(AppContext);
            const containerRef = useRef(null);
            const tabsRef = useRef([]);

            if (!settings.hasStarted) return <SplashScreen />;

            const tabsConfig = [
                { id: 'dasbor', icon: 'home', label: 'Beranda' },
                { id: 'catet', icon: 'add_circle', label: 'Catet' },
                { id: 'riwayat', icon: 'history', label: 'Riwayat' },
                { id: 'analisis', icon: 'monitoring', label: 'Ngecek' },
                { id: 'seting', icon: 'tune', label: 'Seting' }
            ];

            const activeIndex = TABS_ORDER.indexOf(activeTab);

            useEffect(() => {
                tabsRef.current.forEach((el, i) => {
                    if (!el) return;
                    el.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';

                    if (i < activeIndex) {
                        el.style.transform = 'translate3d(-25%, 0, 0) scale(0.95)';
                        el.style.opacity = '0';
                        el.style.pointerEvents = 'none';
                    } else if (i === activeIndex) {
                        el.style.transform = 'translate3d(0, 0, 0) scale(1)';
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                    } else {
                        el.style.transform = 'translate3d(100%, 0, 0) scale(1)';
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'none';
                    }
                });
            }, [activeIndex]);

            // Fisika geseran jari murni
            useEffect(() => {
                const container = containerRef.current;
                if (!container) return;

                let startX = 0, startY = 0, startTime = 0;
                let isDragging = false;
                let isScrolling = null; 

                const onStart = (e) => {
                    if (e.touches.length > 1) return;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    startTime = Date.now();
                    isDragging = true;
                    isScrolling = null;

                    tabsRef.current.forEach(el => { if (el) el.style.transition = 'none'; });
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    const x = e.touches[0].clientX;
                    const y = e.touches[0].clientY;
                    const deltaX = x - startX;
                    const deltaY = y - startY;

                    if (isScrolling === null) {
                        if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 5) {
                            isScrolling = true;
                        } else if (Math.abs(deltaX) > 5) {
                            isScrolling = false;
                        }
                    }

                    if (isScrolling) return; 
                    if (isScrolling === false && e.cancelable) e.preventDefault(); 

                    const sw = window.innerWidth;
                    const currentTab = tabsRef.current[activeIndex];
                    const nextTab = tabsRef.current[activeIndex + 1];
                    const prevTab = tabsRef.current[activeIndex - 1];

                    // Swipe Kiri (Narik layer baru)
                    if (deltaX < 0) {
                        if (nextTab) {
                            nextTab.style.transform = `translate3d(${sw + deltaX}px, 0, 0)`;
                            const progress = Math.min(Math.abs(deltaX) / sw, 1);
                            currentTab.style.transform = `translate3d(${deltaX * 0.25}px, 0, 0) scale(${1 - progress * 0.05})`;
                            currentTab.style.opacity = 1 - progress;
                        } else {
                            currentTab.style.transform = `translate3d(${deltaX * 0.2}px, 0, 0)`; // Mentok
                        }
                    }
                    // Swipe Kanan (Mbuang layer sekarang)
                    else if (deltaX > 0) {
                        if (prevTab) {
                            currentTab.style.transform = `translate3d(${deltaX}px, 0, 0)`;
                            const progress = Math.min(deltaX / sw, 1);
                            prevTab.style.transform = `translate3d(${-sw * 0.25 * (1 - progress)}px, 0, 0) scale(${0.95 + progress * 0.05})`;
                            prevTab.style.opacity = progress;
                        } else {
                            currentTab.style.transform = `translate3d(${deltaX * 0.2}px, 0, 0)`; // Mentok
                        }
                    }
                };

                const onEnd = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    if (isScrolling) { triggerReset(); return; }

                    const x = e.changedTouches[0].clientX;
                    const deltaX = x - startX;
                    const sw = window.innerWidth;
                    const velocity = Math.abs(deltaX) / (Date.now() - startTime);

                    const crossedThreshold = Math.abs(deltaX) > sw * 0.3 || velocity > 0.6;

                    if (crossedThreshold) {
                        if (deltaX < 0 && activeIndex < TABS_ORDER.length - 1) {
                            setActiveTab(TABS_ORDER[activeIndex + 1]);
                        } else if (deltaX > 0 && activeIndex > 0) {
                            setActiveTab(TABS_ORDER[activeIndex - 1]);
                        } else {
                            triggerReset();
                        }
                    } else {
                        triggerReset();
                    }
                };

                const triggerReset = () => {
                    tabsRef.current.forEach((el, i) => {
                        if (!el) return;
                        el.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';
                        if (i < activeIndex) { el.style.transform = 'translate3d(-25%, 0, 0) scale(0.95)'; el.style.opacity = '0'; } 
                        else if (i === activeIndex) { el.style.transform = 'translate3d(0, 0, 0) scale(1)'; el.style.opacity = '1'; } 
                        else { el.style.transform = 'translate3d(100%, 0, 0) scale(1)'; el.style.opacity = '1'; }
                    });
                }

                container.addEventListener('touchstart', onStart, { passive: false });
                container.addEventListener('touchmove', onMove, { passive: false });
                container.addEventListener('touchend', onEnd);

                return () => {
                    container.removeEventListener('touchstart', onStart);
                    container.removeEventListener('touchmove', onMove);
                    container.removeEventListener('touchend', onEnd);
                };
            }, [activeIndex, setActiveTab]);

            return (
                <div className="h-[100dvh] w-full max-w-lg mx-auto flex flex-col relative bg-black overflow-hidden sm:border-x sm:border-[var(--md-sys-color-outline-variant)] sm:shadow-2xl">
                    
                    <main ref={containerRef} className="flex-1 relative overflow-hidden bg-black touch-none">
                        {TABS_ORDER.map((tabId, index) => (
                            <div 
                                key={tabId}
                                ref={el => tabsRef.current[index] = el}
                                className="absolute inset-0 bg-[var(--md-sys-color-background)] tab-layer"
                                style={{ zIndex: (index + 1) * 10 }}
                            >
                                {tabId === 'dasbor' && <TabDasbor />}
                                {tabId === 'catet' && <TabCatet />}
                                {tabId === 'riwayat' && <TabRiwayat />}
                                {tabId === 'analisis' && <TabAnalisis />}
                                {tabId === 'seting' && <TabSeting />}
                            </div>
                        ))}
                    </main>

                    <nav className="absolute bottom-0 w-full h-[96px] bg-[var(--md-sys-color-surface-container)] flex justify-around items-center px-2 z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.5)]" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        {tabsConfig.map(t => {
                            const active = activeTab === t.id;
                            return (
                                <div key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 pb-1 relative group cursor-pointer active:scale-95 spring-bounce">
                                    <div className={`w-14 h-8 rounded-full flex items-center justify-center spring-bounce ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] scale-110 shadow-sm' : 'text-[var(--md-sys-color-on-surface-variant)] scale-100 group-hover:bg-[var(--md-sys-color-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded text-2xl spring-bounce ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                    </div>
                                    <span className={`text-[12px] font-extrabold mt-1.5 spring-bounce tracking-wide ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>{t.label}</span>
                                </div>
                            );
                        })}
                    </nav>

                    <DetailSheet />
                    <SnackbarContainer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

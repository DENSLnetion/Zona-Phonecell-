            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));

                const jual = modal + (Math.floor(Math.random() * 5 + 1) * 20000);

                    id: generateId() + i,
                    tanggal: date.toISOString(),
                    jenis: type,
                    nama: names[Math.floor(Math.random() * names.length)],
                    pelanggan: `Pelanggan ${Math.floor(Math.random() * 100)}`,
                    modal: type === 'Servis' ? (Math.random() > 0.5 ? modal : 0) : modal,
                    jual: jual,
                    laba: type === 'Servis' ? jual - (Math.random() > 0.5 ? modal : 0) : jual - modal,
                    status: statuses[Math.floor(Math.random() * statuses.length)],
                    catatan: 'Data contoh yang di-generate otomatis.'
                });
            }
            return data.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

            const [transactions, setTransactions] = useState([]);
            
            // App Settings
            const [settings, setSettings] = useState({
                theme: 'blue',
                isDark: false,
                storeName: 'Zona Poncell',
                ownerName: 'Admin',
                hasStarted: false // For fullscreen trigger
            });

            // UI State
            const [snackbars, setSnackbars] = useState([]);

            // Load Data
            useEffect(() => {
                const savedDb = localStorage.getItem('zp_m3_data');
                if (savedDb) {
                    setTransactions(JSON.parse(savedDb));
                } else {
                    // Inject dummy data if totally empty for the first time
                    const dummy = generateDummyData();
                    setTransactions(dummy);
                    localStorage.setItem('zp_m3_data', JSON.stringify(dummy));
                }

                const savedSettings = localStorage.getItem('zp_m3_config');
                if (savedSettings) {
                    setSettings(prev => ({...prev, ...JSON.parse(savedSettings)}));
                }
            }, []);

            // Save Data
            useEffect(() => {
                if(transactions.length > 0) localStorage.setItem('zp_m3_data', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('zp_m3_config', JSON.stringify(settings));
                
                // Apply theme to DOM
                const body = document.body;
                body.className = ''; // reset
                body.classList.add(`theme-${settings.theme}`);
                if (settings.isDark) body.classList.add('dark');

                // Update meta theme color
                setTimeout(() => {
                    const surfaceColor = getComputedStyle(document.body).getPropertyValue('--md-sys-color-surface').trim();
                    document.getElementById('meta-theme-color').content = surfaceColor;
                }, 100);
            }, [settings.theme, settings.isDark]);

            const showSnackbar = (message, type = 'default') => {
                const id = Date.now();
                setSnackbars(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setSnackbars(prev => prev.filter(s => s.id !== id));
                }, 4000);
            };

            return (
                <AppContext.Provider value={{
                    transactions, setTransactions,
                    settings, setSettings,
                    snackbars, showSnackbar
                }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ==========================================================================
        // M3 UI COMPONENTS
        // ==========================================================================
        
        // 1. Ripple Effect Wrapper
        const Ripple = ({ children, className = '', onClick }) => {
            const [ripples, setRipples] = useState([]);
            
            const addRipple = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                
                const newRipple = { x, y, size, id: Date.now() };
                setRipples(prev => [...prev, newRipple]);
                
                if(onClick) onClick(e);
            };

            const cleanUp = () => {
                setTimeout(() => setRipples([]), 600); // clear after animation
            };

            return (
                <div className={`ripple-root ${className}`} onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp}>
                    {children}
                    {ripples.map(r => (
                        <span key={r.id} className="ripple-span"
                              style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />
                    ))}
                </div>
            );
        };

        // 2. M3 Button
        const Button = ({ variant = 'filled', children, icon, className='', onClick, fullWidth }) => {
            let colors = '';
            if (variant === 'filled') colors = 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)]';
            if (variant === 'tonal') colors = 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]';
            if (variant === 'outlined') colors = 'border border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-primary)]';
            if (variant === 'error') colors = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';
            if (variant === 'text') colors = 'text-[var(--md-sys-color-primary)] bg-transparent';

            return (
                <Ripple className={`h-10 px-6 rounded-full flex items-center justify-center font-medium text-sm transition-shadow ${fullWidth ? 'w-full' : ''} ${colors} ${className}`} onClick={onClick}>
                    {icon && <span className="material-symbols-rounded mr-2 text-[18px]">{icon}</span>}
                    {children}
                </Ripple>
            );
        };

        // 3. M3 TextField
        const TextField = ({ label, value, onChange, icon, type="text", inputMode="text", multiline, prefix }) => {
            return (
                <div className="m3-text-field">
                    {icon && <span className="material-symbols-rounded m3-icon icon-outlined">{icon}</span>}
                    {multiline ? (
                        <textarea 
                            className={`m3-input no-scrollbar resize-none ${icon ? 'has-icon' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)}
                            placeholder=" " rows="3"
                        />
                    ) : (
                        <input 
                            type={type} inputMode={inputMode}
                            className={`m3-input ${icon ? 'has-icon' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)}
                            placeholder=" "
                        />
                    )}
                    <label className="m3-label">{label}</label>
                    {prefix && value && (
                        <span className="absolute right-4 top-[24px] text-sm text-[var(--md-sys-color-on-surface-variant)]">{prefix}</span>
                    )}
                </div>
            );
        };

        // 4. Bottom Sheet Dialog
        const BottomSheet = ({ isOpen, onClose, title, children }) => {
            const [isClosing, setIsClosing] = useState(false);

            useEffect(() => {
                if (isOpen) setIsClosing(false);
            }, [isOpen]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(() => {
                    onClose();
                    setIsClosing(false);
                }, 350); // wait for animation
            };

            if (!isOpen && !isClosing) return null;

            return (
                <div className="fixed inset-0 z-50 flex flex-col justify-end">
                    {/* Backdrop */}
                    <div className={`absolute inset-0 bg-black/40 ${isClosing ? 'opacity-0' : 'animate-overlay-in'} transition-opacity duration-300`} 
                         onClick={handleClose} />
                    
                    {/* Sheet Content */}
                    <div className={`relative w-full max-h-[90vh] flex flex-col rounded-t-[var(--md-shape-xl)] bg-[var(--md-sys-color-surface-container-low)] shadow-2xl ${isClosing ? 'animate-sheet-down' : 'animate-sheet-up'}`}
                         style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        
                        {/* Drag Handle */}
                        <div className="w-full flex justify-center pt-4 pb-2" onClick={handleClose}>
                            <div className="w-8 h-1 rounded-full bg-[var(--md-sys-color-outline-variant)] opacity-50" />
                        </div>

                        {/* Header */}
                        <div className="px-6 pb-2 flex justify-between items-center shrink-0">
                            <h2 className="text-[22px] font-normal text-[var(--md-sys-color-on-surface)]">{title}</h2>
                            <button onClick={handleClose} className="w-8 h-8 rounded-full flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)] bg-[var(--md-sys-color-surface-container-highest)]">
                                <span className="material-symbols-rounded text-xl">close</span>
                            </button>
                        </div>

                        {/* Scrollable Body */}
                        <div className="px-6 pb-6 overflow-y-auto no-scrollbar">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // 5. Switch
        const Switch = ({ checked, onChange }) => (
            <div className={`m3-switch-track ${checked ? 'active' : ''}`} onClick={() => onChange(!checked)}>
                <div className="m3-switch-thumb">
                    <span className="material-symbols-rounded m3-switch-icon">check</span>
                </div>
            </div>
        );

        // 6. Snackbar Presenter
        const SnackbarContainer = () => {
            const { snackbars } = useContext(AppContext);
            return (
                <div className="fixed bottom-[100px] left-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                    {snackbars.map(snack => (
                        <div key={snack.id} className="bg-[var(--md-sys-color-inverse-surface)] text-[var(--md-sys-color-inverse-on-surface)] px-4 py-3 rounded-[var(--md-shape-xs)] shadow-lg animate-page flex items-center justify-between"
                             style={{ backgroundColor: 'var(--md-sys-color-on-surface)', color: 'var(--md-sys-color-surface)' }}>
                            <span className="text-sm">{snack.message}</span>
                        </div>
                    ))}
                </div>
            );
        };


        // ==========================================================================
        // APP SCREENS
        // ==========================================================================

        // --- SPLASH / FULLSCREEN ENABLER ---
        const SplashScreen = () => {
            const { settings, setSettings } = useContext(AppContext);
            
            const startApp = async () => {
                try {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    }
                } catch (e) {
                    console.log("Fullscreen not supported or denied", e);
                }
                setSettings(s => ({...s, hasStarted: true}));
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col items-center justify-center bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] p-6 relative">
                    <div className="w-24 h-24 rounded-3xl bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] flex items-center justify-center mb-6 shadow-2xl animate-fab">
                        <span className="material-symbols-rounded text-[48px]">storefront</span>
                    </div>
                    <h1 className="text-4xl font-normal mb-2 text-center animate-page" style={{animationDelay: '0.1s'}}>Zona Poncell</h1>
                    <p className="text-primary-container opacity-80 mb-12 text-center animate-page" style={{animationDelay: '0.2s'}}>Sistem Manajemen Konter Cerdas (M3)</p>
                    
                    <div className="absolute bottom-12 w-full px-6 flex justify-center animate-page" style={{animationDelay: '0.4s'}}>
                        <Ripple className="w-full max-w-sm h-14 bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] rounded-full flex items-center justify-center font-medium text-lg shadow-lg" onClick={startApp}>
                            Mulai Aplikasi
                            <span className="material-symbols-rounded ml-2">arrow_forward</span>
                        </Ripple>
                    </div>
                </div>
            );
        };

        // --- TAB 1: DASBOR (BERANDA) ---
        const TabDasbor = () => {
            const { transactions, settings } = useContext(AppContext);
            
            // Calc current month stats
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            
            const monthData = transactions.filter(d => {
                const date = new Date(d.tanggal);
                return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
            });

            const laba = monthData.filter(d => d.status === 'Selesai').reduce((sum, item) => sum + item.laba, 0);
            const omset = monthData.filter(d => d.status === 'Selesai').reduce((sum, item) => sum + item.jual, 0);
            const activeJobs = transactions.filter(d => d.status === 'Proses').length;
            
            const greeting = new Date().getHours() < 12 ? 'Selamat Pagi' : new Date().getHours() < 18 ? 'Selamat Siang' : 'Selamat Malam';

            return (
                <div className="p-4 space-y-6 animate-page pb-24" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    {/* Header */}
                    <div className="flex justify-between items-center mb-2">
                        <div>
                            <p className="text-sm text-[var(--md-sys-color-on-surface-variant)]">{greeting},</p>
                            <h1 className="text-2xl font-medium text-[var(--md-sys-color-on-surface)]">{settings.ownerName}</h1>
                        </div>
                        <div className="w-12 h-12 rounded-full bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] flex items-center justify-center shadow-sm">
                            <span className="material-symbols-rounded">store</span>
                        </div>
                    </div>

                    {/* Main Card (Hero) */}
                    <div className="p-6 rounded-[var(--md-shape-2xl)] bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] relative overflow-hidden shadow-lg">
                        {/* Background Decoration */}
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-bl-full transform translate-x-8 -translate-y-8"></div>
                        
                        <p className="text-sm opacity-90 font-light tracking-wide mb-1">Laba Bersih Bulan Ini</p>
                        <h2 className="text-[36px] font-normal tracking-tight mb-6">Rp{formatRupiah(laba)}</h2>
                        
                        <div className="flex gap-4">
                            <div className="bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] px-4 py-2 rounded-[var(--md-shape-lg)] flex-1 flex flex-col">
                                <span className="text-[10px] uppercase font-bold opacity-80">Omset</span>
                                <span className="font-medium text-sm">Rp{formatRupiah(omset)}</span>
                            </div>
                            <div className="bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] px-4 py-2 rounded-[var(--md-shape-lg)] flex-1 flex flex-col">
                                <span className="text-[10px] uppercase font-bold opacity-80">Aktif</span>
                                <span className="font-medium text-sm">{activeJobs} Antrian</span>
                            </div>
                        </div>
                    </div>

                    {/* Quick Stats / Small Cards */}
                    <div className="grid grid-cols-2 gap-4">
                        <div className="p-4 rounded-[var(--md-shape-xl)] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]">
                            <span className="material-symbols-rounded mb-2 text-2xl">build_circle</span>
                            <h3 className="font-medium">Servis</h3>
                            <p className="text-sm opacity-80">{monthData.filter(d=>d.jenis==='Servis').length} Selesai</p>
                        </div>
                        <div className="p-4 rounded-[var(--md-shape-xl)] bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)]">
                            <span className="material-symbols-rounded mb-2 text-2xl">shopping_bag</span>
                            <h3 className="font-medium">Penjualan</h3>
                            <p className="text-sm opacity-80">{monthData.filter(d=>d.jenis!=='Servis').length} Item</p>
                        </div>
                    </div>

                    {/* Recent Activity */}
                    <div>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-medium text-[var(--md-sys-color-on-surface)]">Aktivitas Terakhir</h3>
                        </div>
                        <div className="space-y-3">
                            {transactions.slice(0, 5).map((item, index) => (
                                <ActivityItem key={item.id} item={item} delay={index * 0.05} />
                            ))}
                            {transactions.length === 0 && (
                                <p className="text-center text-[var(--md-sys-color-on-surface-variant)] py-4">Belum ada transaksi</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Helper for List Item
        const ActivityItem = ({ item, delay = 0, onClick }) => {
            const isServis = item.jenis === 'Servis';
            const icon = isServis ? 'build' : item.jenis === 'Sparepart' ? 'memory' : 'headphones';
            
            let statusColor = 'bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)]';
            if (item.status === 'Selesai') statusColor = 'bg-[var(--md-sys-color-success-container)] text-[var(--md-sys-color-on-success-container)]';
            if (item.status === 'Proses') statusColor = 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]';
            if (item.status === 'Batal') statusColor = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            return (
                <div onClick={onClick} className="flex items-center gap-4 p-4 bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-xl)] shadow-sm ripple-root" 
                     style={{ animation: `staggerFade 0.4s ${delay}s ease forwards`, opacity: 0 }}>
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${statusColor}`}>
                        <span className="material-symbols-rounded">{icon}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="font-medium text-[var(--md-sys-color-on-surface)] truncate text-base">{item.nama}</h4>
                        <p className="text-xs text-[var(--md-sys-color-on-surface-variant)] truncate">{formatDateShort(item.tanggal)} • {item.pelanggan}</p>
                    </div>
                    <div className="text-right shrink-0">
                        <p className="font-medium text-[var(--md-sys-color-primary)] text-sm mb-0.5">Rp{formatRupiah(item.laba)}</p>
                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${statusColor}`}>{item.status}</span>
                    </div>
                </div>
            );
        }

        // --- TAB 2: RIWAYAT (HISTORY) ---
        const TabRiwayat = () => {
            const { transactions } = useContext(AppContext);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            const [selectedItem, setSelectedItem] = useState(null);

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    const matchSearch = t.nama.toLowerCase().includes(search.toLowerCase()) || 
                                        t.pelanggan.toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            return (
                <div className="flex flex-col h-full animate-page" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    {/* Header Sticky Area */}
                    <div className="px-4 space-y-4 pb-2 z-10 bg-[var(--md-sys-color-surface)]">
                        <h1 className="text-2xl font-medium text-[var(--md-sys-color-on-surface)]">Riwayat Transaksi</h1>
                        
                        {/* M3 Search Bar */}
                        <div className="flex items-center h-14 bg-[var(--md-sys-color-surface-container-high)] rounded-full px-4 text-[var(--md-sys-color-on-surface)]">
                            <span className="material-symbols-rounded mr-3 opacity-70">search</span>
                            <input 
                                type="text" placeholder="Cari nama, pelanggan..." 
                                value={search} onChange={e => setSearch(e.target.value)}
                                className="bg-transparent border-none outline-none flex-1 text-base placeholder:text-[var(--md-sys-color-on-surface-variant)]"
                            />
                            {search && (
                                <span className="material-symbols-rounded cursor-pointer opacity-70 ml-2" onClick={() => setSearch('')}>close</span>
                            )}
                        </div>

                        {/* Filter Chips */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {['Semua', 'Servis', 'Sparepart', 'Aksesoris'].map(f => (
                                <button key={f} onClick={() => setFilterType(f)}
                                    className={`px-4 h-8 rounded-lg text-sm font-medium border transition-colors shrink-0 ${
                                        filterType === f 
                                        ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent' 
                                        : 'border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-on-surface-variant)] bg-transparent'
                                    }`}>
                                    {f}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* List Area */}
                    <div className="flex-1 overflow-y-auto px-4 pb-24 space-y-3 pt-2">
                        {filteredData.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-[var(--md-sys-color-on-surface-variant)]">
                                <span className="material-symbols-rounded text-6xl mb-4 opacity-50">search_off</span>
                                <p>Tidak ada transaksi ditemukan.</p>
                            </div>
                        ) : (
                            filteredData.map((item, index) => (
                                <ActivityItem key={item.id} item={item} onClick={() => setSelectedItem(item)} />
                            ))
                        )}
                    </div>

                    {/* Detail Sheet */}
                    <DetailSheet item={selectedItem} onClose={() => setSelectedItem(null)} />
                </div>
            );
        };

        // --- TAB 3: ANALISIS ---
        const TabAnalisis = () => {
            const { transactions, settings } = useContext(AppContext);
            const chartRefLine = useRef(null);
            const chartRefPie = useRef(null);
            const chartInstLine = useRef(null);
            const chartInstPie = useRef(null);

            // Compute theme colors dynamically for charts
            const getColors = useCallback(() => {
                const style = getComputedStyle(document.body);
                return {
                    primary: style.getPropertyValue('--md-sys-color-primary').trim(),
                    tertiary: style.getPropertyValue('--md-sys-color-tertiary').trim(),
                    error: style.getPropertyValue('--md-sys-color-error').trim(),
                    text: style.getPropertyValue('--md-sys-color-on-surface-variant').trim(),
                    grid: style.getPropertyValue('--md-sys-color-outline-variant').trim(),
                    surface: style.getPropertyValue('--md-sys-color-surface-container').trim()
                };
            }, [settings.theme, settings.isDark]);

            useEffect(() => {
                if (transactions.length === 0) return;
                
                const colors = getColors();

                // Destroy old charts
                if (chartInstLine.current) chartInstLine.current.destroy();
                if (chartInstPie.current) chartInstPie.current.destroy();

                // Data Line Chart (Last 7 Days)
                const last7 = [...Array(7)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - (6 - i));
                    return d.toISOString().split('T')[0];
                });
                const laba7 = last7.map(date => transactions.filter(t => t.tanggal.startsWith(date) && t.status === 'Selesai').reduce((s,i) => s + i.laba, 0));
                const omset7 = last7.map(date => transactions.filter(t => t.tanggal.startsWith(date) && t.status === 'Selesai').reduce((s,i) => s + i.jual, 0));
                const labels7 = last7.map(d => new Date(d).toLocaleDateString('id-ID', { weekday:'short'}));

                // Draw Line Chart
                const ctxLine = chartRefLine.current.getContext('2d');
                chartInstLine.current = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: labels7,
                        datasets: [
                            { label: 'Laba', data: laba7, borderColor: colors.primary, backgroundColor: `${colors.primary}33`, fill: true, tension: 0.4 },
                            { label: 'Omset', data: omset7, borderColor: colors.tertiary, borderDash: [5,5], tension: 0.4 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: colors.text, font: {family: 'Readex Pro'} } } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: colors.text } },
                            y: { grid: { color: colors.grid }, ticks: { color: colors.text, callback: v => `Rp${v/1000}k` } }
                        }
                    }
                });

                // Data Pie Chart
                const counts = ['Servis', 'Sparepart', 'Aksesoris'].map(j => transactions.filter(t => t.jenis === j && t.status === 'Selesai').length);

                // Draw Pie Chart
                const ctxPie = chartRefPie.current.getContext('2d');
                chartInstPie.current = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: ['Servis', 'Sparepart', 'Aksesoris'],
                        datasets: [{ data: counts, backgroundColor: [colors.primary, colors.tertiary, colors.error], borderWidth: 0 }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '75%',
                        plugins: { legend: { position: 'bottom', labels: { color: colors.text, padding: 20, font: {family: 'Readex Pro'} } } }
                    }
                });

                return () => {
                    if (chartInstLine.current) chartInstLine.current.destroy();
                    if (chartInstPie.current) chartInstPie.current.destroy();
                }

            }, [transactions, settings.theme, settings.isDark, getColors]);

            // KPIs
            const totalSelesai = transactions.filter(t => t.status === 'Selesai');
            const totalOmset = totalSelesai.reduce((s,i) => s + i.jual, 0);
            const totalLaba = totalSelesai.reduce((s,i) => s + i.laba, 0);
            const margin = totalOmset > 0 ? ((totalLaba / totalOmset) * 100).toFixed(1) : 0;

            return (
                <div className="p-4 space-y-6 animate-page pb-24 overflow-y-auto h-full no-scrollbar" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-2xl font-medium text-[var(--md-sys-color-on-surface)] mb-2">Analisis Bisnis</h1>
                    
                    {/* KPI Cards */}
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-[var(--md-sys-color-surface-container)] p-4 rounded-[var(--md-shape-xl)]">
                            <p className="text-xs text-[var(--md-sys-color-on-surface-variant)] mb-1">Total Margin</p>
                            <h2 className="text-2xl text-[var(--md-sys-color-primary)]">{margin}%</h2>
                        </div>
                        <div className="bg-[var(--md-sys-color-surface-container)] p-4 rounded-[var(--md-shape-xl)]">
                            <p className="text-xs text-[var(--md-sys-color-on-surface-variant)] mb-1">Total Pekerjaan</p>
                            <h2 className="text-2xl text-[var(--md-sys-color-tertiary)]">{totalSelesai.length}</h2>
                        </div>
                    </div>

                    {/* Line Chart */}
                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)]">
                        <h3 className="font-medium text-[var(--md-sys-color-on-surface)] mb-4">Tren 7 Hari (Selesai)</h3>
                        <div className="h-64 relative">
                            {transactions.length > 0 ? <canvas ref={chartRefLine}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)]">Data tidak cukup</p>}
                        </div>
                    </div>

                    {/* Pie Chart */}
                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)]">
                        <h3 className="font-medium text-[var(--md-sys-color-on-surface)] mb-4">Distribusi Kategori</h3>
                        <div className="h-64 relative">
                            {transactions.length > 0 ? <canvas ref={chartRefPie}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)]">Data tidak cukup</p>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 4: SETING ---
        const TabSeting = () => {
            const { settings, setSettings, transactions, setTransactions, showSnackbar } = useContext(AppContext);

            const themes = [
                { id: 'blue', color: '#0061a4', name: 'Standard' },
                { id: 'green', color: '#146c2e', name: 'Green' },
                { id: 'orange', color: '#8f4c00', name: 'Orange' }
            ];

            const handleBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `Backup_ZonaPoncell_${new Date().toISOString().split('T')[0]}.json`);
                dlAnchorElem.click();
                showSnackbar('Data berhasil di-backup', 'success');
            };

            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if(Array.isArray(json)) {
                            setTransactions(json);
                            showSnackbar('Data berhasil dipulihkan', 'success');
                        }
                    } catch(err) {
                        showSnackbar('Format file tidak valid!', 'error');
                    }
                };
                reader.readAsText(file);
            };

            const handleClear = () => {
                if(confirm('Peringatan: Semua data transaksi akan dihapus permanen. Yakin?')) {
                    setTransactions([]);
                    showSnackbar('Data dibersihkan');
                }
            };

            return (
                <div className="p-4 space-y-6 animate-page pb-24 overflow-y-auto h-full no-scrollbar" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-2xl font-medium text-[var(--md-sys-color-on-surface)] mb-4">Seting Aplikasi</h1>
                    
                    {/* Profil Section */}
                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-2xl)] p-5 space-y-4 shadow-sm">
                        <h3 className="text-sm font-medium text-[var(--md-sys-color-primary)]">Profil Bisnis</h3>
                        <TextField label="Nama Toko" value={settings.storeName} onChange={v => setSettings({...settings, storeName: v})} icon="store" />
                        <TextField label="Nama Pemilik" value={settings.ownerName} onChange={v => setSettings({...settings, ownerName: v})} icon="person" />
                    </div>

                    {/* Tampilan Section */}
                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-2xl)] p-5 space-y-5 shadow-sm">
                        <h3 className="text-sm font-medium text-[var(--md-sys-color-primary)]">Tampilan (Material You)</h3>
                        
                        <div className="flex justify-between items-center">
                            <div className="text-[var(--md-sys-color-on-surface)]">
                                <p className="font-medium">Mode Gelap</p>
                                <p className="text-xs text-[var(--md-sys-color-on-surface-variant)]">Nyaman untuk mata di malam hari</p>
                            </div>
                            <Switch checked={settings.isDark} onChange={v => setSettings({...settings, isDark: v})} />
                        </div>

                        <div className="pt-2 border-t border-[var(--md-sys-color-outline-variant)]">
                            <p className="font-medium text-[var(--md-sys-color-on-surface)] mb-3">Warna Dinamis (Tema)</p>
                            <div className="flex gap-4">
                                {themes.map(t => (
                                    <div key={t.id} onClick={() => setSettings({...settings, theme: t.id})}
                                         className={`w-12 h-12 rounded-full flex items-center justify-center cursor-pointer transition-transform ${settings.theme === t.id ? 'scale-110 shadow-md ring-2 ring-[var(--md-sys-color-on-surface)] ring-offset-2 ring-offset-[var(--md-sys-color-surface)]' : 'scale-100'}`}
                                         style={{ backgroundColor: t.color }}>
                                         {settings.theme === t.id && <span className="material-symbols-rounded text-white">check</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Data Section */}
                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-2xl)] p-5 space-y-2 shadow-sm">
                        <h3 className="text-sm font-medium text-[var(--md-sys-color-primary)] mb-2">Manajemen Data</h3>
                        <Ripple className="w-full flex items-center p-3 rounded-[var(--md-shape-lg)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] cursor-pointer" onClick={handleBackup}>
                            <span className="material-symbols-rounded mr-4 text-[var(--md-sys-color-secondary)]">download</span>
                            <div className="text-left">
                                <p className="font-medium">Backup Data</p>
                                <p className="text-xs opacity-70">Simpan sebagai file JSON</p>
                            </div>
                        </Ripple>
                        <label className="w-full flex items-center p-3 rounded-[var(--md-shape-lg)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] cursor-pointer">
                            <span className="material-symbols-rounded mr-4 text-[var(--md-sys-color-tertiary)]">upload</span>
                            <div className="text-left">
                                <p className="font-medium">Restore Data</p>
                                <p className="text-xs opacity-70">Muat dari file JSON</p>
                            </div>
                            <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                        </label>
                        <Ripple className="w-full flex items-center p-3 rounded-[var(--md-shape-lg)] text-[var(--md-sys-color-error)] hover:bg-[var(--md-sys-color-error-container)] cursor-pointer" onClick={handleClear}>
                            <span className="material-symbols-rounded mr-4">delete_forever</span>
                            <div className="text-left">
                                <p className="font-medium">Hapus Semua Data</p>
                                <p className="text-xs opacity-70">Tindakan ini tidak bisa dibatalkan</p>
                            </div>
                        </Ripple>
                    </div>
                    
                    <p className="text-center text-xs text-[var(--md-sys-color-on-surface-variant)] pt-4 pb-8">Versi M3 Expressive • Dibuat untuk Efisiensi</p>
                </div>
            );
        };

        // --- FORM TAMBAH TRANSAKSI (BOTTOM SHEET) ---
        const AddTransactionSheet = ({ isOpen, onClose }) => {
            const { setTransactions, showSnackbar } = useContext(AppContext);
            
            // Form State
            const [jenis, setJenis] = useState('Servis');
            const [nama, setNama] = useState('');
            const [pelanggan, setPelanggan] = useState('');
            const [modalStr, setModalStr] = useState('');
            const [jualStr, setJualStr] = useState('');
            const [catatan, setCatatan] = useState('');

            // Reset form when opened
            useEffect(() => {
                if (isOpen) {
                    setJenis('Servis'); setNama(''); setPelanggan(''); setModalStr(''); setJualStr(''); setCatatan('');
                }
            }, [isOpen]);

            const handleSave = () => {
                if(!nama.trim() || !jualStr) {
                    showSnackbar('Nama dan Harga Jual wajib diisi', 'error');
                    return;
                }
                
                const m = getRawNumber(modalStr);
                const j = getRawNumber(jualStr);
                
                const newData = {
                    id: generateId(),
                    tanggal: new Date().toISOString(),
                    jenis,
                    nama: nama.trim(),
                    pelanggan: pelanggan.trim() || 'Umum',
                    modal: m,
                    jual: j,
                    laba: j - m,
                    status: 'Proses', // Default for new items
                    catatan: catatan.trim()
                };

                setTransactions(prev => [newData, ...prev]);
                showSnackbar('Transaksi berhasil dicatat');
                onClose();
            };

            const laba = getRawNumber(jualStr) - getRawNumber(modalStr);

            return (
                <BottomSheet isOpen={isOpen} onClose={onClose} title="Catat Transaksi">
                    <div className="space-y-5 pt-2 pb-6">
                        {/* Segmented Button (Jenis) */}
                        <div className="flex border border-[var(--md-sys-color-outline)] rounded-full overflow-hidden h-10">
                            {['Servis', 'Sparepart', 'Aksesoris'].map(j => (
                                <button key={j} type="button" onClick={() => setJenis(j)}
                                    className={`flex-1 text-sm font-medium transition-colors ${
                                        jenis === j ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]' 
                                        : 'text-[var(--md-sys-color-on-surface)] bg-transparent hover:bg-[var(--md-sys-color-surface-variant)]'
                                    }`}>
                                    {j}
                                </button>
                            ))}
                        </div>

                        <TextField label="Nama Barang / Kerusakan" value={nama} onChange={setNama} icon={jenis==='Servis'?'build':'shopping_bag'} />
                        <TextField label="Nama Pelanggan (Opsional)" value={pelanggan} onChange={setPelanggan} icon="person" />
                        
                        <div className="grid grid-cols-2 gap-4">
                            {/* Modal now editable for Servis as requested */}
                            <TextField 
                                label={jenis === 'Servis' ? 'Biaya Modal (Opsional)' : 'Harga Modal'} 
                                value={modalStr ? formatRupiah(getRawNumber(modalStr)) : ''} 
                                onChange={v => setModalStr(v)} 
                                inputMode="numeric" prefix="Rp" 
                            />
                            <TextField 
                                label="Harga Jual / Biaya" 
                                value={jualStr ? formatRupiah(getRawNumber(jualStr)) : ''} 
                                onChange={v => setJualStr(v)} 
                                inputMode="numeric" prefix="Rp" 
                            />
                        </div>

                        <TextField label="Catatan Tambahan" value={catatan} onChange={setCatatan} icon="notes" multiline />

                        {/* Profit preview */}
                        <div className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-4 rounded-[var(--md-shape-xl)] flex justify-between items-center">
                            <span className="text-sm font-medium">Estimasi Laba</span>
                            <span className="text-xl font-medium">Rp{formatRupiah(laba)}</span>
                        </div>

                        <Button onClick={handleSave} icon="save" fullWidth className="mt-6 h-12 text-base">
                            Simpan Catatan
                        </Button>
                    </div>
                </BottomSheet>
            );
        };

        // --- SHEET DETAIL TRANSAKSI ---
        const DetailSheet = ({ item, onClose }) => {
            const { setTransactions, showSnackbar } = useContext(AppContext);

            if (!item) return null;

            const updateStatus = (newStatus) => {
                setTransactions(prev => prev.map(t => t.id === item.id ? {...t, status: newStatus} : t));
                showSnackbar(`Status diubah menjadi ${newStatus}`);
                onClose(); // auto close on status change for speed
            };

            const handleDelete = () => {
                if(confirm('Hapus transaksi ini secara permanen?')) {
                    setTransactions(prev => prev.filter(t => t.id !== item.id));
                    showSnackbar('Transaksi dihapus');
                    onClose();
                }
            };

            let statusColor = 'text-[var(--md-sys-color-on-surface-variant)]';
            if (item.status === 'Selesai') statusColor = 'text-[var(--md-sys-color-success)]';
            if (item.status === 'Proses') statusColor = 'text-[var(--md-sys-color-primary)]';
            if (item.status === 'Batal') statusColor = 'text-[var(--md-sys-color-error)]';

            return (
                <BottomSheet isOpen={!!item} onClose={onClose} title="Detail Transaksi">
                    <div className="space-y-6 pt-2 pb-6">
                        {/* Header Info */}
                        <div className="text-center">
                            <h2 className="text-2xl font-normal text-[var(--md-sys-color-on-surface)] mb-1">{item.nama}</h2>
                            <p className="text-[var(--md-sys-color-on-surface-variant)] text-sm">{formatDateLong(item.tanggal)}</p>
                            <p className="text-[var(--md-sys-color-on-surface-variant)] text-sm mt-1 flex items-center justify-center gap-1">
                                <span className="material-symbols-rounded text-sm">person</span> {item.pelanggan}
                            </p>
                        </div>

                        {/* Financials */}
                        <div className="bg-[var(--md-sys-color-surface-container)] rounded-[var(--md-shape-2xl)] p-5">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-sm text-[var(--md-sys-color-on-surface-variant)]">Harga Modal</span>
                                <span className="font-medium text-[var(--md-sys-color-error)]">Rp{formatRupiah(item.modal)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-sm text-[var(--md-sys-color-on-surface-variant)]">Harga Jual</span>
                                <span className="font-medium text-[var(--md-sys-color-success)]">Rp{formatRupiah(item.jual)}</span>
                            </div>
                            <div className="border-t border-[var(--md-sys-color-outline-variant)] pt-4 flex justify-between items-center">
                                <span className="font-medium text-[var(--md-sys-color-on-surface)]">Laba Bersih</span>
                                <span className="text-2xl font-medium text-[var(--md-sys-color-primary)]">Rp{formatRupiah(item.laba)}</span>
                            </div>
                        </div>

                        {item.catatan && (
                            <div className="bg-[var(--md-sys-color-surface-variant)] p-4 rounded-[var(--md-shape-lg)] text-[var(--md-sys-color-on-surface-variant)]">
                                <p className="text-xs font-medium mb-1">Catatan:</p>
                                <p className="text-sm italic">{item.catatan}</p>
                            </div>
                        )}

                        {/* Status Actions */}
                        <div>
                            <p className="text-sm font-medium text-[var(--md-sys-color-on-surface)] mb-3">Ubah Status Pekerjaan</p>
                            <div className="flex gap-2">
                                {['Proses', 'Selesai', 'Batal'].map(s => (
                                    <button key={s} onClick={() => updateStatus(s)}
                                        className={`flex-1 h-10 rounded-full text-sm font-medium border transition-colors ${
                                            item.status === s 
                                            ? `bg-[var(--md-sys-color-${s==='Selesai'?'success':s==='Proses'?'primary':'error'}-container)] text-[var(--md-sys-color-on-${s==='Selesai'?'success':s==='Proses'?'primary':'error'}-container)] border-transparent`
                                            : 'border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)]'
                                        }`}>
                                        {s}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <Button variant="text" icon="delete" fullWidth className="text-[var(--md-sys-color-error)] mt-4" onClick={handleDelete}>
                            Hapus Permanen
                        </Button>
                    </div>
                </BottomSheet>
            );
        };


        // ==========================================================================
        // MAIN APP SHELL (NAVIGATION & ROUTING)
        // ==========================================================================
        const MainApp = () => {
            const { settings } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('dasbor');
            const [isAddOpen, setIsAddOpen] = useState(false);

            if (!settings.hasStarted) return <SplashScreen />;

            const tabs = [
                { id: 'dasbor', icon: 'home', label: 'Beranda' },
                { id: 'riwayat', icon: 'receipt_long', label: 'Riwayat' },
                { id: 'analisis', icon: 'analytics', label: 'Analisis' },
                { id: 'seting', icon: 'settings', label: 'Seting' }
            ];

            return (
                <div className="h-[100dvh] w-full max-w-lg mx-auto flex flex-col relative bg-[var(--md-sys-color-background)] overflow-hidden sm:border-x sm:border-[var(--md-sys-color-outline-variant)] sm:shadow-2xl">
                    
                    {/* Content Area */}
                    <main className="flex-1 overflow-hidden relative">
                        {activeTab === 'dasbor' && <TabDasbor />}
                        {activeTab === 'riwayat' && <TabRiwayat />}
                        {activeTab === 'analisis' && <TabAnalisis />}
                        {activeTab === 'seting' && <TabSeting />}
                    </main>

                    {/* Extended FAB - Hidden only on settings tab */}
                    <div className={`absolute right-4 transition-all duration-300 z-20 ${activeTab === 'seting' ? 'opacity-0 scale-75 pointer-events-none translate-y-10' : 'opacity-100 scale-100'}`}
                         style={{ bottom: 'calc(96px + var(--sa-bottom))' }}>
                        <Ripple onClick={() => setIsAddOpen(true)} className="m3-fab flex items-center h-14 px-5 cursor-pointer">
                            <span className="material-symbols-rounded mr-3">edit</span>
                            <span className="font-medium">Catat</span>
                        </Ripple>
                    </div>

                    {/* M3 Bottom Navigation Bar */}
                    <nav className="h-20 shrink-0 bg-[var(--md-sys-color-surface-container)] flex justify-around items-center px-2 z-30 pb-[var(--sa-bottom)]">
                        {tabs.map(t => {
                            const active = activeTab === t.id;
                            return (
                                <Ripple key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 cursor-pointer relative group">
                                    <div className={`w-16 h-8 rounded-full flex items-center justify-center transition-colors duration-300 ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                    </div>
                                    <span className={`text-[12px] font-medium mt-1 transition-colors ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>
                                        {t.label}
                                    </span>
                                </Ripple>
                            );
                        })}
                    </nav>

                    {/* Global Overlays */}
                    <AddTransactionSheet isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} />
                    <SnackbarContainer />
                </div>
            );
        };

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <MainApp />
            </AppProvider>
        );
    </script>
</body>
</html>

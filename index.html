        /* ==========================================================================
           GLOBAL UTILITIES & ANTI-SELECTION
           ========================================================================== */
        body { 
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            margin: 0; padding: 0; overflow: hidden;
            transition: background-color 0.4s cubic-bezier(0.2, 0, 0, 1), color 0.4s ease;
            
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-x: none;
        }

        input, textarea { -webkit-user-select: auto; user-select: auto; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; 
            display: inline-block; transition: all 0.2s ease;
        }
        .icon-outlined { font-variation-settings: 'FILL' 0; }

        /* ==========================================================================
           ANIMATIONS & TAB LAYERS
           ========================================================================== */
        .spring-bounce { transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes pageFadeIn { 0% { opacity: 0; transform: translateY(20px) scale(0.97); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-page { animation: pageFadeIn 0.6s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }

        .tab-layer { will-change: transform, opacity; }

        @keyframes slideUpSheet { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-sheet-up { animation: slideUpSheet 0.5s cubic-bezier(0.2, 0, 0, 1) forwards; }
        @keyframes slideDownSheet { 0% { transform: translateY(0); } 100% { transform: translateY(100%); } }
        .animate-sheet-down { animation: slideDownSheet 0.4s cubic-bezier(0.3, 0, 0.8, 0.15) forwards; }
        @keyframes slideDownAppBar { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        .animate-appbar-down { animation: slideDownAppBar 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }
        @keyframes fadeInOverlay { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-overlay-in { animation: fadeInOverlay 0.4s ease forwards; }

        /* ==========================================================================
           CUSTOM COMPONENTS STYLES
           ========================================================================== */
        
        .ripple-root { position: relative; overflow: hidden; cursor: pointer; }
        .ripple-span {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-animation 0.6s linear; background-color: currentColor;
            opacity: 0.15; pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .m3-text-field {
            position: relative; background-color: var(--md-sys-color-surface-container-highest);
            border-radius: var(--md-shape-lg); display: flex; flex-direction: column; min-height: 64px; 
            border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
        }
        .m3-text-field:focus-within { background-color: var(--md-sys-color-surface-container); border-color: var(--md-sys-color-primary); transform: scale(1.02); }
        .m3-input { width: 100%; border: none; outline: none; background: transparent; padding: 28px 16px 12px 16px; font-size: 16px; font-weight: 600; color: var(--md-sys-color-on-surface); font-family: inherit; }
        .m3-input.has-icon { padding-left: 56px; }
        .m3-label { position: absolute; left: 16px; top: 20px; pointer-events: none; color: var(--md-sys-color-on-surface-variant); font-size: 16px; font-weight: 500; transition: 0.3s cubic-bezier(0.34, 1.3, 0.64, 1); transform-origin: left top; }
        .m3-input.has-icon ~ .m3-label { left: 56px; }
        .m3-input:focus ~ .m3-label, .m3-input.has-value ~ .m3-label { transform: translateY(-12px) scale(0.75); color: var(--md-sys-color-primary); }
        .m3-input.has-value:not(:focus) ~ .m3-label { color: var(--md-sys-color-on-surface-variant); }
        .m3-icon { position: absolute; left: 16px; top: 20px; pointer-events: none; color: var(--md-sys-color-on-surface-variant); }
        .m3-input:focus ~ .m3-icon { color: var(--md-sys-color-primary); }

        .m3-slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: var(--md-sys-color-surface-variant); outline: none; }
        .m3-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--md-sys-color-primary); cursor: pointer; box-shadow: 0 0 0 6px var(--md-sys-color-surface); transition: 0.2s; }
        .m3-slider::-webkit-slider-thumb:active { box-shadow: 0 0 0 12px rgba(0, 0, 0, 0.2); }

        /* ==========================================================================
           ANIMATED AMOUNT (ODOMETER ROLL EFFECT PER KARAKTER)
           ========================================================================== */
        .aa-char-slot { display: inline-block; position: relative; overflow: hidden; height: 1.15em; vertical-align: top; }
        .aa-wrap { font-variant-numeric: tabular-nums; }
        .aa-char-face { display: block; }
        .aa-char-anim { animation-duration: var(--aa-duration, 380ms); animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); animation-fill-mode: forwards; }
        .aa-char-out-up   { animation-name: aaOutUp; }
        .aa-char-in-up    { animation-name: aaInUp; }
        .aa-char-out-down { animation-name: aaOutDown; }
        .aa-char-in-down  { animation-name: aaInDown; }
        @keyframes aaOutUp   { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }
        @keyframes aaInUp    { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes aaOutDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }
        @keyframes aaInDown  { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>

<body class="theme-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

        // ==========================================================================
        // UTILITIES & DATA (SAFEGUARDED)
        // ==========================================================================
        const formatRupiah = (angka) => {
            if (!angka && angka !== 0) return '0';
            return new Intl.NumberFormat('id-ID').format(angka);
        };
        const getRawNumber = (str) => parseInt(str?.toString().replace(/[^0-9]/g, ''), 10) || 0;
        
        const formatDateLong = (isoString) => {
            if (!isoString) return '-';
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));
        };
        const formatDateShort = (isoString) => {
            if (!isoString) return '-';
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' }).format(new Date(isoString));
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        const formatModeUang = (angka, isGwBanget, context) => {
            if (isGwBanget) {
                const abs = Math.abs(angka || 0);
                const isNeg = angka < 0;
                let res = '';
                let hasSlang = false;

                const slangs = { 500: 'Gopek', 1000: 'Seceng', 5000: 'Goceng', 10000: 'Ceban', 50000: 'Gocap', 100000: 'Cepek', 150000: 'Pego', 500000000: 'Gotiao' };
                if (slangs[abs]) { res = slangs[abs]; hasSlang = true; } 
                else if (abs < 1000) { res = abs.toString(); } 
                else if (abs < 1000000) { res = Math.round(abs / 1000) + 'k'; } 
                else if (abs < 1000000000) { let val = parseFloat((abs / 1000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Juta'; } 
                else if (abs < 1000000000000) { let val = parseFloat((abs / 1000000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Miliar'; } 
                else { let val = parseFloat((abs / 1000000000000).toFixed(2)); res = val.toString().replace('.', ',') + ' Triliun'; }

                if (isNeg) return `Nombok ${res}`;
                if (context === 'cuan') return hasSlang ? res : (angka < 0 ? `-Rp${res}` : `Rp${res}`);
                return res; 
            } else {
                const valStr = formatRupiah(Math.abs(angka || 0));
                return angka < 0 ? `-Rp${valStr}` : `Rp${valStr}`;
            }
        };

        // Mapping Icon Master
        const ICON_MAP = { 
            'Servis': 'build', 
            'Sparepart': 'memory', 
            'Aksesoris': 'headphones', 
            'Top Up': 'account_balance_wallet',
            'Belanja': 'receipt_long',
            'Rejeki': 'savings'
        };

        // ==========================================================================
        // KOMPONEN: ANIMATED AMOUNT (EFEK ROLL NOMINAL / ODOMETER)
        // ==========================================================================
        const AnimatedChar = ({ char, prevChar, dir, animId, changed, duration }) => {
            const [playing, setPlaying] = useState(false);
            const lastAnimId = useRef(0);

            useEffect(() => {
                if (changed && animId !== lastAnimId.current) {
                    lastAnimId.current = animId;
                    setPlaying(true);
                    const t = setTimeout(() => setPlaying(false), duration + 20);
                    return () => clearTimeout(t);
                }
            }, [animId, changed, duration]);

            const display = char === '\u0000' ? '\u00A0' : char;
            const prevDisplay = prevChar === '\u0000' || prevChar == null ? '\u00A0' : prevChar;
            const outClass = dir === 'up' ? 'aa-char-out-up' : 'aa-char-out-down';
            const inClass = dir === 'up' ? 'aa-char-in-up' : 'aa-char-in-down';

            return (
                <span className="aa-char-slot" style={{ '--aa-duration': `${duration}ms` }}>
                    {playing && (
                        <span className={`aa-char-face aa-char-anim ${outClass}`} style={{ position: 'absolute', inset: 0 }}>{prevDisplay}</span>
                    )}
                    <span className={`aa-char-face ${playing ? `aa-char-anim ${inClass}` : ''}`}>{display}</span>
                </span>
            );
        };

        const AnimatedAmount = ({ value, formatter, duration = 380, className = '' }) => {
            const formatted = formatter(value);
            const prevValueRef = useRef(value);
            const prevFormattedRef = useRef(formatted);
            const animIdRef = useRef(0);
            const settleTimeoutRef = useRef(null);
            const [chars, setChars] = useState(() => formatted.split('').map(c => ({ char: c, prevChar: null, dir: 'up', animId: 0, changed: false })));

            useEffect(() => {
                const oldFormatted = prevFormattedRef.current;
                if (formatted === oldFormatted) return;

                const dir = value >= prevValueRef.current ? 'up' : 'down';
                const maxLen = Math.max(formatted.length, oldFormatted.length);
                const newArr = formatted.padEnd(maxLen, '\u0000').split('');
                const oldArr = oldFormatted.padEnd(maxLen, '\u0000').split('');

                animIdRef.current += 1;
                const id = animIdRef.current;

                setChars(newArr.map((c, i) => ({
                    char: c, prevChar: oldArr[i], dir, animId: id, changed: oldArr[i] !== c
                })));

                prevValueRef.current = value;
                prevFormattedRef.current = formatted;

                if (settleTimeoutRef.current) clearTimeout(settleTimeoutRef.current);
                settleTimeoutRef.current = setTimeout(() => {
                    setChars(formatted.split('').map(c => ({ char: c, prevChar: null, dir, animId: id, changed: false })));
                }, duration + 40);

                return () => { if (settleTimeoutRef.current) clearTimeout(settleTimeoutRef.current); };
            }, [formatted, value, duration]);

            return (
                <span className={`inline-flex aa-wrap ${className}`} style={{ whiteSpace: 'pre' }}>
                    {chars.map((c, i) => <AnimatedChar key={i} {...c} duration={duration} />)}
                </span>
            );
        };

        const filterByPeriod = (data, format, offset) => {
             const target = new Date();
             if (format === 'Hari') {
                 target.setDate(target.getDate() + offset);
                 const y = target.getFullYear(), m = target.getMonth(), d = target.getDate();
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m && id.getDate() === d; });
             } else if (format === 'Minggu') {
                 target.setDate(target.getDate() + (offset * 7));
                 const day = target.getDay();
                 const diff = target.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(target.setDate(diff)); monday.setHours(0,0,0,0);
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6); sunday.setHours(23,59,59,999);
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id >= monday && id <= sunday; });
             } else {
                 target.setMonth(target.getMonth() + offset);
                 const y = target.getFullYear(), m = target.getMonth();
                 return data.filter(item => { if(!item?.tanggal) return false; const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m; });
             }
        };

        const getPeriodLabel = (format, offset) => {
             const d = new Date();
             if (format === 'Hari') {
                 d.setDate(d.getDate() + offset);
                 if (offset === 0) return 'Hari Ini';
                 if (offset === -1) return 'Kemarin';
                 return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric'}).format(d);
             } else if (format === 'Minggu') {
                 d.setDate(d.getDate() + (offset * 7));
                 const day = d.getDay();
                 const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(d.setDate(diff));
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
                 return `${monday.getDate()} - ${sunday.getDate()} ${new Intl.DateTimeFormat('id-ID', { month: 'short'}).format(sunday)}`;
             } else {
                 d.setMonth(d.getMonth() + offset);
                 if (offset === 0) return 'Bulan Ini';
                 return new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric'}).format(d);
             }
        };

        const getPeriodKey = (format, offset) => {
             const d = new Date();
             if (format === 'Hari') {
                 d.setDate(d.getDate() + offset);
                 return `H-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
             } else if (format === 'Minggu') {
                 d.setDate(d.getDate() + (offset * 7));
                 const day = d.getDay();
                 const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(d.setDate(diff));
                 return `W-${monday.getFullYear()}-${monday.getMonth()}-${monday.getDate()}`;
             } else {
                 d.setMonth(d.getMonth() + offset);
                 return `M-${d.getFullYear()}-${d.getMonth()}`;
             }
        };

        const jsonToCsv = (items) => {
            if (!items || !items.length) return '';
            const headers = ['ID', 'Tanggal', 'Jenis', 'Nama / Keterangan', 'Pelanggan', 'Modal', 'Jual', 'Jumlah', 'Total Laba', 'Status'];
            let csvContent = headers.join(',') + '\r\n';
            items.forEach(item => {
                const row = [`"${item?.id || ''}"`, `"${item?.tanggal || ''}"`, `"${item?.jenis || ''}"`, `"${(item?.nama || '').replace(/"/g, '""')}"`, `"${(item?.pelanggan || '').replace(/"/g, '""')}"`, item?.modal || 0, item?.jual || 0, item?.jumlah || 1, item?.laba || 0, `"${item?.status || ''}"`];
                csvContent += row.join(',') + '\r\n';
            });
            return csvContent;
        };

        const TABS_ORDER = ['dasbor', 'catet', 'riwayat', 'analisis', 'seting'];

        // ==========================================================================
        // CONTEXT: GLOBAL STATE
        // ==========================================================================
        const AppContext = createContext();

        const DEFAULT_DAILY_RATE = 100000;

        // Jumlah hari di bulan yang lagi dilihat (ngikutin offset kayak filterByPeriod), buat nurunin target bulanan dari rate harian
        const getDaysInMonthForOffset = (offset) => {
            const d = new Date();
            d.setMonth(d.getMonth() + offset);
            return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        };

        // Satu sumber target (rate harian) diturunin otomatis ke Hari/Minggu/Bulan
        const getTargetForFormat = (dailyRate, format, daysInMonth) => {
            if (format === 'Minggu') return Math.round(dailyRate * 7);
            if (format === 'Bulan') return Math.round(dailyRate * (daysInMonth || 30));
            return Math.round(dailyRate);
        };

        const AppProvider = ({ children }) => {
            const [activeTab, setActiveTab] = useState('dasbor');
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({ theme: 'blue', hasStarted: false, periodFormat: 'Bulan', gwBanget: false, dailyRate: DEFAULT_DAILY_RATE, targetNotifKeys: {} });
            const [snackbars, setSnackbars] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);
            const [loaded, setLoaded] = useState(false);
            const [targetAlert, setTargetAlert] = useState(null);

            useEffect(() => {
                try {
                    const savedDb = localStorage.getItem('zp_m3_data');
                    if (savedDb) {
                        const parsed = JSON.parse(savedDb);
                        if (Array.isArray(parsed)) {
                            setTransactions(parsed.map(item => ({...item, jumlah: item.jumlah || 1})));
                        } else {
                            setTransactions([]);
                        }
                    }
                } catch (e) {
                    console.error('Data corrupted, reset to empty.', e);
                    setTransactions([]);
                }

                try {
                    const savedSettings = localStorage.getItem('zp_m3_config');
                    if (savedSettings) {
                        const parsedSettings = JSON.parse(savedSettings);
                        // Migrasi dari versi lama: entah itu 1 target per periode (targets{}), atau 1 target doang (targetDaily)
                        let migratedRate = parsedSettings.dailyRate;
                        if (migratedRate === undefined) {
                            if (parsedSettings.targets && parsedSettings.targets.Hari) migratedRate = parsedSettings.targets.Hari;
                            else if (parsedSettings.targetDaily) migratedRate = parsedSettings.targetDaily;
                        }
                        delete parsedSettings.targets;
                        delete parsedSettings.targetDaily;
                        setSettings(prev => ({...prev, ...parsedSettings, dailyRate: migratedRate !== undefined ? migratedRate : DEFAULT_DAILY_RATE}));
                    }
                } catch (e) {
                    console.error('Settings corrupted, using defaults.');
                }

                setLoaded(true);
            }, []);

            useEffect(() => {
                localStorage.setItem('zp_m3_data', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('zp_m3_config', JSON.stringify(settings));
                const body = document.body;
                body.className = ''; 
                body.classList.add(`theme-${settings.theme}`);

                setTimeout(() => {
                    const surfaceColor = getComputedStyle(document.body).getPropertyValue('--md-sys-color-surface').trim();
                    document.getElementById('meta-theme-color').content = surfaceColor;
                }, 100);
            }, [settings.theme, settings.periodFormat, settings.gwBanget, settings.dailyRate]);

            // Cek otomatis: pas periode (hari/minggu/bulan) yang lagi jalan udah abis, apakah target tercapai?
            // Muncul sekali doang per periode yang udah lewat, ga bakal spam tiap buka app.
            useEffect(() => {
                if (!loaded) return;
                const format = settings.periodFormat;
                const key = getPeriodKey(format, -1);
                const storedKey = (settings.targetNotifKeys || {})[format];

                if (storedKey === key) return;

                if (storedKey === undefined) {
                    // Baseline pertama kali, jangan langsung nongol popup buat periode yang lewat sebelum app ini kepake
                    setSettings(prev => ({ ...prev, targetNotifKeys: { ...(prev.targetNotifKeys || {}), [format]: key } }));
                    return;
                }

                const prevData = filterByPeriod(transactions, format, -1);
                const labaPeriode = prevData.filter(d => d.status === 'Beres').reduce((s, i) => s + (i.laba || 0), 0);
                const daysInMonth = getDaysInMonthForOffset(-1);
                const target = getTargetForFormat(settings.dailyRate || DEFAULT_DAILY_RATE, format, daysInMonth);
                const achieved = labaPeriode >= target;

                setTargetAlert({ format, achieved, laba: labaPeriode, target, kurang: Math.max(target - labaPeriode, 0) });
                setSettings(prev => ({ ...prev, targetNotifKeys: { ...(prev.targetNotifKeys || {}), [format]: key } }));
            }, [loaded, settings.periodFormat, settings.dailyRate, transactions]);

            const showSnackbar = (message) => {
                const id = Date.now();
                setSnackbars(prev => [...prev, { id, message }]);
                setTimeout(() => setSnackbars(prev => prev.filter(s => s.id !== id)), 4000);
            };

            return (
                <AppContext.Provider value={{ transactions, setTransactions, settings, setSettings, snackbars, showSnackbar, selectedItem, setSelectedItem, activeTab, setActiveTab }}>
                    {children}
                    <TargetAlertSheet alert={targetAlert} onClose={() => setTargetAlert(null)} settings={settings} />
                </AppContext.Provider>
            );
        };

        // ==========================================================================
        // M3 UI COMPONENTS
        // ==========================================================================
        const Ripple = ({ children, className = '', onClick, onPointerDown, onPointerUp, onPointerMove, onPointerLeave, style }) => {
            const [ripples, setRipples] = useState([]);
            
            const addRipple = (e) => {
                if (onPointerDown) onPointerDown(e);
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                setRipples(prev => [...prev, { x, y, size, id: Date.now() }]);
            };
            const cleanUp = (e) => {
                if (onPointerUp && e.type === 'pointerup') onPointerUp(e);
                if (onPointerLeave && e.type === 'pointerleave') onPointerLeave(e);
                setTimeout(() => setRipples([]), 600); 
            };
            const handleMove = (e) => { if(onPointerMove) onPointerMove(e); }

            return (
                <div className={`ripple-root active:scale-[0.98] spring-bounce ${className}`} style={style}
                     onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp} onPointerMove={handleMove} onClick={onClick}>
                    {children}
                    {ripples.map(r => (
                        <span key={r.id} className="ripple-span" style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />
                    ))}
                </div>
            );
        };

        const Button = ({ variant = 'filled', children, icon, className='', onClick, fullWidth }) => {
            let colors = '';
            if (variant === 'filled') colors = 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)]';
            if (variant === 'outlined') colors = 'border border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-primary)]';
            if (variant === 'text') colors = 'text-[var(--md-sys-color-primary)] bg-transparent';
            if (variant === 'error') colors = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            return (
                <Ripple className={`h-14 px-8 rounded-full flex items-center justify-center font-bold text-[15px] shadow-md ${fullWidth ? 'w-full' : ''} ${colors} ${className}`} onClick={onClick}>
                    {icon && <span className="material-symbols-rounded mr-2 text-[22px]">{icon}</span>}
                    {children}
                </Ripple>
            );
        };

        const TextField = ({ label, value, onChange, icon, type="text", inputMode="text", prefix }) => {
            const hasVal = value !== null && value !== undefined && value.toString().length > 0;
            return (
                <div className="m3-text-field">
                    {icon && <span className="material-symbols-rounded m3-icon icon-outlined">{icon}</span>}
                    <input type={type} inputMode={inputMode}
                        className={`m3-input ${icon ? 'has-icon' : ''} ${hasVal ? 'has-value' : ''}`}
                        value={value} onChange={e => onChange(e.target.value)} placeholder=" "
                    />
                    <label className="m3-label">{label}</label>
                    {prefix && value && <span className="absolute right-4 top-[28px] text-sm font-bold text-[var(--md-sys-color-primary)]">{prefix}</span>}
                </div>
            );
        };

        const BottomSheet = ({ isOpen, onClose, title, children }) => {
            const [isClosing, setIsClosing] = useState(false);
            const [mounted, setMounted] = useState(false);
            const [dragClosing, setDragClosing] = useState(false);
            const [entering, setEntering] = useState(false);
            const [prevIsOpen, setPrevIsOpen] = useState(false);
            const sheetRef = useRef(null);
            const contentRef = useRef(null);

            if (isOpen !== prevIsOpen) {
                setPrevIsOpen(isOpen);
                if (isOpen) setEntering(true);
            }

            useEffect(() => { setMounted(true); }, []);

            useEffect(() => {
                if (isOpen) window.history.pushState({ modal: title }, '');
                const handlePopState = (e) => { if (isOpen) executeClose(); };
                if (isOpen) window.addEventListener('popstate', handlePopState);
                
                return () => { if (isOpen) window.removeEventListener('popstate', handlePopState); };
            }, [isOpen, title]);

            useEffect(() => {
                if (isOpen && sheetRef.current) {
                    sheetRef.current.style.transition = '';
                    sheetRef.current.style.transform = '';
                    setDragClosing(false);
                }
            }, [isOpen]);

            const executeClose = () => {
                setIsClosing(true);
                setTimeout(() => { onClose(); setIsClosing(false); setDragClosing(false); }, 350); 
            };

            const handleUIClose = () => {
                if (window.history.state && window.history.state.modal === title) {
                    window.history.back(); 
                } else {
                    executeClose();
                }
            };

            useEffect(() => {
                const sheetEl = sheetRef.current;
                const contentEl = contentRef.current;
                if (!sheetEl || !isOpen) return;

                let startY = 0;
                let startTime = 0;
                let dragging = false;
                let verticalIntent = null; 
                let startedInContent = false;

                const onStart = (e) => {
                    startY = e.touches[0].clientY;
                    startTime = Date.now();
                    dragging = true;
                    verticalIntent = null;
                    startedInContent = !!(contentEl && contentEl.contains(e.target));
                    sheetEl.style.transition = 'none';
                    sheetEl.classList.remove('animate-sheet-up', 'animate-sheet-down');
                    setEntering(false);
                };

                const onMove = (e) => {
                    if (!dragging) return;
                    const y = e.touches[0].clientY;
                    const deltaY = y - startY;

                    if (verticalIntent === null) {
                        if (Math.abs(deltaY) > 6) {
                            if (startedInContent) {
                                const atTop = contentEl.scrollTop <= 0;
                                verticalIntent = deltaY > 0 && atTop;
                            } else {
                                verticalIntent = deltaY > 0;
                            }
                        }
                    }

                    if (!verticalIntent) return; 

                    if (e.cancelable) e.preventDefault();

                    let translateY = deltaY;
                    if (deltaY < 0) {
                        const MAX_PULL_UP = 24; 
                        const resisted = deltaY * 0.35;
                        translateY = Math.max(resisted, -MAX_PULL_UP);
                    }

                    sheetEl.style.transform = `translate3d(0, ${translateY}px, 0)`;
                };

                const onEnd = (e) => {
                    if (!dragging) return;
                    dragging = false;
                    if (!verticalIntent) { verticalIntent = null; return; }

                    const y = e.changedTouches[0].clientY;
                    const deltaY = Math.max(y - startY, 0);
                    const elapsed = Math.max(Date.now() - startTime, 1);
                    const velocity = deltaY / elapsed;
                    const sheetHeight = sheetEl.offsetHeight || window.innerHeight;
                    const crossedThreshold = deltaY > sheetHeight * 0.28 || velocity > 0.6;

                    sheetEl.style.transition = 'transform 0.3s cubic-bezier(0.2, 0, 0, 1)';

                    if (crossedThreshold) {
                        sheetEl.style.transform = `translate3d(0, 100%, 0)`;
                        setDragClosing(true);
                        setTimeout(() => { handleUIClose(); }, 280);
                    } else {
                        sheetEl.style.transform = `translate3d(0, 0, 0)`;
                    }
                    verticalIntent = null;
                };

                sheetEl.addEventListener('touchstart', onStart, { passive: true });
                sheetEl.addEventListener('touchmove', onMove, { passive: false });
                sheetEl.addEventListener('touchend', onEnd);

                return () => {
                    sheetEl.removeEventListener('touchstart', onStart);
                    sheetEl.removeEventListener('touchmove', onMove);
                    sheetEl.removeEventListener('touchend', onEnd);
                };
            }, [isOpen, title]);

            if (!mounted) return null;
            if (!isOpen && !isClosing) return null;

            const sheetContent = (
                <div className="fixed inset-0 z-[9999] flex flex-col justify-end" style={{ pointerEvents: 'auto' }}>
                    <div className={`absolute inset-0 bg-black/70 ${isClosing ? 'opacity-0' : 'animate-overlay-in'} transition-all duration-300`} 
                         onClick={handleUIClose} onTouchMove={e => e.preventDefault()} />
                    
                    <div ref={sheetRef} className={`relative w-full max-w-2xl md:max-w-3xl lg:max-w-4xl mx-auto flex flex-col rounded-t-[var(--md-shape-3xl)] bg-[var(--md-sys-color-surface-container-low)] shadow-2xl mt-auto ${isClosing && !dragClosing ? 'animate-sheet-down' : (entering && !isClosing ? 'animate-sheet-up' : '')}`}
                         onAnimationEnd={(e) => { if (e.animationName === 'slideUpSheet') setEntering(false); }}
                         style={{ paddingBottom: 'var(--sa-bottom)', height: '85dvh' }}>
                        
                        <div className="w-full flex justify-center pt-5 pb-3 shrink-0" onClick={handleUIClose}>
                            <div className="w-12 h-1.5 rounded-full bg-[var(--md-sys-color-outline)] opacity-50" />
                        </div>
                        <div className="px-6 pb-2 flex justify-between items-center shrink-0">
                            <h2 className="text-2xl font-bold text-[var(--md-sys-color-on-surface)]">{title}</h2>
                            <button onClick={handleUIClose} className="w-10 h-10 rounded-full flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)] bg-[var(--md-sys-color-surface-container-highest)] hover:bg-[var(--md-sys-color-surface-variant)] spring-bounce active:scale-[0.85]">
                                <span className="material-symbols-rounded text-xl">close</span>
                            </button>
                        </div>
                        <div ref={contentRef} className="px-6 pb-6 flex-1 overflow-y-auto no-scrollbar overscroll-contain">{children}</div>
                    </div>
                </div>
            );

            return ReactDOM.createPortal(sheetContent, document.body);
        };

        const TargetAlertSheet = ({ alert, onClose, settings }) => {
            if (!alert) return null;
            const periodNoun = { Hari: 'Kemarin', Minggu: 'Minggu Lalu', Bulan: 'Bulan Lalu' }[alert.format] || 'Periode Lalu';
            const periodNounLower = periodNoun.toLowerCase();
            const title = alert.achieved ? 'Target Tercapai' : 'Target Belum Tercapai';

            return (
                <BottomSheet isOpen={!!alert} onClose={onClose} title={title}>
                    <div className="space-y-6 pt-2 text-center">
                        <div className={`w-20 h-20 mx-auto rounded-full flex items-center justify-center ${alert.achieved ? 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]' : 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]'}`}>
                            <span className="material-symbols-rounded text-[40px]">{alert.achieved ? 'military_tech' : 'trending_up'}</span>
                        </div>
                        <div>
                            <p className="font-extrabold text-xl text-[var(--md-sys-color-on-surface)] mb-2">
                                {alert.achieved ? `Mantap, target ${periodNounLower} kelar` : `${periodNoun}, target belum kekejar`}
                            </p>
                            <p className="text-[var(--md-sys-color-on-surface-variant)] font-medium">
                                {alert.achieved
                                    ? `Cuan bersih ${periodNounLower} tembus Rp${formatRupiah(alert.laba)} dari target Rp${formatRupiah(alert.target)}. Pertahanin ritmenya bos.`
                                    : `Cuan bersih ${periodNounLower} baru Rp${formatRupiah(Math.max(alert.laba, 0))} dari target Rp${formatRupiah(alert.target)}, kurang Rp${formatRupiah(alert.kurang)} lagi. Gaskeun terus di periode sekarang.`}
                            </p>
                        </div>
                        <Button onClick={onClose} fullWidth className="h-14">Oke, Siap</Button>
                    </div>
                </BottomSheet>
            );
        };

        const SnackbarContainer = () => {
            const { snackbars } = useContext(AppContext);
            return (
                <div className="fixed bottom-[110px] left-4 right-4 md:bottom-8 md:left-auto md:right-8 z-[200] flex flex-col gap-2 pointer-events-none items-end" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                    {snackbars.map(snack => (
                        <div key={snack.id} className="w-full max-w-sm bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] px-5 py-4 rounded-[var(--md-shape-lg)] shadow-xl animate-page flex items-center justify-between border border-[var(--md-sys-color-outline-variant)] pointer-events-auto">
                            <span className="text-[15px] font-bold">{snack.message}</span>
                        </div>
                    ))}
                </div>
            );
        };

        // ==========================================================================
        // APP SCREENS (ENHANCED DESKTOP LAYOUTS)
        // ==========================================================================

        const SplashScreen = () => {
            const { setSettings } = useContext(AppContext);
            const startApp = async () => {
                try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (e) {}
                setSettings(s => ({...s, hasStarted: true}));
            };
            return (
                <div className="h-[100dvh] w-full flex flex-col items-center justify-center bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] p-6 relative z-[100]">
                    <div className="w-32 h-32 rounded-[40px] bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] flex items-center justify-center mb-8 shadow-2xl spring-bounce active:scale-95">
                        <span className="material-symbols-rounded text-[64px]">smartphone</span>
                    </div>
                    <h1 className="text-4xl font-bold mb-2 text-center animate-page" style={{animationDelay: '0.1s'}}>Zona Poncell</h1>
                    <p className="text-[var(--md-sys-color-primary-container)] opacity-90 mb-12 text-center text-lg font-medium animate-page" style={{animationDelay: '0.2s'}}>Bos Konter Edition</p>

                        <Ripple className="w-full max-w-xs h-16 bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] rounded-full flex items-center justify-center font-bold text-lg shadow-xl" onClick={startApp}>

                    </div>

        };

        // --- TAB 1: DASBOR ---
        // Kalender bulanan: grid tanggal yang bisa diklik buat liat rincian harian,
        // dipakein pas periodFormat === 'Bulan' biar tampilan bulanan tetep utama
        // tapi tiap tanggal tetep bisa dibuka rinciannya.
        const CalendarBulanan = ({ transactions, periodOffset, onSelectDay }) => {
            const baseDate = new Date();
            baseDate.setMonth(baseDate.getMonth() + periodOffset);
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIdx = new Date(year, month, 1).getDay(); // 0=Min..6=Sab
            const leadingBlanks = (firstDayIdx + 6) % 7; // geser jadi mulai Senin

            const dayStats = useMemo(() => {
                const map = {};
                transactions.forEach(t => {
                    if (!t?.tanggal) return;
                    const d = new Date(t.tanggal);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const key = d.getDate();
                        if (!map[key]) map[key] = { laba: 0, count: 0 };
                        if (t.status === 'Beres') map[key].laba += (t.laba || 0);
                        map[key].count += 1;
                    }
                });
                return map;
            }, [transactions, year, month]);

            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

            const cells = [];
            for (let i = 0; i < leadingBlanks; i++) cells.push(null);
            for (let d = 1; d <= daysInMonth; d++) cells.push(d);

            const weekLabels = ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];

            return (

                            <div key={w} className="text-center text-[10px] md:text-xs font-extrabold text-[var(--md-sys-color-on-surface-variant)] uppercase tracking-wide">{w}</div>
                        ))}
                    </div>
                    <div className="grid grid-cols-7 gap-1 md:gap-2">
                        {cells.map((d, idx) => {
                            if (d === null) return <div key={idx}></div>;
                            const stat = dayStats[d];
                            const isToday = isCurrentMonth && today.getDate() === d;
                            let dotColor = '';
                            if (stat) dotColor = stat.laba < 0 ? 'bg-[var(--md-sys-color-error)]' : 'bg-[var(--md-sys-color-primary)]';
                            return (
                                <Ripple key={idx} onClick={() => onSelectDay(new Date(year, month, d))}

                                    <span className={`text-xs md:text-sm ${isToday ? 'font-extrabold' : 'font-bold'}`}>{d}</span>
                                    <div className={`w-1.5 h-1.5 rounded-full mt-0.5 ${stat ? dotColor : 'opacity-0'}`}></div>
                                </Ripple>
                            );
                        })}

                </div>
            );
        };

        const TabDasbor = () => {

            const [activeSheet, setActiveSheet] = useState(null);

            // Barang laku: total pcs + rincian per nama barang
            const barangLakuData = periodData.filter(d => d.jenis !== 'Servis' && d.jenis !== 'Top Up' && d.jenis !== 'Belanja' && d.jenis !== 'Rejeki' && d.status === 'Beres');
            const barangLakuPcs = barangLakuData.reduce((s, i) => s + (i.jumlah || 1), 0);

                barangLakuData.forEach(t => { map[t.nama || 'Tanpa Nama'] = (map[t.nama || 'Tanpa Nama'] || 0) + (t.jumlah || 1); });
                return Object.entries(map).sort((a, b) => b[1] - a[1]);

            // Modal keluar: total modal + rincian per jenis

                trxBeres.forEach(t => { const m = (t.modal || 0) * (t.jumlah || 1); if (m > 0) map[t.jenis] = (map[t.jenis] || 0) + m; });
                return Object.entries(map).sort((a, b) => b[1] - a[1]);
            }, [periodData]);

            const getTopCustomers = () => {
                const map = {};
                periodData.forEach(t => {
                    const name = (t.pelanggan || 'Hamba Allah').trim();

                });
                return Object.entries(map).sort((a,b)=>b[1]-a[1]);

            const bestTrx = trxBeres.length > 0 ? [...trxBeres].sort((a,b) => (b.laba||0) - (a.laba||0))[0] : null;
            const worstTrx = trxBeres.length > 0 ? [...trxBeres].sort((a,b) => (a.laba||0) - (b.laba||0))[0] : null;

                                                    <span className="material-symbols-rounded text-lg lg:text-2xl">chevron_left</span>
                                                </Ripple>
                                                <span className="text-xs lg:text-sm font-bold px-1 min-w-[70px] lg:min-w-[90px] text-center">{getPeriodLabel(settings.periodFormat, periodOffset)}</span>
                                                <Ripple className={`w-8 h-8 lg:w-10 lg:h-10 rounded-full flex items-center justify-center ${periodOffset >= 0 ? 'opacity-30' : 'hover:bg-black/10'}`} onClick={handleNextPeriod}>

                                                </Ripple>

                                                <AnimatedAmount value={laba} formatter={(v) => formatModeUang(v, settings.gwBanget, 'cuan')} />
                                            </h2>

                                            <div className={`px-5 md:px-6 lg:px-8 py-4 md:py-5 lg:py-6 rounded-[var(--md-shape-2xl)] flex-1 flex flex-col justify-center shadow-lg transition-colors duration-500 ${laba < 0 ? 'bg-[var(--md-sys-color-on-error)] text-[var(--md-sys-color-error)]' : 'bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)]'}`}>
                                                <span className="text-[11px] md:text-[13px] lg:text-[15px] uppercase font-extrabold opacity-70 mb-1 lg:mb-2">Omset Jualan</span>
                                                <span className="font-bold text-base md:text-xl lg:text-2xl">{formatModeUang(omset, settings.gwBanget, 'cuan')}</span>
                                            </div>
                                            <div className={`px-5 md:px-6 lg:px-8 py-4 md:py-5 lg:py-6 rounded-[var(--md-shape-2xl)] flex-1 flex flex-col justify-center shadow-lg transition-colors duration-500 ${laba < 0 ? 'bg-[var(--md-sys-color-on-error)] text-[var(--md-sys-color-error)]' : 'bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)]'}`}>
                                                <span className="text-[11px] md:text-[13px] lg:text-[15px] uppercase font-extrabold opacity-70 mb-1 lg:mb-2">Total Nota</span>
                                                <span className="font-bold text-base md:text-xl lg:text-2xl">{periodData.length} Data</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* KALENDER BULANAN: tampil pas periodFormat = Bulan, tiap tanggal bisa diklik buat liat rincian harian */}
                                {settings.periodFormat === 'Bulan' && (
                                    <CalendarBulanan transactions={transactions} periodOffset={periodOffset} onSelectDay={openDaySheet} />
                                )}

                                {/* BARIS 1: Progres, Barang Laku, Target Hari Ini */}
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                                    <Ripple onClick={() => setActiveSheet('progres')} className="p-5 md:p-6 lg:p-8 rounded-[var(--md-shape-2xl)] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] flex flex-col lg:flex-row items-start lg:items-center gap-4 lg:gap-6 border border-[var(--md-sys-color-outline-variant)] cursor-pointer hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 md:w-16 md:h-16 lg:w-20 lg:h-20 rounded-full md:rounded-[20px] bg-[var(--md-sys-color-on-secondary-container)] text-[var(--md-sys-color-secondary-container)] flex items-center justify-center shrink-0">
                                            <span className="material-symbols-rounded text-[24px] md:text-[32px] lg:text-[40px]">pending_actions</span>
                                        </div>
                                        <div>
                                            <h3 className="font-extrabold text-base md:text-xl lg:text-2xl mb-1">Progres</h3>

                                        </div>
                                    </Ripple>
                                    
                                    <Ripple onClick={() => setActiveSheet('barang')} className="hidden md:flex p-5 md:p-6 lg:p-8 rounded-[var(--md-shape-2xl)] bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] flex-col lg:flex-row items-start lg:items-center gap-4 lg:gap-6 border border-[var(--md-sys-color-outline-variant)] cursor-pointer hover:shadow-md transition-shadow">
                                        <div className="w-12 h-12 md:w-16 md:h-16 lg:w-20 lg:h-20 rounded-full md:rounded-[20px] bg-[var(--md-sys-color-on-tertiary-container)] text-[var(--md-sys-color-tertiary-container)] flex items-center justify-center shrink-0">

                                    {/* Card ke-3 Khusus PC untuk Target, sekarang bisa dipencet buat diedit */}

                                {/* BARIS 2 (KHUSUS DESKTOP): Modal Keluar, Pelanggan Aktif, Rata-Rata Cuan */}

        const ActivityItem = ({ item, onClick, selectable, selected, onSelect }) => {

            const icon = ICON_MAP[item?.jenis] || 'build';
            
            // Pewarnaan Badge Status & Uang
            const isNombok = (item?.laba || 0) < 0;
            const isRejeki = item?.jenis === 'Rejeki';
            
            let statusColor = 'bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)]'; 
            if (item?.status === 'Beres') {
                if (isNombok) statusColor = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';
                else if (isRejeki) statusColor = 'bg-[var(--md-sys-color-success-container)] text-[var(--md-sys-color-on-success-container)]';
                else statusColor = 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]'; 
            }
            if (item?.status === 'Gagal') statusColor = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]'; 

            let amountColor = 'text-[var(--md-sys-color-primary)]';
            if (isNombok) amountColor = 'text-[var(--md-sys-color-error)]';
            else if (isRejeki) amountColor = 'text-[var(--md-sys-color-success)]';

            const timerRef = useRef(null);
            const isDragging = useRef(false);

            const handlePointerDown = (e) => {
                if(e.button !== 0 && e.pointerType !== 'touch') return;
                isDragging.current = false;
                timerRef.current = setTimeout(() => {
                    if(!isDragging.current && onSelect && !selectable) {
                        onSelect();
                        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
                    }
                }, 500);
            };

            const handlePointerMove = () => { isDragging.current = true; clearTimeout(timerRef.current); };
            const handlePointerUp = () => { clearTimeout(timerRef.current); };
            
            const handleClick = () => {
                if(selectable && onSelect) onSelect();
                else if(!selectable && onClick) onClick();
            };

            return (
                <div onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} onClick={handleClick}

        // --- TAB 2: CATET (DIPERLUAS DENGAN SHORTCUT & RIWAYAT MINI DI PC) ---
        const TabCatet = () => {

            const [jenis, setJenis] = useState('Servis');
            const [nama, setNama] = useState('');
            const [pelanggan, setPelanggan] = useState('');
            const [modalStr, setModalStr] = useState('');
            const [jualStr, setJualStr] = useState('');
            const [jumlah, setJumlah] = useState(1);
            const [subTopUp, setSubTopUp] = useState('Pulsa');
            const [viaTopUp, setViaTopUp] = useState('Bank');

            const isServis = jenis === 'Servis';
            const isTopUp = jenis === 'Top Up';
            const isBelanja = jenis === 'Belanja';
            const isRejeki = jenis === 'Rejeki';

            // Kunci field jumlah kalo kategori tertentu
            useEffect(() => { if(isServis || isTopUp || isBelanja || isRejeki) setJumlah(1); }, [jenis]);

            const handleSave = () => {
                if(!nama.trim()) { showSnackbar('Woi, Keterangan / Tujuan isi dulu!'); return; }
                
                // Set logic angka tergantung jenis
                let m = 0; let j = 0;
                if (isBelanja) { m = getRawNumber(modalStr); j = 0; }
                else if (isRejeki) { m = 0; j = getRawNumber(jualStr); }
                else { m = getRawNumber(modalStr); j = getRawNumber(jualStr) || 0; }
                
                let finalNama = nama.trim();
                if(isTopUp) finalNama = `Top Up ${subTopUp} (${viaTopUp}) - ${finalNama}`;

                const newData = {
                    id: generateId(), tanggal: new Date().toISOString(),
                    jenis, nama: finalNama, pelanggan: pelanggan.trim() || 'Hamba Allah',
                    modal: m, jual: j, jumlah: jumlah, laba: (j - m) * jumlah, status: isServis ? 'Jalan' : 'Beres'
                };

                setTransactions(prev => [newData, ...prev]); 
                showSnackbar(isBelanja ? 'Oke bos, duit udah keluar 💸' : 'Mantap! Duit dicatet 🤑'); 
                
                setNama(''); setPelanggan(''); setModalStr(''); setJualStr(''); setJumlah(1);
            };

            const fillShortcut = (shortcut) => {
                setJenis(shortcut.jenis);
                setNama(shortcut.nama);
                setModalStr(shortcut.modal.toString());
                setJualStr(shortcut.jual.toString());
                setJumlah(1);
                showSnackbar(`Shortcut ${shortcut.nama} disedot!`);
            };

            const shortcuts = [
                {jenis: 'Aksesoris', nama: 'Tempered Glass', modal: 10000, jual: 25000},
                {jenis: 'Top Up', nama: 'Voucher Tsel 10k', modal: 10500, jual: 13000},
                {jenis: 'Servis', nama: 'Ganti LCD', modal: 250000, jual: 400000},
                {jenis: 'Belanja', nama: 'Kopi & Rokok', modal: 25000, jual: 0}
            ];

            // Kalkulasi preview laba real-time
            let laba = 0;
            if (isBelanja) laba = -getRawNumber(modalStr) * jumlah;
            else if (isRejeki) laba = getRawNumber(jualStr) * jumlah;
            else laba = ((getRawNumber(jualStr) || 0) - getRawNumber(modalStr)) * jumlah;

            return (
                <div className="p-4 md:p-8 lg:p-12 h-full overflow-y-auto no-scrollbar pb-32 md:pb-12 flex flex-col items-center" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <div className="w-full max-w-3xl lg:max-w-7xl 2xl:max-w-[1600px]">
                        <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] tracking-tight mb-4 px-2 md:hidden">Catet Duit Bos.</h1>

                        <div className="grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-8 lg:gap-10">

                            {/* KOLOM KIRI: FORM & SHORTCUT (Lebih lebar di Desktop) */}
                            <div className="md:col-span-8 space-y-5 md:space-y-6">
                                
                                {/* Shortcut PC / Tablet */}
                                <div className="hidden md:block bg-[var(--md-sys-color-surface-container-low)] p-6 lg:p-8 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">

                                        <p className="text-sm lg:text-base font-extrabold tracking-widest uppercase text-[var(--md-sys-color-primary)]">Katalog Cepat (Sekali Klik)</p>
                                    </div>

            const [filterType, setFilterType] = useState('Semua');

            const isSelectionMode = selectedIds.length > 0;

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    const matchSearch = (t.nama || '').toLowerCase().includes(search.toLowerCase()) || 
                                        (t.pelanggan || '').toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            useEffect(() => {
                const handlePopState = () => { if (selectedIds.length > 0) { setSelectedIds([]); } };
                if (selectedIds.length > 0) { window.history.pushState({ selectionMode: true }, ''); window.addEventListener('popstate', handlePopState); }
                return () => { if (selectedIds.length > 0) window.removeEventListener('popstate', handlePopState); };
            }, [selectedIds]);

            const closeSelectionModeUI = () => { if (window.history.state && window.history.state.selectionMode) { window.history.back(); } else { setSelectedIds([]); } };
            const toggleSelection = (id) => { setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]); };

            const handleBulkDelete = () => {
                if(confirm(`Buang ${selectedIds.length} catetan ini ke tong sampah?`)) {

                    closeSelectionModeUI(); showSnackbar(`${selectedIds.length} catetan dibakar 🔥`);
                }

                const toCopy = transactions.filter(t => selectedIds.includes(t.id));
                const newItems = toCopy.map(item => ({ ...item, id: generateId(), tanggal: new Date().toISOString(), status: item.jenis === 'Servis' ? 'Jalan' : 'Beres' }));

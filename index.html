<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbfdf8" id="meta-theme-color">
    <title>Zona Poncell</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts: Readex Pro (Expressive Google Sans alternative) & Material Symbols Rounded -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        /* === MATERIAL 3 (MATERIAL YOU) COLOR TOKENS === */
        :root {
            /* Default: Blue/Indigo (Light) */
            --md-sys-color-primary: #0061a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d1e4ff;
            --md-sys-color-on-primary-container: #001d36;
            
            --md-sys-color-secondary: #535f70;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f7;
            --md-sys-color-on-secondary-container: #101c2b;

            --md-sys-color-tertiary: #6b5778;
            --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #f2daff;
            --md-sys-color-on-tertiary-container: #251431;
            
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;

            --md-sys-color-success: #146c2e;
            --md-sys-color-on-success: #ffffff;
            --md-sys-color-success-container: #9ff7ae;
            --md-sys-color-on-success-container: #002108;
            
            --md-sys-color-background: #fdfcff;
            --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-surface: #fdfcff;
            --md-sys-color-on-surface: #1a1c1e;
            
            --md-sys-color-surface-variant: #dfe2eb;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #73777f;
            --md-sys-color-outline-variant: #c3c7cf;

            --md-sys-color-surface-container-low: #f7f6f9;
            --md-sys-color-surface-container: #f1f0f4;
            --md-sys-color-surface-container-high: #ebeaef;
            
            /* Elevation (Solid colors, no blur) */
            --md-elevation-1: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 1px 3px 1px rgba(0, 0, 0, 0.15);
            --md-elevation-2: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 2px 6px 2px rgba(0, 0, 0, 0.15);
            --md-elevation-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15);
        }

        /* Dark Mode Variables */
        .dark-theme {
            --md-sys-color-primary: #9ecaeb;
            --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497d;
            --md-sys-color-on-primary-container: #d1e4ff;
            
            --md-sys-color-secondary: #bbc7db;
            --md-sys-color-on-secondary: #253140;
            --md-sys-color-secondary-container: #3b4858;
            --md-sys-color-on-secondary-container: #d7e3f7;

            --md-sys-color-tertiary: #d6bee4;
            --md-sys-color-on-tertiary: #3b2948;
            --md-sys-color-tertiary-container: #523f5f;
            --md-sys-color-on-tertiary-container: #f2daff;
            
            --md-sys-color-error: #ffb4ab;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a;
            --md-sys-color-on-error-container: #ffb4ab;

            --md-sys-color-success: #83da93;
            --md-sys-color-on-success: #003911;
            --md-sys-color-success-container: #00531a;
            --md-sys-color-on-success-container: #9ff7ae;
            
            --md-sys-color-background: #1a1c1e;
            --md-sys-color-on-background: #e2e2e6;
            --md-sys-color-surface: #1a1c1e;
            --md-sys-color-on-surface: #e2e2e6;
            
            --md-sys-color-surface-variant: #42474e;
            --md-sys-color-on-surface-variant: #c3c7cf;
            --md-sys-color-outline: #8d9199;
            --md-sys-color-outline-variant: #42474e;

            --md-sys-color-surface-container-low: #1c1b1f;
            --md-sys-color-surface-container: #211f26;
            --md-sys-color-surface-container-high: #2b2930;
            
            --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --md-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3);
        }

        /* Expressive Themes (Green, Orange, Purple) */
        .theme-green {
            --md-sys-color-primary: #146c2e; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #9ff7ae; --md-sys-color-on-primary-container: #002108;
            --md-sys-color-secondary: #526350; --md-sys-color-secondary-container: #d5e8cf;
            --md-sys-color-tertiary: #39656b; --md-sys-color-tertiary-container: #bcebf1;
        }
        .dark-theme.theme-green {
            --md-sys-color-primary: #83da93; --md-sys-color-on-primary: #003911;
            --md-sys-color-primary-container: #00531a; --md-sys-color-on-primary-container: #9ff7ae;
            --md-sys-color-secondary: #b9ccb4; --md-sys-color-secondary-container: #3a4b39;
            --md-sys-color-tertiary: #a0cfd5; --md-sys-color-tertiary-container: #1f4d53;
        }

        .theme-orange {
            --md-sys-color-primary: #8f4c00; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #ffdcc3; --md-sys-color-on-primary-container: #2e1500;
            --md-sys-color-secondary: #745945; --md-sys-color-secondary-container: #ffdcbe;
            --md-sys-color-tertiary: #5d6135; --md-sys-color-tertiary-container: #e2e6ad;
        }
        .dark-theme.theme-orange {
            --md-sys-color-primary: #ffb77c; --md-sys-color-on-primary: #4d2600;
            --md-sys-color-primary-container: #6d3900; --md-sys-color-on-primary-container: #ffdcc3;
            --md-sys-color-secondary: #e4bfa7; --md-sys-color-secondary-container: #5a422f;
            --md-sys-color-tertiary: #c6ca93; --md-sys-color-tertiary-container: #45491f;
        }

        /* Global Reset & Utility */
        body { 
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Material Symbols Config */
        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; 
        }
        .icon-outlined { font-variation-settings: 'FILL' 0; }

        /* Animations */
        @keyframes slideUp {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.2, 0, 0, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        /* Material 3 Ripple */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.4s, opacity 0.4s;
        }
        .ripple:active::after {
            transform: translate(-50%, -50%) scale(2);
            opacity: 0.12;
            transition: 0s;
        }

        /* === MATERIAL 3 COMPONENTS === */
        
        /* 1. M3 Text Field (Filled) - NO OVERLAP */
        .md-filled-text-field {
            position: relative;
            background-color: var(--md-sys-color-surface-container-high);
            border-radius: 4px 4px 0 0;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
        }
        .md-filled-text-field:hover {
            background-color: var(--md-sys-color-surface-variant);
        }
        .md-filled-text-field::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--md-sys-color-on-surface-variant);
            transition: height 0.2s, background-color 0.2s;
        }
        .md-filled-text-field:focus-within::after {
            height: 2px;
            background-color: var(--md-sys-color-primary);
        }
        
        .md-input-element {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 24px 16px 8px 16px; /* Extra padding top to make room for label */
            color: var(--md-sys-color-on-surface);
            font-family: inherit;
            font-size: 16px;
            min-height: 56px;
        }
        textarea.md-input-element {
            resize: vertical;
            min-height: 80px;
        }
        
        .md-label {
            position: absolute;
            left: 16px;
            top: 18px; /* Centered initially */
            color: var(--md-sys-color-on-surface-variant);
            font-size: 16px;
            pointer-events: none;
            transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
            transform-origin: left top;
        }
        
        /* Magic: Shrink and move label when input is focused OR has value */
        .md-input-element:focus ~ .md-label,
        .md-input-element:not(:placeholder-shown) ~ .md-label {
            transform: translateY(-10px) scale(0.75);
        }
        .md-input-element:focus ~ .md-label {
            color: var(--md-sys-color-primary);
        }

        .md-input-icon {
            padding-left: 16px;
            color: var(--md-sys-color-on-surface-variant);
        }
        .md-input-element.has-icon {
            padding-left: 12px;
        }

        /* 2. M3 FAB (Floating Action Button) */
        .md-fab {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            box-shadow: var(--md-elevation-3);
            transition: box-shadow 0.2s, background-color 0.2s;
        }
        .md-fab:hover {
            box-shadow: var(--md-elevation-2); /* Slightly lower on hover in M3, or use state layers */
        }
        
        /* 3. M3 Segmented Button */
        .md-segmented-btn-container {
            display: flex;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 9999px; /* Pill */
            overflow: hidden;
        }
        .md-segmented-btn {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            border-right: 1px solid var(--md-sys-color-outline);
            transition: background-color 0.2s;
        }
        .md-segmented-btn:last-child { border-right: none; }
        .md-segmented-btn.active {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        /* Fullscreen modifications */
        :fullscreen { background-color: var(--md-sys-color-background); }
        :-webkit-full-screen { background-color: var(--md-sys-color-background); }
    </style>
</head>
<body>
    <!-- App Container -->
    <div id="root" class="h-[100dvh] w-full max-w-xl mx-auto flex flex-col relative sm:border sm:border-[var(--md-sys-color-outline-variant)] sm:rounded-[32px] sm:h-[95dvh] sm:mt-[2.5dvh] sm:shadow-2xl overflow-hidden" style="background-color: var(--md-sys-color-background);"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- UTILITIES ---
        const formatRupiah = (number) => {
            if (number === null || number === undefined || isNaN(number)) return '0';
            return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(number);
        };

        const getRawNumber = (str) => {
            if (!str) return 0;
            return parseInt(str.toString().replace(/[^0-9-]/g, ''), 10) || 0;
        };

        const formatDate = (isoString) => {
            const date = new Date(isoString);
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);
        };

        // --- M3 COMPONENTS ---

        // Toast
        const Snackbar = ({ message, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3500);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] animate-slide-up w-11/12 max-w-md">
                    <div class="flex items-center justify-between px-4 py-3 rounded-md shadow-md" style={{ backgroundColor: 'var(--md-sys-color-on-surface)', color: 'var(--md-sys-color-surface)' }}>
                        <span class="text-sm font-medium">{message}</span>
                        <button onClick={onClose} class="text-sm font-bold ml-4" style={{ color: 'var(--md-sys-color-primary-container)' }}>TUTUP</button>
                    </div>
                </div>
            );
        };

        // Material 3 Filled TextField
        const TextField = ({ label, value, onChange, type = "text", inputMode = "text", disabled = false, isCurrency = false, list, icon, multiline = false }) => {
            const displayValue = isCurrency ? (value ? `Rp ${formatRupiah(value)}` : '') : value;
            
            const handleChange = (e) => {
                if (isCurrency) {
                    const raw = e.target.value.replace(/[^0-9]/g, '');
                    onChange(raw);
                } else {
                    onChange(e.target.value);
                }
            };

            return (
                <div class={`md-filled-text-field ${disabled ? 'opacity-50 pointer-events-none' : ''}`}>
                    {icon && <span class="material-symbols-rounded md-input-icon icon-outlined">{icon}</span>}
                    {multiline ? (
                        <textarea
                            value={displayValue}
                            onChange={handleChange}
                            disabled={disabled}
                            placeholder=" "
                            class={`md-input-element no-scrollbar ${icon ? 'has-icon' : ''}`}
                        />
                    ) : (
                        <input
                            type={type}
                            inputMode={inputMode}
                            value={displayValue}
                            onChange={handleChange}
                            disabled={disabled}
                            list={list}
                            placeholder=" "
                            class={`md-input-element ${icon ? 'has-icon' : ''}`}
                            autoComplete="off"
                        />
                    )}
                    <label class={`md-label ${icon ? 'ml-10' : ''}`}>{label}</label>
                </div>
            );
        };

        // Material 3 Full Screen Dialog / Bottom Sheet
        const FullScreenDialog = ({ isOpen, onClose, title, children, action }) => {
            if (!isOpen) return null;
            return (
                <div class="absolute inset-0 z-50 flex flex-col animate-slide-up" style={{ backgroundColor: 'var(--md-sys-color-surface)' }}>
                    {/* Top App Bar inside Dialog */}
                    <header class="h-16 flex items-center px-4 shrink-0" style={{ backgroundColor: 'var(--md-sys-color-surface)' }}>
                        <button onClick={onClose} class="w-12 h-12 rounded-full ripple flex items-center justify-center mr-2" style={{ color: 'var(--md-sys-color-on-surface)' }}>
                            <span class="material-symbols-rounded">close</span>
                        </button>
                        <h2 class="text-[22px] font-normal flex-1" style={{ color: 'var(--md-sys-color-on-surface)' }}>{title}</h2>
                        {action && (
                            <button onClick={action.onClick} class="px-4 py-2 font-medium ripple rounded-full" style={{ color: 'var(--md-sys-color-primary)' }}>
                                {action.label}
                            </button>
                        )}
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
                        {children}
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [transactions, setTransactions] = useState([]);
            const [activeTab, setActiveTab] = useState('dash');
            const [isLoaded, setIsLoaded] = useState(false);
            const [snackbar, setSnackbar] = useState(null);
            
            // UI States
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            
            // Settings
            const [settings, setSettings] = useState({
                isDark: false,
                themeColor: 'blue',
                isFullscreen: false
            });

            // Init Data
            useEffect(() => {
                try {
                    const savedDb = localStorage.getItem('zp_m3_db');
                    if (savedDb) setTransactions(JSON.parse(savedDb));
                    
                    const savedSettings = localStorage.getItem('zp_m3_settings');
                    if (savedSettings) {
                        setSettings(prev => ({...prev, ...JSON.parse(savedSettings)}));
                    }
                } catch (e) {
                    console.error("Gagal memuat data", e);
                }
                setIsLoaded(true);
            }, []);

            // Save Data & Settings
            useEffect(() => {
                if (!isLoaded) return;
                localStorage.setItem('zp_m3_db', JSON.stringify(transactions));
                localStorage.setItem('zp_m3_settings', JSON.stringify(settings));
                
                // Apply Theme
                const root = document.documentElement;
                if (settings.isDark) root.classList.add('dark-theme');
                else root.classList.remove('dark-theme');
                
                root.className = root.className.replace(/theme-\w+/g, '').trim();
                if (settings.themeColor !== 'blue') root.classList.add(`theme-${settings.themeColor}`);

                // Update meta theme color based on surface
                const surfaceColor = getComputedStyle(document.body).getPropertyValue('--md-sys-color-surface').trim();
                document.getElementById('meta-theme-color').content = surfaceColor;

            }, [transactions, settings, isLoaded]);

            const showSnackbar = (msg) => setSnackbar(msg);

            const handleSaveTransaction = (data) => {
                setTransactions([data, ...transactions]);
                setIsAddModalOpen(false);
                showSnackbar('Transaksi berhasil dicatat');
                if(activeTab !== 'dash') setActiveTab('history');
            };

            const handleUpdateStatus = (id, newStatus) => {
                setTransactions(transactions.map(t => t.id === id ? { ...t, status: newStatus } : t));
                setSelectedItem(prev => ({...prev, status: newStatus}));
                showSnackbar(`Status diubah menjadi ${newStatus}`);
            };

            const handleDelete = (id) => {
                if (confirm('Yakin ingin menghapus catatan ini secara permanen?')) {
                    setTransactions(transactions.filter(t => t.id !== id));
                    setSelectedItem(null);
                    showSnackbar('Catatan dihapus');
                }
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => showSnackbar('Fullscreen tidak didukung'));
                    setSettings(s => ({...s, isFullscreen: true}));
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        setSettings(s => ({...s, isFullscreen: false}));
                    }
                }
            };

            if (!isLoaded) return null;

            return (
                <>
                    {/* Top App Bar (M3 Standard) */}
                    <header class="h-16 px-4 flex items-center shrink-0 shadow-sm z-10" style={{ backgroundColor: 'var(--md-sys-color-surface)', color: 'var(--md-sys-color-on-surface)' }}>
                        <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3" style={{ backgroundColor: 'var(--md-sys-color-primary-container)', color: 'var(--md-sys-color-on-primary-container)' }}>
                            <span class="material-symbols-rounded">storefront</span>
                        </div>
                        <h1 class="text-[22px] font-medium tracking-tight">Zona Poncell</h1>
                    </header>

                    {/* Main Content Area */}
                    <main class="flex-1 overflow-y-auto no-scrollbar relative animate-fade-in" key={activeTab}>
                        {activeTab === 'dash' && <Dashboard data={transactions} />}
                        {activeTab === 'analytics' && <Analytics data={transactions} />}
                        {activeTab === 'history' && <History data={transactions} onItemClick={setSelectedItem} />}
                        {activeTab === 'settings' && <Settings 
                            data={transactions} 
                            setTransactions={setTransactions}
                            settings={settings} 
                            setSettings={setSettings}
                            toggleFullscreen={toggleFullscreen}
                            showSnackbar={showSnackbar}
                        />}
                        <div class="h-24"></div> {/* Padding for Bottom Nav */}
                    </main>

                    {/* Extended FAB (Positioned above nav bar) */}
                    {activeTab !== 'settings' && (
                        <div class="absolute bottom-24 right-4 z-20">
                            <button 
                                onClick={() => setIsAddModalOpen(true)}
                                class="md-fab flex items-center justify-center gap-2 h-14 px-5 rounded-2xl ripple"
                            >
                                <span class="material-symbols-rounded">edit</span>
                                <span class="font-medium text-[14px]">Catat</span>
                            </button>
                        </div>
                    )}

                    {/* Navigation Bar (M3 Standard) */}
                    <nav class="h-20 flex justify-around items-center shrink-0 z-30 pb-safe shadow-[0_-1px_3px_rgba(0,0,0,0.05)]" style={{ backgroundColor: 'var(--md-sys-color-surface-container)' }}>
                        <NavBtn icon="home" label="Beranda" active={activeTab === 'dash'} onClick={() => setActiveTab('dash')} />
                        <NavBtn icon="receipt_long" label="Riwayat" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        <NavBtn icon="analytics" label="Analisis" active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} />
                        <NavBtn icon="settings" label="Seting" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                    </nav>

                    {/* Modals & Snakbars */}
                    <FullScreenDialog isOpen={isAddModalOpen} onClose={() => setIsAddModalOpen(false)} title="Catat Transaksi">
                        <InputForm onSave={handleSaveTransaction} existingData={transactions} />
                    </FullScreenDialog>

                    <FullScreenDialog isOpen={!!selectedItem} onClose={() => setSelectedItem(null)} title="Detail Transaksi">
                        {selectedItem && <ItemDetail item={selectedItem} onUpdateStatus={handleUpdateStatus} onDelete={handleDelete} />}
                    </FullScreenDialog>

            const pieChartRef = useRef(null);
            const pieChartInst = useRef(null);

            const rootStyle = getComputedStyle(document.body);

                // 1. Line Chart: Omset vs Laba (7 Hari Terakhir)

                    const d = new Date(); d.setDate(d.getDate() - (6 - i));

                const omsetHarian = last7Days.map(date =>

                );

                const labels = last7Days.map(d => new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }));

                const ctxLine = lineChartRef.current.getContext('2d');
                lineChartInst.current = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Omset',

                                borderColor: tertiaryColor,

                                fill: true,
                                backgroundColor: `${primaryColor}20` // Add opacity
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { 
                            legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Readex Pro' } } }
                        },
                        scales: {
                            y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => `Rp${v/1000}k` } },
                            x: { grid: { display: false }, ticks: { color: textColor } }
                        }
                    }
                });

                // 2. Pie Chart: Komposisi Jenis
                const jenisData = ['Servis', 'Sparepart', 'Aksesoris'].map(j => 
                    data.filter(d => d.jenis === j && d.status === 'Selesai').length
                );
                
                const ctxPie = pieChartRef.current.getContext('2d');
                pieChartInst.current = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: ['Servis', 'Sparepart', 'Aksesoris'],
                        datasets: [{
                            data: jenisData,
                            backgroundColor: [primaryColor, tertiaryColor, errorColor],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: { legend: { position: 'right', labels: { color: textColor, font: { family: 'Readex Pro' } } } }
                    }
                });

                return () => {
                    if (lineChartInst.current) lineChartInst.current.destroy();
                    if (pieChartInst.current) pieChartInst.current.destroy();
                }
            }, [data, document.body.className]); // re-render on theme change

            return (
                <div class="p-4 space-y-6">
                    <div class="p-5 rounded-3xl" style={{ backgroundColor: 'var(--md-sys-color-surface-container-low)' }}>
                        <h3 class="text-base font-medium mb-4" style={{ color: 'var(--md-sys-color-on-surface)' }}>Tren 7 Hari Terakhir</h3>
                        <div class="h-60 w-full relative">

                        </div>
                    </div>

                    <div class="p-5 rounded-3xl" style={{ backgroundColor: 'var(--md-sys-color-surface-container-low)' }}>

                    </div>

                e.preventDefault();

                const m = getRawNumber(modalVal);
                const j = getRawNumber(jualVal);
                
                onSave({
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2),
                    tanggal: new Date().toISOString(),
                    jenis,
                    nama: nama.trim(),
                    pelanggan: pelanggan.trim() || 'Umum',

                    jual: j,
                    laba: j - m,
                    status,
                    catatan: catatan.trim()
                });

            const laba = getRawNumber(jualVal) - getRawNumber(modalVal);

            return (

                        <TextField label="Harga Jual" value={jualVal} onChange={setJualVal} inputMode="numeric" isCurrency={true} />

        const Settings = ({ data, setTransactions, settings, setSettings, toggleFullscreen, showSnackbar }) => {
            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (Array.isArray(parsed) && confirm(`Timpa data saat ini dengan ${parsed.length} data baru?`)) {
                            setTransactions(parsed); 
                            showSnackbar("Data berhasil dipulihkan."); 
                        }
                    } catch(err) { showSnackbar("Format file tidak valid."); }
                };
                r.readAsText(file);
                e.target.value = null; 
            };

            const handleBackup = () => {
                const content = JSON.stringify(data, null, 2);
                const blob = new Blob([content], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `ZonaPoncell_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                showSnackbar('Backup berhasil diunduh');
            };

            const themes = [
                { id: 'blue', color: '#0061a4', name: 'Standard' },

                            >
                                <div class="w-6 h-6 rounded-full bg-white transition-transform shadow-sm flex items-center justify-center absolute"

                                <input type="file" accept=".json" class="hidden" onChange={handleRestore} />
                            </label>
                        </div>
                    </div>
                </div>
            );

            let statusBadgeStyle = {};
            if (item.status === 'Selesai') statusBadgeStyle = { bg: 'var(--md-sys-color-success-container)', text: 'var(--md-sys-color-on-success-container)' };
            else if (item.status === 'Proses') statusBadgeStyle = { bg: 'var(--md-sys-color-secondary-container)', text: 'var(--md-sys-color-on-secondary-container)' };
            else statusBadgeStyle = { bg: 'var(--md-sys-color-error-container)', text: 'var(--md-sys-color-on-error-container)' };

            return (
                <div class="p-4 rounded-2xl flex items-center gap-4" style={{ backgroundColor: 'var(--md-sys-color-surface-container-low)' }}>
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style={{ backgroundColor: 'var(--md-sys-color-primary-container)', color: 'var(--md-sys-color-on-primary-container)' }}>
                        <span class="material-symbols-rounded">{getIcon(item.jenis)}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-medium truncate text-[16px]" style={{ color: 'var(--md-sys-color-on-surface)' }}>{item.nama}</h4>
                        <p class="text-xs mt-0.5 truncate" style={{ color: 'var(--md-sys-color-on-surface-variant)' }}>{item.pelanggan || item.jenis}</p>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <span class="text-xs px-2 py-0.5 rounded font-medium mb-1" style={{ backgroundColor: statusBadgeStyle.bg, color: statusBadgeStyle.text }}>
                            {item.status}
                        </span>
                        <p class="font-medium text-[14px]" style={{ color: 'var(--md-sys-color-primary)' }}>Rp{formatRupiah(item.laba)}</p>
                    </div>
                </div>
            );
        };

        // Navigation Button Component
        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} class="flex flex-col items-center justify-center w-16 h-full ripple relative group">
                <div class="px-5 py-1 rounded-full mb-1 transition-colors" 
                     style={{ 
                         backgroundColor: active ? 'var(--md-sys-color-secondary-container)' : 'transparent',
                         color: active ? 'var(--md-sys-color-on-secondary-container)' : 'var(--md-sys-color-on-surface-variant)'
                     }}>
                    <span class={`material-symbols-rounded ${active ? '' : 'icon-outlined'}`}>{icon}</span>
                </div>
                <span class="text-[12px] font-medium transition-colors" style={{ color: active ? 'var(--md-sys-color-on-surface)' : 'var(--md-sys-color-on-surface-variant)' }}>
                    {label}
                </span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

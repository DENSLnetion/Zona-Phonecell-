<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbfdf8" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zona Poncell M3 Ultimate</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts: Readex Pro & Material Symbols Rounded -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        /* ==========================================================================
           MATERIAL 3 (MATERIAL YOU) DESIGN TOKENS & THEMING ENGINE
           ========================================================================== */
        
        :root {
            --sa-top: env(safe-area-inset-top, 0px);
            --sa-bottom: env(safe-area-inset-bottom, 0px);
            --sa-left: env(safe-area-inset-left, 0px);
            --sa-right: env(safe-area-inset-right, 0px);

            --md-shape-xs: 4px;
            --md-shape-sm: 8px;
            --md-shape-md: 12px;
            --md-shape-lg: 16px;
            --md-shape-xl: 28px;
            --md-shape-2xl: 32px;
            --md-shape-full: 9999px;
        }

        /* --- THEME 1: BLUE (Default) --- */
        .theme-blue {
            --md-sys-color-primary: #0061a4; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d1e4ff; --md-sys-color-on-primary-container: #001d36;
            --md-sys-color-secondary: #535f70; --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f7; --md-sys-color-on-secondary-container: #101c2b;
            --md-sys-color-tertiary: #6b5778; --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #f2daff; --md-sys-color-on-tertiary-container: #251431;
            --md-sys-color-error: #ba1a1a; --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6; --md-sys-color-on-error-container: #410002;
            --md-sys-color-success: #146c2e; --md-sys-color-on-success: #ffffff;
            --md-sys-color-success-container: #9ff7ae; --md-sys-color-on-success-container: #002108;
            --md-sys-color-background: #fdfcff; --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-surface: #fdfcff; --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb; --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #73777f; --md-sys-color-outline-variant: #c3c7cf;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f7f6f9;
            --md-sys-color-surface-container: #f1f0f4;
            --md-sys-color-surface-container-high: #ebeaef;
            --md-sys-color-surface-container-highest: #e0e0e6;
            --md-sys-color-inverse-surface: #2f3033; --md-sys-color-inverse-on-surface: #f1f0f4;
        }
        .dark.theme-blue {
            --md-sys-color-primary: #9ecaeb; --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497d; --md-sys-color-on-primary-container: #d1e4ff;
            --md-sys-color-secondary: #bbc7db; --md-sys-color-on-secondary: #253140;
            --md-sys-color-secondary-container: #3b4858; --md-sys-color-on-secondary-container: #d7e3f7;
            --md-sys-color-tertiary: #d6bee4; --md-sys-color-on-tertiary: #3b2948;
            --md-sys-color-tertiary-container: #523f5f; --md-sys-color-on-tertiary-container: #f2daff;
            --md-sys-color-error: #ffb4ab; --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a; --md-sys-color-on-error-container: #ffb4ab;
            --md-sys-color-success: #83da93; --md-sys-color-on-success: #003911;
            --md-sys-color-success-container: #00531a; --md-sys-color-on-success-container: #9ff7ae;
            --md-sys-color-background: #1a1c1e; --md-sys-color-on-background: #e2e2e6;
            --md-sys-color-surface: #1a1c1e; --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-variant: #42474e; --md-sys-color-on-surface-variant: #c3c7cf;
            --md-sys-color-outline: #8d9199; --md-sys-color-outline-variant: #42474e;
            --md-sys-color-surface-container-lowest: #0f0f11;
            --md-sys-color-surface-container-low: #1c1b1f;
            --md-sys-color-surface-container: #211f26;
            --md-sys-color-surface-container-high: #2b2930;
            --md-sys-color-surface-container-highest: #36343b;
            --md-sys-color-inverse-surface: #e2e2e6; --md-sys-color-inverse-on-surface: #2f3033;
        }

        /* --- THEME 2: GREEN --- */
        .theme-green {
            --md-sys-color-primary: #146c2e; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #9ff7ae; --md-sys-color-on-primary-container: #002108;
            --md-sys-color-secondary: #526350; --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d5e8cf; --md-sys-color-on-secondary-container: #101f10;
            --md-sys-color-tertiary: #39656b; --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #bcebf1; --md-sys-color-on-tertiary-container: #001f23;
            --md-sys-color-error: #ba1a1a; --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6; --md-sys-color-on-error-container: #410002;
            --md-sys-color-success: #006d3a; --md-sys-color-on-success: #ffffff;
            --md-sys-color-success-container: #92f7b4; --md-sys-color-on-success-container: #00210e;
            --md-sys-color-background: #fcfdf6; --md-sys-color-on-background: #1a1c19;
            --md-sys-color-surface: #fcfdf6; --md-sys-color-on-surface: #1a1c19;
            --md-sys-color-surface-variant: #dee5d8; --md-sys-color-on-surface-variant: #424940;
            --md-sys-color-outline: #72796f; --md-sys-color-outline-variant: #c2c9bd;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f6f8f1;
            --md-sys-color-surface-container: #f0f2eb;
            --md-sys-color-surface-container-high: #eaede6;
            --md-sys-color-surface-container-highest: #e4e7e0;
            --md-sys-color-inverse-surface: #2f312d; --md-sys-color-inverse-on-surface: #f0f2eb;
        }
        .dark.theme-green {
            --md-sys-color-primary: #83da93; --md-sys-color-on-primary: #003911;
            --md-sys-color-primary-container: #00531a; --md-sys-color-on-primary-container: #9ff7ae;
            --md-sys-color-secondary: #b9ccb4; --md-sys-color-on-secondary: #253424;
            --md-sys-color-secondary-container: #3a4b39; --md-sys-color-on-secondary-container: #d5e8cf;
            --md-sys-color-tertiary: #a0cfd5; --md-sys-color-on-tertiary: #00363c;
            --md-sys-color-tertiary-container: #1f4d53; --md-sys-color-on-tertiary-container: #bcebf1;
            --md-sys-color-error: #ffb4ab; --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a; --md-sys-color-on-error-container: #ffb4ab;
            --md-sys-color-success: #76da9a; --md-sys-color-on-success: #00391a;
            --md-sys-color-success-container: #005229; --md-sys-color-on-success-container: #92f7b4;
            --md-sys-color-background: #1a1c19; --md-sys-color-on-background: #e2e3dd;
            --md-sys-color-surface: #1a1c19; --md-sys-color-on-surface: #e2e3dd;
            --md-sys-color-surface-variant: #424940; --md-sys-color-on-surface-variant: #c2c9bd;
            --md-sys-color-outline: #8c9388; --md-sys-color-outline-variant: #424940;
            --md-sys-color-surface-container-lowest: #0e0f0c;
            --md-sys-color-surface-container-low: #1c1d1a;
            --md-sys-color-surface-container: #20211e;
            --md-sys-color-surface-container-high: #2a2b28;
            --md-sys-color-surface-container-highest: #353632;
            --md-sys-color-inverse-surface: #e2e3dd; --md-sys-color-inverse-on-surface: #2f312d;
        }

        /* ==========================================================================
           GLOBAL & UTILITIES
           ========================================================================== */
        body { 
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0; overflow: hidden;
            transition: background-color 0.4s cubic-bezier(0.2, 0, 0, 1), color 0.4s ease;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; 
            display: inline-block; transition: all 0.2s ease;
        }
        .icon-outlined { font-variation-settings: 'FILL' 0; }

        /* ==========================================================================
           ANIMATIONS
           ========================================================================== */
        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(12px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-page { animation: pageFadeIn 0.4s cubic-bezier(0.05, 0.7, 0.1, 1) forwards; }

        @keyframes slideUpSheet { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-sheet-up { animation: slideUpSheet 0.5s cubic-bezier(0.2, 0, 0, 1) forwards; }
        
        @keyframes slideDownSheet { 0% { transform: translateY(0); } 100% { transform: translateY(100%); } }
        .animate-sheet-down { animation: slideDownSheet 0.4s cubic-bezier(0.3, 0, 0.8, 0.15) forwards; }

        @keyframes fadeInOverlay { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-overlay-in { animation: fadeInOverlay 0.4s ease forwards; }

        @keyframes staggerFade { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        
        @keyframes fabPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-fab { animation: fabPop 0.5s cubic-bezier(0.2, 0, 0, 1) forwards; }

        /* ==========================================================================
           M3 COMPONENTS STYLES (Custom CSS)
           ========================================================================== */
        
        /* RIPPLE EFFECT */
        .ripple-root { position: relative; overflow: hidden; }
        .ripple-span {
            position: absolute; border-radius: 50%;
            transform: scale(0); animation: ripple-animation 0.6s linear;
            background-color: currentColor; opacity: 0.15; pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        /* TEXT FIELD (FIXED NGEBUK) */
        .m3-text-field {
            position: relative;
            background-color: var(--md-sys-color-surface-container-highest);
            border-radius: var(--md-shape-xs) var(--md-shape-xs) 0 0;
            display: flex; flex-direction: column; min-height: 56px;
            transition: background-color 0.2s;
        }
        .m3-text-field:hover { background-color: var(--md-sys-color-surface-variant); }
        .m3-text-field::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background-color: var(--md-sys-color-on-surface-variant); transition: 0.2s;
        }
        .m3-text-field.is-active::after { height: 2px; background-color: var(--md-sys-color-primary); }
        
        .m3-input {
            width: 100%; border: none; outline: none; background: transparent;
            padding: 24px 16px 8px 16px; font-size: 16px;
            color: var(--md-sys-color-on-surface); font-family: inherit; z-index: 2;
        }
        .m3-input.has-icon { padding-left: 52px; }
        
        .m3-label {
            position: absolute; left: 16px; top: 16px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant); font-size: 16px;
            transition: 0.2s cubic-bezier(0.2, 0, 0, 1); transform-origin: left top; z-index: 1;
        }
        .m3-input.has-icon ~ .m3-label { left: 52px; }
        
        /* MAGIC FIX: Use .is-active class from React instead of just CSS pseudoclasses */
        .m3-text-field.is-active .m3-label {
            transform: translateY(-8px) scale(0.75);
            color: var(--md-sys-color-primary);
        }

        .m3-icon {
            position: absolute; left: 16px; top: 16px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant); z-index: 1;
        }
        .m3-text-field.is-active .m3-icon { color: var(--md-sys-color-on-surface); }

        /* M3 SLIDER */
        .m3-slider {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: var(--md-sys-color-surface-variant);
            border-radius: 2px; outline: none;
        }
        .m3-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--md-sys-color-primary); cursor: pointer;
            transition: transform 0.1s;
        }
        .m3-slider::-webkit-slider-thumb:active { transform: scale(1.3); }

        /* CUSTOM CHECKBOX */
        .m3-checkbox {
            appearance: none; width: 20px; height: 20px;
            border: 2px solid var(--md-sys-color-on-surface-variant);
            border-radius: 2px; position: relative; cursor: pointer;
            transition: all 0.2s;
        }
        .m3-checkbox:checked {
            background-color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }
        .m3-checkbox:checked::after {
            content: ''; position: absolute; left: 5px; top: 1px;
            width: 6px; height: 12px; border: solid white;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

    </style>
</head>
<body class="theme-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

        // ==========================================================================
        // UTILITIES
        // ==========================================================================
        const formatRupiah = (angka) => {
            if (angka === null || angka === undefined || isNaN(angka)) return '0';
            return new Intl.NumberFormat('id-ID').format(angka);
        };
        const getRawNumber = (str) => parseInt(str.toString().replace(/[^0-9]/g, ''), 10) || 0;
        
        const formatDateLong = (isoString) => {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));
        };
        const formatDateShort = (isoString) => {
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' }).format(new Date(isoString));
        };
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        // Dummy Data (Modified to use Farhan & Jumlah)
        const generateDummyData = (ownerName) => {
            const data = [];
            const types = ['Servis', 'Sparepart', 'Aksesoris'];
            const names = ['Ganti LCD Samsung', 'Softcase iPhone 13', 'Baterai Xiaomi', 'Tempered Glass', 'Servis IC Power'];
            
            for(let i=0; i<10; i++) {
                const date = new Date(); date.setDate(date.getDate() - Math.floor(Math.random() * 10));
                const type = types[Math.floor(Math.random() * types.length)];
                const modal = Math.floor(Math.random() * 10) * 15000;
                const jual = modal + (Math.floor(Math.random() * 5 + 1) * 20000);
                const jumlah = Math.floor(Math.random() * 3) + 1;
                
                data.push({
                    id: generateId() + i,
                    tanggal: date.toISOString(),
                    jenis: type,
                    nama: names[Math.floor(Math.random() * names.length)],
                    pelanggan: `Pelanggan ${Math.floor(Math.random() * 100)}`,
                    modal: type === 'Servis' ? 0 : modal,
                    jual: jual,
                    jumlah: type === 'Servis' ? 1 : jumlah,
                    laba: ((jual) - (type === 'Servis' ? 0 : modal)) * (type === 'Servis' ? 1 : jumlah),
                    status: 'Selesai',
                    catatan: `Ditambahkan otomatis oleh ${ownerName}.`
                });
            }
            return data.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        };

        // ==========================================================================
        // CONTEXT: GLOBAL STATE
        // ==========================================================================
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({
                theme: 'blue',
                isDark: false,
                storeName: 'Zona Poncell',
                ownerName: 'Farhan', // Changed default to Farhan
                hasStarted: false
            });
            const [snackbars, setSnackbars] = useState([]);

            useEffect(() => {
                const savedDb = localStorage.getItem('zp_m3_data_v2');
                const savedSettings = localStorage.getItem('zp_m3_config_v2');
                
                let currentSettings = { ...settings };
                if (savedSettings) {
                    currentSettings = { ...currentSettings, ...JSON.parse(savedSettings) };
                    setSettings(currentSettings);
                }

                if (savedDb) {
                    setTransactions(JSON.parse(savedDb));
                } else {
                    const dummy = generateDummyData(currentSettings.ownerName);
                    setTransactions(dummy);
                    localStorage.setItem('zp_m3_data_v2', JSON.stringify(dummy));
                }
            }, []);

            useEffect(() => {
                if(transactions.length > 0) localStorage.setItem('zp_m3_data_v2', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('zp_m3_config_v2', JSON.stringify(settings));
                const body = document.body;
                body.className = ''; body.classList.add(`theme-${settings.theme}`);
                if (settings.isDark) body.classList.add('dark');

                setTimeout(() => {
                    const surfaceColor = getComputedStyle(document.body).getPropertyValue('--md-sys-color-surface').trim();
                    document.getElementById('meta-theme-color').content = surfaceColor;
                }, 100);
            }, [settings.theme, settings.isDark]);

            const showSnackbar = (message) => {
                const id = Date.now();
                setSnackbars(prev => [...prev, { id, message }]);
                setTimeout(() => setSnackbars(prev => prev.filter(s => s.id !== id)), 3000);
            };

            return (
                <AppContext.Provider value={{ transactions, setTransactions, settings, setSettings, snackbars, showSnackbar }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ==========================================================================
        // UI COMPONENTS
        // ==========================================================================
        
        const Ripple = ({ children, className = '', onClick }) => {
            const [ripples, setRipples] = useState([]);
            const addRipple = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                setRipples(prev => [...prev, { x, y, size, id: Date.now() }]);
                if(onClick) onClick(e);
            };
            const cleanUp = () => setTimeout(() => setRipples([]), 600);
            return (
                <div className={`ripple-root ${className}`} onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp}>
                    {children}
                    {ripples.map(r => <span key={r.id} className="ripple-span" style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />)}
                </div>
            );
        };

        const Button = ({ variant = 'filled', children, icon, className='', onClick, fullWidth }) => {
            let colors = variant === 'filled' ? 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)]' :
                         variant === 'tonal' ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]' :
                         variant === 'error' ? 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]' :
                         'text-[var(--md-sys-color-primary)] bg-transparent';
            return (
                <Ripple className={`h-12 px-6 rounded-full flex items-center justify-center font-medium text-[15px] transition-shadow ${fullWidth ? 'w-full' : ''} ${colors} ${className}`} onClick={onClick}>
                    {icon && <span className="material-symbols-rounded mr-2 text-[20px]">{icon}</span>}
                    {children}
                </Ripple>
            );
        };

        // Fixed Ngebuk TextField
        const TextField = ({ label, value, onChange, icon, type="text", inputMode="text", multiline, prefix }) => {
            const [isFocused, setIsFocused] = useState(false);
            // Check if value exists and is not empty string
            const hasValue = value !== undefined && value !== null && String(value).trim() !== '';
            const isActive = isFocused || hasValue;

            return (
                <div className={`m3-text-field ${isActive ? 'is-active' : ''}`}>
                    {icon && <span className="material-symbols-rounded m3-icon icon-outlined">{icon}</span>}
                    {multiline ? (
                        <textarea 
                            className={`m3-input no-scrollbar resize-none ${icon ? 'has-icon' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)}
                            onFocus={() => setIsFocused(true)} onBlur={() => setIsFocused(false)}
                            placeholder=" " rows="3"
                        />
                    ) : (
                        <input 
                            type={type} inputMode={inputMode}
                            className={`m3-input ${icon ? 'has-icon' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)}
                            onFocus={() => setIsFocused(true)} onBlur={() => setIsFocused(false)}
                            placeholder=" "
                        />
                    )}
                    <label className="m3-label">{label}</label>
                    {prefix && hasValue && (
                        <span className="absolute right-4 top-[24px] text-sm text-[var(--md-sys-color-on-surface-variant)]">{prefix}</span>
                    )}
                </div>
            );
        };

        const BottomSheet = ({ isOpen, onClose, title, children }) => {

            if (item.status === 'Selesai') statusColor = 'bg-[var(--md-sys-color-success-container)] text-[var(--md-sys-color-on-success-container)]';
            if (item.status === 'Proses') statusColor = 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]';
            if (item.status === 'Batal') statusColor = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            return (

        const TabRiwayat = () => {
            const { transactions, setTransactions, showSnackbar } = useContext(AppContext);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            const [selectedItem, setSelectedItem] = useState(null);
            
            // Multi-select state
            const [isSelectMode, setIsSelectMode] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    const matchSearch = t.nama.toLowerCase().includes(search.toLowerCase()) || t.pelanggan.toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            const toggleSelect = (id) => {
                if(selectedIds.includes(id)) setSelectedIds(selectedIds.filter(i => i !== id));
                else setSelectedIds([...selectedIds, id]);
            };

            const handleBulkDelete = () => {
                if(confirm(`Hapus ${selectedIds.length} transaksi secara permanen?`)) {
                    setTransactions(prev => prev.filter(t => !selectedIds.includes(t.id)));
                    setSelectedIds([]); setIsSelectMode(false);
                    showSnackbar(`${selectedIds.length} transaksi dihapus`);
                }
            };

            const handleBulkCopy = () => {
                const toCopy = transactions.filter(t => selectedIds.includes(t.id));
                const copied = toCopy.map(t => ({...t, id: generateId(), tanggal: new Date().toISOString(), catatan: t.catatan + ' (Salinan)'}));
                setTransactions(prev => [...copied, ...prev]);
                setSelectedIds([]); setIsSelectMode(false);
                showSnackbar(`${selectedIds.length} transaksi berhasil disalin`);
            };

            const exitSelectMode = () => {
                setIsSelectMode(false); setSelectedIds([]);
            };

            return (
                <div className="flex flex-col h-full animate-page relative" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>

                        <div className="px-4 h-14 flex items-center justify-between bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] mx-4 mb-4 rounded-full shadow-md animate-page">

                                <button onClick={exitSelectMode} className="material-symbols-rounded">close</button>
                                <span className="font-medium text-lg">{selectedIds.length} Dipilih</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handleBulkCopy} disabled={selectedIds.length===0} className="w-10 h-10 rounded-full hover:bg-black/10 flex items-center justify-center disabled:opacity-50">
                                    <span className="material-symbols-rounded">content_copy</span>
                                </button>
                                <button onClick={handleBulkDelete} disabled={selectedIds.length===0} className="w-10 h-10 rounded-full hover:bg-black/10 flex items-center justify-center text-[var(--md-sys-color-error)] disabled:opacity-50">
                                    <span className="material-symbols-rounded">delete</span>
                                </button>
                            </div>

                                <span className="material-symbols-rounded">checklist</span>
                            </button>
                        </div>
                    )}

                    {!isSelectMode && (
                        <div className="px-4 space-y-4 pb-2 z-10">
                            <div className="flex items-center h-14 bg-[var(--md-sys-color-surface-container-high)] rounded-full px-4 text-[var(--md-sys-color-on-surface)]">

                        </div>

            const [nama, setNama] = useState('');

                if(!nama.trim()) return showSnackbar('Nama Barang/Jasa wajib diisi!');
                
                // If empty strings, default to 0

                showSnackbar('Transaksi berhasil dicatat'); onClose();

            const estModal = (modalStr === '' ? 0 : getRawNumber(modalStr)) * jumlah;

            const laba = estJual - estModal;

            return (
                <BottomSheet isOpen={isOpen} onClose={onClose} title="Catat Transaksi">

                        </div>
                        <div className="bg-[var(--md-sys-color-surface-container)] rounded-[var(--md-shape-2xl)] p-5">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm text-[var(--md-sys-color-on-surface-variant)]">Jumlah</span>
                                <span className="font-medium text-[var(--md-sys-color-on-surface)]">{qty}x</span>
                            </div>
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm text-[var(--md-sys-color-on-surface-variant)]">Total Modal</span>
                                <span className="font-medium text-[var(--md-sys-color-error)]">Rp{formatRupiah(item.modal * qty)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-sm text-[var(--md-sys-color-on-surface-variant)]">Total Jual</span>
                                <span className="font-medium text-[var(--md-sys-color-success)]">Rp{formatRupiah(item.jual * qty)}</span>
                            </div>
                            <div className="border-t border-[var(--md-sys-color-outline-variant)] pt-4 flex justify-between items-center">
                                <span className="font-medium text-[var(--md-sys-color-on-surface)]">Laba Bersih</span>
                                <span className="text-2xl font-medium text-[var(--md-sys-color-primary)]">Rp{formatRupiah(item.laba)}</span>
                            </div>
                        </div>
                        <div>
                            <p className="text-sm font-medium text-[var(--md-sys-color-on-surface)] mb-3">Ubah Status</p>
                            <div className="flex gap-2">
                                {['Proses', 'Selesai', 'Batal'].map(s => (
                                    <button key={s} onClick={() => updateStatus(s)}
                                        className={`flex-1 h-12 rounded-full text-sm font-medium border transition-colors ${item.status === s ? `bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] border-transparent` : 'border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-on-surface)]'}`}>
                                        {s}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </BottomSheet>
            );
        };

        const MainApp = () => {
            const { settings } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('dasbor');
            const [isAddOpen, setIsAddOpen] = useState(false);

            if (!settings.hasStarted) return <SplashScreen />;

            const tabs = [
                { id: 'dasbor', icon: 'home', label: 'Beranda' },
                { id: 'riwayat', icon: 'receipt_long', label: 'Riwayat' },
                { id: 'analisis', icon: 'analytics', label: 'Analisis' },
                { id: 'seting', icon: 'settings', label: 'Seting' }
            ];

            return (
                <div className="h-[100dvh] w-full max-w-lg mx-auto flex flex-col relative bg-[var(--md-sys-color-background)] overflow-hidden sm:border-x sm:border-[var(--md-sys-color-outline-variant)] sm:shadow-2xl">
                    <main className="flex-1 overflow-hidden relative">
                        {activeTab === 'dasbor' && <TabDasbor />}
                        {activeTab === 'riwayat' && <TabRiwayat />}
                        {activeTab === 'analisis' && <TabAnalisis />}
                        {activeTab === 'seting' && <TabSeting />}
                    </main>

                    <div className={`absolute right-4 transition-all duration-300 z-20 ${activeTab === 'seting' ? 'opacity-0 scale-75 pointer-events-none' : 'opacity-100 scale-100'}`} style={{ bottom: 'calc(96px + var(--sa-bottom))' }}>
                        <Ripple onClick={() => setIsAddOpen(true)} className="bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] rounded-[var(--md-shape-xl)] shadow-[var(--md-elevation-3)] flex items-center h-14 px-5 cursor-pointer hover:shadow-[var(--md-elevation-4)] transition-shadow">
                            <span className="material-symbols-rounded mr-3">edit</span><span className="font-medium">Catat</span>
                        </Ripple>
                    </div>

                    <nav className="h-20 shrink-0 bg-[var(--md-sys-color-surface-container)] flex justify-around items-center px-2 z-30 pb-[var(--sa-bottom)] border-t border-[var(--md-sys-color-outline-variant)]/20">
                        {tabs.map(t => {
                            const active = activeTab === t.id;
                            return (
                                <Ripple key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 cursor-pointer group">
                                    <div className={`w-16 h-8 rounded-full flex items-center justify-center transition-colors duration-300 ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                    </div>
                                    <span className={`text-[12px] font-medium mt-1 transition-colors ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>{t.label}</span>
                                </Ripple>
                            );
                        })}
                    </nav>

                    <AddTransactionSheet isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} />
                    <SnackbarContainer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

        /* ==========================================================================
           GLOBAL UTILITIES & ANTI-SELECTION

        body {

            color: var(--md-sys-color-on-background);

        }

        /* ==========================================================================

        @keyframes pageFadeIn {

        @keyframes slideDownSheet { 0% { transform: translateY(0); } 100% { transform: translateY(100%); } }
        .animate-sheet-down { animation: slideDownSheet 0.4s cubic-bezier(0.3, 0, 0.8, 0.15) forwards; }

        @keyframes slideDownAppBar { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        .animate-appbar-down { animation: slideDownAppBar 0.3s cubic-bezier(0.2, 0, 0, 1) forwards; }

        @keyframes fadeInOverlay { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-overlay-in { animation: fadeInOverlay 0.4s ease forwards; }

        /* ==========================================================================
           CUSTOM COMPONENTS STYLES
           ========================================================================== */
        
        /* 1. RIPPLE EFFECT */

        .ripple-span {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-animation 0.6s linear; background-color: currentColor;
            opacity: 0.15; pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .m3-text-field:focus-within {

            border-color: var(--md-sys-color-primary);
        }
        .m3-input {
            width: 100%; border: none; outline: none; background: transparent;
            padding: 28px 16px 12px 16px; font-size: 16px; font-weight: 600;
            color: var(--md-sys-color-on-surface); font-family: inherit;
        }
        .m3-input.has-icon { padding-left: 56px; }
        .m3-label {
            position: absolute; left: 16px; top: 20px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant); font-size: 16px; font-weight: 500;
            transition: 0.2s cubic-bezier(0.2, 0, 0, 1); transform-origin: left top;
        }
        .m3-input.has-icon ~ .m3-label { left: 56px; }
        
        .m3-input:focus ~ .m3-label, .m3-input.has-value ~ .m3-label {
            transform: translateY(-12px) scale(0.75); color: var(--md-sys-color-primary);
        }
        .m3-input.has-value:not(:focus) ~ .m3-label { color: var(--md-sys-color-on-surface-variant); }
        
        .m3-icon {
            position: absolute; left: 16px; top: 20px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant);
        }
        .m3-input:focus ~ .m3-icon { color: var(--md-sys-color-primary); }

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

        // ==========================================================================
        // UTILITIES & DATA
        // ==========================================================================
        const formatRupiah = (angka) => {
            if (!angka && angka !== 0) return '0';
            return new Intl.NumberFormat('id-ID').format(angka);
        };
        const getRawNumber = (str) => parseInt(str.toString().replace(/[^0-9]/g, ''), 10) || 0;
        
        const formatDateLong = (isoString) => {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));
        };
        const formatDateShort = (isoString) => {
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' }).format(new Date(isoString));
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        const generateDummyData = () => {
            const data = [];
            const types = ['Servis', 'Sparepart', 'Aksesoris'];
            const statuses = ['Beres', 'Beres', 'Beres', 'Jalan', 'Gagal'];
            const names = ['Ganti LCD Samsung', 'Softcase iPhone 13', 'Baterai Xiaomi', 'Tempered Glass', 'Servis IC Power', 'Kabel Data Type-C'];
            
            for(let i=0; i<80; i++) {
                const date = new Date(); date.setDate(date.getDate() - Math.floor(Math.random() * 150)); 
                const type = types[Math.floor(Math.random() * types.length)];
                const modal = Math.floor(Math.random() * 10) * 15000;
                const jual = modal + (Math.floor(Math.random() * 5 + 1) * 20000);
                const jumlah = type === 'Servis' ? 1 : Math.floor(Math.random() * 4) + 1;
                
                data.push({
                    id: generateId() + i, tanggal: date.toISOString(), jenis: type,
                    nama: names[Math.floor(Math.random() * names.length)], pelanggan: `Klien ${Math.floor(Math.random() * 100)}`,
                    modal: type === 'Servis' ? (Math.random() > 0.5 ? modal : 0) : modal, jual: jual, jumlah: jumlah,
                    laba: type === 'Servis' ? (jual - (Math.random() > 0.5 ? modal : 0)) * jumlah : (jual - modal) * jumlah,
                    status: statuses[Math.floor(Math.random() * statuses.length)]
                });
            }
            return data.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        };

        // Filter Logic based on Hari/Minggu/Bulan Format
        const filterByPeriod = (data, format, offset) => {
             const target = new Date();
             if (format === 'Hari') {
                 target.setDate(target.getDate() + offset);
                 const y = target.getFullYear(), m = target.getMonth(), d = target.getDate();
                 return data.filter(item => { const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m && id.getDate() === d; });
             } else if (format === 'Minggu') {
                 target.setDate(target.getDate() + (offset * 7));
                 const day = target.getDay();
                 const diff = target.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(target.setDate(diff)); monday.setHours(0,0,0,0);
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6); sunday.setHours(23,59,59,999);
                 return data.filter(item => { const id = new Date(item.tanggal); return id >= monday && id <= sunday; });
             } else { // Bulan
                 target.setMonth(target.getMonth() + offset);
                 const y = target.getFullYear(), m = target.getMonth();
                 return data.filter(item => { const id = new Date(item.tanggal); return id.getFullYear() === y && id.getMonth() === m; });
             }
        };

        const getPeriodLabel = (format, offset) => {
             const d = new Date();
             if (format === 'Hari') {
                 d.setDate(d.getDate() + offset);
                 if (offset === 0) return 'Hari Ini';
                 if (offset === -1) return 'Kemarin';
                 return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric'}).format(d);
             } else if (format === 'Minggu') {
                 d.setDate(d.getDate() + (offset * 7));
                 const day = d.getDay();
                 const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                 const monday = new Date(d.setDate(diff));
                 const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
                 return `${monday.getDate()} - ${sunday.getDate()} ${new Intl.DateTimeFormat('id-ID', { month: 'short'}).format(sunday)}`;
             } else {
                 d.setMonth(d.getMonth() + offset);
                 if (offset === 0) return 'Bulan Ini';
                 return new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric'}).format(d);
             }
        };

        // ==========================================================================
        // CONTEXT: GLOBAL STATE
        // ==========================================================================
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [activeTab, setActiveTab] = useState('dasbor');
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({ theme: 'blue', hasStarted: false, periodFormat: 'Bulan' });
            const [snackbars, setSnackbars] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null); // Global detail sheet state

            // Load Data
            useEffect(() => {
                const savedDb = localStorage.getItem('zp_m3_data');
                if (savedDb) {
                    const parsed = JSON.parse(savedDb).map(item => ({...item, jumlah: item.jumlah || 1}));
                    setTransactions(parsed);
                } else {
                    const dummy = generateDummyData(); setTransactions(dummy);

        const Ripple = ({ children, className = '', onClick, onPointerDown, onPointerUp, onPointerMove, onPointerLeave, style }) => {
            const [ripples, setRipples] = useState([]);
            
            const addRipple = (e) => {
                if (onPointerDown) onPointerDown(e);
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                setRipples(prev => [...prev, { x, y, size, id: Date.now() }]);
            };
            const cleanUp = (e) => {
                if (onPointerUp && e.type === 'pointerup') onPointerUp(e);
                if (onPointerLeave && e.type === 'pointerleave') onPointerLeave(e);
                setTimeout(() => setRipples([]), 600); 
            };
            const handleMove = (e) => { if(onPointerMove) onPointerMove(e); }

            return (
                <div className={`ripple-root ${className}`} style={style}
                     onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp} onPointerMove={handleMove} onClick={onClick}>
                    {children}
                    {ripples.map(r => (
                        <span key={r.id} className="ripple-span" style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />

            return (

                    tabs.forEach(t => t.style.overflow = 'auto');
                }
                
                const handlePopState = (e) => {
                    if (isOpen) executeClose();
                };
                if (isOpen) window.addEventListener('popstate', handlePopState);
                
                return () => {
                    if (isOpen) {
                        window.removeEventListener('popstate', handlePopState);
                        tabs.forEach(t => t.style.overflow = 'auto');

                };
            }, [isOpen]);

            const executeClose = () => {
                setIsClosing(true);

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] space-y-4">
                        <TextField label="Nama Kerjaan / Barang" value={nama} onChange={setNama} icon={isServis?'build':'shopping_bag'} />
                        <TextField label="Orangnya (Boleh Kosong)" value={pelanggan} onChange={setPelanggan} icon="person" />
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <TextField label="Modal Keluar" value={modalStr ? formatRupiah(getRawNumber(modalStr)) : ''} onChange={setModalStr} inputMode="numeric" prefix="Rp" />
                            <TextField label="Jual Berapa" value={jualStr ? formatRupiah(getRawNumber(jualStr)) : ''} onChange={setJualStr} inputMode="numeric" prefix="Rp" />
                        </div>

                        <div className={`bg-[var(--md-sys-color-surface-container-highest)] p-5 rounded-[var(--md-shape-2xl)] relative pt-8 mt-2 transition-all duration-500 ${isServis ? 'opacity-40 grayscale pointer-events-none' : ''}`}>
                            <span className="absolute left-5 top-3 text-[13px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jumlah Laku</span>
                            <div className="flex items-center gap-5 mt-2">
                                <input type="range" min="1" max="50" value={jumlah} onChange={e => setJumlah(parseInt(e.target.value))} className="m3-slider flex-1" disabled={isServis} />
                                <span className="w-12 text-center font-extrabold text-2xl text-[var(--md-sys-color-primary)]">{jumlah}</span>
                            </div>
                        </div>

                        <div className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-6 rounded-[var(--md-shape-2xl)] flex justify-between items-center shadow-md">
                            <div>
                                <span className="text-sm font-extrabold uppercase tracking-widest opacity-80 block mb-1">Dapet Cuan</span>
                                <span className="text-[11px] opacity-70 font-medium">Udah dikali jumlah</span>
                            </div>
                            <span className="text-3xl font-extrabold">Rp{formatRupiah(laba)}</span>
                        </div>
                    </div>

                    <Button onClick={handleSave} icon="local_atm" fullWidth className="mt-6 h-16 text-lg shadow-[var(--md-elevation-3)] mb-4">Sikat Bos! Catet</Button>
                </div>
            );
        };

        // --- TAB 3: RIWAYAT ---
        const TabRiwayat = () => {
            const { transactions, setTransactions, showSnackbar, setSelectedItem } = useContext(AppContext);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            
            const [selectedIds, setSelectedIds] = useState([]);
            const isSelectionMode = selectedIds.length > 0;

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    const matchSearch = t.nama.toLowerCase().includes(search.toLowerCase()) || t.pelanggan.toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            useEffect(() => {
                const handlePopState = () => { if (selectedIds.length > 0) { setSelectedIds([]); } };
                if (selectedIds.length > 0) { window.history.pushState({ selectionMode: true }, ''); window.addEventListener('popstate', handlePopState); }
                return () => { if (selectedIds.length > 0) window.removeEventListener('popstate', handlePopState); };
            }, [selectedIds]);

            const closeSelectionModeUI = () => {
                if (window.history.state && window.history.state.selectionMode) { window.history.back(); }
                else { setSelectedIds([]); }
            };

            const toggleSelection = (id) => { setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]); };

            const handleBulkDelete = () => {
                if(confirm(`Buang ${selectedIds.length} catetan ini ke tong sampah?`)) {
                    setTransactions(prev => prev.filter(t => !selectedIds.includes(t.id)));
                    closeSelectionModeUI(); showSnackbar(`${selectedIds.length} catetan dibakar 🔥`);
                }
            };

            const handleBulkCopy = () => {
                const toCopy = transactions.filter(t => selectedIds.includes(t.id));
                const newItems = toCopy.map(item => ({ ...item, id: generateId(), tanggal: new Date().toISOString(), status: 'Jalan' }));
                setTransactions(prev => [...newItems, ...prev]);
                closeSelectionModeUI(); showSnackbar(`${newItems.length} dicopy, gasss!`);
            };

            return (
                <div className="tab-content-area flex flex-col h-full animate-page relative" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    
                    {isSelectionMode && (
                        <div className="absolute top-0 left-0 right-0 z-[60] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] h-20 flex items-center justify-between px-4 animate-appbar-down shadow-lg rounded-b-[var(--md-shape-2xl)] border-b border-[var(--md-sys-color-outline-variant)]" style={{ paddingTop: 'var(--sa-top)', height: 'calc(80px + var(--sa-top))' }}>
                            <div className="flex items-center gap-4">
                                <button onClick={closeSelectionModeUI} className="w-12 h-12 rounded-full flex items-center justify-center bg-black/10 hover:bg-black/20 transition-colors">
                                    <span className="material-symbols-rounded text-2xl">close</span>
                                </button>
                                <span className="text-xl font-bold">{selectedIds.length} Dipilih</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleBulkCopy} className="w-12 h-12 rounded-full flex items-center justify-center bg-black/10 hover:bg-black/20 transition-colors">
                                    <span className="material-symbols-rounded text-2xl">content_copy</span>
                                </button>
                                <button onClick={handleBulkDelete} className="w-12 h-12 rounded-full flex items-center justify-center bg-[var(--md-sys-color-error)]/20 hover:bg-[var(--md-sys-color-error)]/30 transition-colors text-[var(--md-sys-color-error)]">
                                    <span className="material-symbols-rounded text-2xl">delete</span>
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="px-4 space-y-5 pb-2 z-10 bg-[var(--md-sys-color-background)]">
                        <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] tracking-tight">Catetan Lama.</h1>
                        
                        <div className="flex items-center h-16 bg-[var(--md-sys-color-surface-container-highest)] rounded-[var(--md-shape-2xl)] px-5 text-[var(--md-sys-color-on-surface)] shadow-inner focus-within:ring-2 ring-[var(--md-sys-color-primary)] transition-all">
                            <span className="material-symbols-rounded mr-4 opacity-70 text-[24px]">search</span>
                            <input type="text" placeholder="Nyari kerjaan siapa bos?..." value={search} onChange={e => setSearch(e.target.value)}
                                className="bg-transparent border-none outline-none flex-1 text-[16px] font-bold placeholder:text-[var(--md-sys-color-on-surface-variant)]/60 placeholder:font-medium" />
                            {search && <span className="material-symbols-rounded cursor-pointer opacity-70 ml-2 p-1 bg-black/20 rounded-full" onClick={() => setSearch('')}>close</span>}
                        </div>

                        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                            {['Semua', 'Servis', 'Sparepart', 'Aksesoris'].map(f => (
                                <button key={f} onClick={() => setFilterType(f)}
                                    className={`px-6 h-12 rounded-full text-[15px] font-extrabold border-2 transition-all shrink-0 ${
                                        filterType === f 
                                        ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent shadow-md scale-105' 
                                        : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)] bg-transparent hover:bg-[var(--md-sys-color-surface-variant)]'
                                    }`}>{f}</button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 pb-32 space-y-3 pt-2 no-scrollbar">
                        {filteredData.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-24 text-[var(--md-sys-color-on-surface-variant)]">
                                <span className="material-symbols-rounded text-[80px] mb-4 opacity-30">manage_search</span>
                                <p className="font-bold text-xl opacity-60">Kosong melompong bos</p>
                            </div>
                        ) : (
                            filteredData.map(item => (
                                <ActivityItem key={item.id} item={item} 
                                              selectable={isSelectionMode} selected={selectedIds.includes(item.id)}
                                              onSelect={() => toggleSelection(item.id)} onClick={() => setSelectedItem(item)} />
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // --- TAB 4: ANALISIS ---
        const TabAnalisis = () => {
            const { transactions, settings } = useContext(AppContext);
            const refLine = useRef(null); const refPie = useRef(null); const refBar = useRef(null);
            const inst = useRef({ line: null, pie: null, bar: null });
            
            const [sheetInfo, setSheetInfo] = useState(null); // 'margin' | 'beres' | null

            const getColors = useCallback(() => {
                const style = getComputedStyle(document.body);
                return {
                    primary: style.getPropertyValue('--md-sys-color-primary').trim(),
                    tertiary: style.getPropertyValue('--md-sys-color-tertiary').trim(),
                    error: style.getPropertyValue('--md-sys-color-error').trim(),
                    text: style.getPropertyValue('--md-sys-color-on-surface-variant').trim(),
                    grid: style.getPropertyValue('--md-sys-color-outline-variant').trim(),
                    bg: style.getPropertyValue('--md-sys-color-surface-container-low').trim()
                };
            }, [settings.theme]);

            // Grouping logic for the Line Chart based on periodFormat
            const getChartData = () => {
                let labels = []; let dataPoints = [];
                const format = settings.periodFormat;
                
                if (format === 'Hari') {
                    // 7 Hari Terakhir
                    labels = [...Array(7)].map((_, i) => { 
                        const d = new Date(); d.setDate(d.getDate() - (6 - i)); 
                        return d.toLocaleDateString('id-ID', { weekday:'short'}); 
                    });
                    dataPoints = [...Array(7)].map((_, i) => {
                        const d = new Date(); d.setDate(d.getDate() - (6 - i));
                        const targetDate = d.toISOString().split('T')[0];
                        return transactions.filter(t => t.tanggal.startsWith(targetDate) && t.status === 'Beres').reduce((s,i) => s + i.laba, 0);
                    });
                } else if (format === 'Minggu') {
                    // 4 Minggu Terakhir
                    for (let i = 3; i >= 0; i--) {
                        labels.push(`M-${i === 0 ? 'Ini' : i}`);
                        const wData = filterByPeriod(transactions, 'Minggu', -i);
                        dataPoints.push(wData.filter(t => t.status === 'Beres').reduce((s,x) => s + x.laba, 0));
                    }
                } else {
                    // 6 Bulan Terakhir
                    for (let i = 5; i >= 0; i--) {
                        const d = new Date(); d.setMonth(d.getMonth() - i);
                        labels.push(d.toLocaleDateString('id-ID', { month: 'short' }));
                        const mData = filterByPeriod(transactions, 'Bulan', -i);
                        dataPoints.push(mData.filter(t => t.status === 'Beres').reduce((s,x) => s + x.laba, 0));
                    }
                }
                return { labels, dataPoints };
            };

            useEffect(() => {
                if (transactions.length === 0) return;
                const c = getColors();
                Object.values(inst.current).forEach(chart => chart && chart.destroy());
                
                Chart.defaults.font.family = "'Readex Pro', sans-serif";
                Chart.defaults.font.weight = 'bold';
                Chart.defaults.color = c.text;

                const { labels: lineLabels, dataPoints: lineData } = getChartData();

                inst.current.line = new Chart(refLine.current.getContext('2d'), {
                    type: 'line',
                    data: { labels: lineLabels, datasets: [{ label: 'Cuan', data: lineData, borderColor: c.primary, backgroundColor: `${c.primary}30`, fill: true, tension: 0.4, pointBackgroundColor: c.bg, pointBorderColor: c.primary, pointBorderWidth: 4, pointRadius: 6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: c.grid, borderDash: [5,5] }, ticks: { callback: v => `${v/1000}k` } } } }
                });

                const counts = ['Servis', 'Sparepart', 'Aksesoris'].map(j => transactions.filter(t => t.jenis === j && t.status === 'Beres').length);
                inst.current.pie = new Chart(refPie.current.getContext('2d'), {
                    type: 'doughnut',
                    data: { labels: ['Servis', 'Spare', 'Aks'], datasets: [{ data: counts, backgroundColor: [c.primary, c.tertiary, c.error], borderColor: c.bg, borderWidth: 4, hoverOffset: 8 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { padding: 20 } } } }
                });

                const itemsMap = {};
                transactions.filter(t=>t.status==='Beres' && t.jenis!=='Servis').forEach(t => { itemsMap[t.nama] = (itemsMap[t.nama] || 0) + t.jumlah; });
                const topItems = Object.entries(itemsMap).sort((a,b)=>b[1]-a[1]).slice(0, 4);

                if(topItems.length > 0 && refBar.current) {
                    inst.current.bar = new Chart(refBar.current.getContext('2d'), {
                        type: 'bar',
                        data: { labels: topItems.map(i=>i[0]), datasets: [{ data: topItems.map(i=>i[1]), backgroundColor: c.tertiary, borderRadius: 8 }] },
                        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x: { display: false }, y: { grid: {display:false} } } }
                    });
                }

                return () => Object.values(inst.current).forEach(chart => chart && chart.destroy());
            }, [transactions, settings.theme, settings.periodFormat, getColors]);

            const totalSelesai = transactions.filter(t => t.status === 'Beres');
            const totalOmset = totalSelesai.reduce((s,i) => s + (i.jual * i.jumlah), 0);
            const totalLaba = totalSelesai.reduce((s,i) => s + i.laba, 0);
            const margin = totalOmset > 0 ? ((totalLaba / totalOmset) * 100).toFixed(1) : 0;

            // Generate monthly grouped data for detailed bottom sheet
            const groupedByMonth = useMemo(() => {
                const groups = {};
                totalSelesai.forEach(t => {
                    const d = new Date(t.tanggal);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    const monthName = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                    
                    if (!groups[key]) groups[key] = { label: monthName, totalOmset: 0, totalLaba: 0, count: 0, countServis: 0, countBarang: 0 };
                    
                    groups[key].totalOmset += (t.jual * t.jumlah);
                    groups[key].totalLaba += t.laba;
                    groups[key].count += 1;
                    if(t.jenis === 'Servis') groups[key].countServis += 1; else groups[key].countBarang += 1;
                });
                return Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(k => groups[k]); // Sort latest first
            }, [totalSelesai]);

            return (
                <div className="tab-content-area p-4 space-y-5 animate-page h-full overflow-y-auto no-scrollbar pb-32" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] mb-2 tracking-tight px-2">Ngecek Cuan.</h1>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <Ripple onClick={() => setSheetInfo('margin')} className="bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] p-6 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl transition-shadow">
                            <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px]">percent</span></div>
                            <p className="text-xs font-extrabold uppercase tracking-widest opacity-80 mb-2">Persentase Untung</p>
                            <h2 className="text-4xl font-extrabold tracking-tighter">{margin}%</h2>
                        </Ripple>
                        <Ripple onClick={() => setSheetInfo('beres')} className="bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] p-6 rounded-[var(--md-shape-3xl)] shadow-lg relative overflow-hidden cursor-pointer hover:shadow-xl transition-shadow">
                            <div className="absolute -right-4 -top-4 opacity-20"><span className="material-symbols-rounded text-[80px]">done_all</span></div>
                            <p className="text-xs font-extrabold uppercase tracking-widest opacity-80 mb-2">Total Beres</p>
                            <h2 className="text-4xl font-extrabold tracking-tighter">{totalSelesai.length} <span className="text-base font-bold">Nota</span></h2>
                        </Ripple>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)]">Grafik Cuan ({settings.periodFormat})</h3>
                            <div className="w-10 h-10 rounded-full bg-[var(--md-sys-color-surface-variant)] flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)]">
                                <span className="material-symbols-rounded text-xl">show_chart</span>
                            </div>
                        </div>
                        <div className="h-[220px] relative">
                            {transactions.length > 0 ? <canvas ref={refLine}></canvas> : <p className="text-center mt-20 text-[var(--md-sys-color-on-surface-variant)] font-bold">Sepi amat bos, belom ada data</p>}
                        </div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)] mb-6">Dari Mana Aja?</h3>
                        <div className="h-[180px] relative">
                            {transactions.length > 0 ? <canvas ref={refPie}></canvas> : <p className="text-center mt-16 text-[var(--md-sys-color-on-surface-variant)] font-bold">Belom ada data</p>}
                        </div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <h3 className="font-extrabold text-lg text-[var(--md-sys-color-on-surface)] mb-6">Barang Paling Laku</h3>
                        <div className="h-[180px] relative">
                            {transactions.filter(t=>t.jenis!=='Servis' && t.status==='Beres').length > 0 ? <canvas ref={refBar}></canvas> : <p className="text-center mt-16 text-[var(--md-sys-color-on-surface-variant)] font-bold">Barang belom ada yang laku nih</p>}
                        </div>
                    </div>
                    
                    {/* Insights Bottom Sheet Detailed Grouped List */}
                    <BottomSheet isOpen={!!sheetInfo} onClose={() => setSheetInfo(null)} title={sheetInfo === 'margin' ? 'Rincian Persentase' : 'Rincian Nota Beres'}>
                        <div className="space-y-4 pt-4">
                            <p className="text-[var(--md-sys-color-on-surface-variant)] font-medium mb-4">
                                {sheetInfo === 'margin' ? 'Berikut rincian margin untung bulanan berdasarkan modal & jual.' : 'Rekap jumlah garapan yang kelar ditarik per-bulannya bos.'}
                            </p>
                            
                            {groupedByMonth.map((grp, idx) => {
                                const mrg = grp.totalOmset > 0 ? ((grp.totalLaba / grp.totalOmset) * 100).toFixed(1) : 0;
                                
                                return (
                                    <div key={idx} className="bg-[var(--md-sys-color-surface-container)] p-5 rounded-[var(--md-shape-2xl)] space-y-3 shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                                        <h4 className="font-extrabold text-[var(--md-sys-color-primary)] text-lg mb-2">{grp.label}</h4>
                                        
                                        {sheetInfo === 'margin' ? (
                                            <>
                                                <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Duit Masuk</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">Rp{formatRupiah(grp.totalOmset)}</span></div>
                                                <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Cuan Murni</span><span className="font-extrabold text-base text-[var(--md-sys-color-primary)]">Rp{formatRupiah(grp.totalLaba)}</span></div>
                                                <div className="border-t border-dashed border-[var(--md-sys-color-outline-variant)] pt-3 flex justify-between items-center mt-1">
                                                    <span className="font-bold text-[13px] uppercase tracking-wide">Margin Untung</span><span className="text-xl font-extrabold text-[var(--md-sys-color-on-surface)]">{mrg}%</span>
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Dari Servis</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">{grp.countServis} Nota</span></div>
                                                <div className="flex justify-between items-center"><span className="font-bold text-[14px] text-[var(--md-sys-color-on-surface-variant)]">Dari Barang</span><span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)]">{grp.countBarang} Nota</span></div>
                                                <div className="border-t border-dashed border-[var(--md-sys-color-outline-variant)] pt-3 flex justify-between items-center mt-1">
                                                    <span className="font-bold text-[13px] uppercase tracking-wide">Total Kelar</span><span className="text-xl font-extrabold text-[var(--md-sys-color-primary)]">{grp.count} Nota</span>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </BottomSheet>
                </div>
            );
        };

        // --- TAB 5: SETING ---
        const TabSeting = () => {
            const { settings, setSettings, transactions, setTransactions, showSnackbar } = useContext(AppContext);

            const themes = [
                { id: 'blue', color: '#9ecaeb' }, { id: 'green', color: '#83da93' }, { id: 'orange', color: '#ffb77c' },
                { id: 'purple', color: '#d0bcff' }, { id: 'red', color: '#ffb4ab' }, { id: 'teal', color: '#4fd8eb' }
            ];

            const handleBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
                const a = document.createElement('a'); a.href = dataStr; a.download = `ZonaPoncell_Backup_${new Date().getTime()}.json`; a.click();
                showSnackbar('Sip, Data udah di-backup');
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if(Array.isArray(json)) { setTransactions(json); showSnackbar('Mantap, Data balik lagi'); }
                    } catch(err) { showSnackbar('File ga jelas bos, gagal!'); }
                };
                reader.readAsText(file);
            };

            const handleClear = () => {
                if(confirm('WOI PERINGATAN! Ini bakal hapus SEMUA data lo secara permanen. Lanjutin bakar data?')) {
                    setTransactions([]); showSnackbar('BUM! Semua data udah hangus 🔥');
                }
            };

            return (
                <div className="tab-content-area p-4 space-y-6 animate-page h-full overflow-y-auto no-scrollbar pb-32" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    <h1 className="text-3xl font-bold text-[var(--md-sys-color-on-surface)] tracking-tight mb-4 px-2">Settingan.</h1>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-3xl)] p-6 shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <p className="font-extrabold text-base text-[var(--md-sys-color-on-surface)] mb-5">Pilih Warna (Dark Mode)</p>
                        <div className="grid grid-cols-3 gap-4">
                            {themes.map(t => (
                                <div key={t.id} onClick={() => setSettings({...settings, theme: t.id})}
                                     className={`h-16 rounded-[var(--md-shape-2xl)] flex items-center justify-center cursor-pointer transition-all duration-300 ${settings.theme === t.id ? 'scale-105 shadow-[0_0_20px_rgba(255,255,255,0.2)] ring-4 ring-[var(--md-sys-color-on-surface)] ring-offset-4 ring-offset-[var(--md-sys-color-surface-container-low)]' : 'scale-100 hover:scale-105 opacity-80'}`}
                                     style={{ backgroundColor: t.color }}>
                                     {settings.theme === t.id && <span className="material-symbols-rounded text-black text-[32px] opacity-80">check</span>}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-3xl)] p-6 shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <p className="font-extrabold text-base text-[var(--md-sys-color-on-surface)] mb-2">Format Laporan Dasbor</p>
                        <p className="text-xs font-medium text-[var(--md-sys-color-on-surface-variant)] mb-5">Berpengaruh ke grafik cuan di tab Dasbor & Ngecek.</p>
                        <div className="flex bg-[var(--md-sys-color-surface-container-highest)] rounded-[var(--md-shape-xl)] p-1.5 shadow-inner">
                            {['Hari', 'Minggu', 'Bulan'].map(f => (
                                <button key={f} type="button" onClick={() => setSettings({...settings, periodFormat: f})}
                                    className={`flex-1 py-3 text-[14px] font-bold rounded-[calc(var(--md-shape-xl)-6px)] transition-all duration-300 ${
                                        settings.periodFormat === f ? 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] shadow-md transform scale-[1.02]' 
                                        : 'text-[var(--md-sys-color-on-surface-variant)] bg-transparent hover:bg-[var(--md-sys-color-surface-variant)]'
                                    }`}>{f}</button>
                            ))}
                        </div>
                    </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-3xl)] p-4 shadow-sm border border-[var(--md-sys-color-outline-variant)]">
                        <h3 className="text-[13px] font-extrabold tracking-widest text-[var(--md-sys-color-primary)] uppercase p-3 ml-2">Ngatur Database</h3>
                        <Ripple className="w-full flex items-center p-4 rounded-[var(--md-shape-2xl)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] transition-colors mt-2" onClick={handleBackup}>
                            <div className="w-12 h-12 rounded-[20px] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] flex items-center justify-center mr-5 shrink-0 shadow-sm"><span className="material-symbols-rounded text-[24px]">download</span></div>
                            <div className="text-left"><p className="font-bold text-base">Amankan Data (Backup)</p><p className="text-[13px] font-medium opacity-70">Download ke JSON</p></div>
                        </Ripple>
                        <label className="w-full flex items-center p-4 rounded-[var(--md-shape-2xl)] text-[var(--md-sys-color-on-surface)] hover:bg-[var(--md-sys-color-surface-variant)] transition-colors cursor-pointer">
                            <div className="w-12 h-12 rounded-[20px] bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] flex items-center justify-center mr-5 shrink-0 shadow-sm"><span className="material-symbols-rounded text-[24px]">upload</span></div>
                            <div className="text-left"><p className="font-bold text-base">Balikin Data (Restore)</p><p className="text-[13px] font-medium opacity-70">Ambil dari JSON</p></div>
                            <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                        </label>
                        <div className="w-full h-[1px] bg-[var(--md-sys-color-outline-variant)] my-2 opacity-50"></div>
                        <Ripple className="w-full flex items-center p-4 rounded-[var(--md-shape-2xl)] text-[var(--md-sys-color-error)] hover:bg-[var(--md-sys-color-error-container)] hover:text-[var(--md-sys-color-on-error-container)] transition-colors group" onClick={handleClear}>
                            <div className="w-12 h-12 rounded-[20px] bg-[var(--md-sys-color-error)]/20 text-[var(--md-sys-color-error)] group-hover:bg-[var(--md-sys-color-error)] group-hover:text-[var(--md-sys-color-on-error)] flex items-center justify-center mr-5 shrink-0 transition-colors"><span className="material-symbols-rounded text-[24px]">local_fire_department</span></div>
                            <div className="text-left"><p className="font-extrabold text-base">Bakar Semua Data</p><p className="text-[13px] font-medium opacity-80">Reset pabrik aplikasi</p></div>
                        </Ripple>
                    </div>
                    <p className="text-center text-[12px] text-[var(--md-sys-color-on-surface-variant)] pt-4 pb-6 tracking-widest uppercase font-extrabold opacity-50">Zona Poncell M3 Pro • Bos Edition</p>
                </div>
            );
        };

        // --- SHEET DETAIL (GLOBAL) ---
        const DetailSheet = () => {
            const { transactions, setTransactions, showSnackbar, selectedItem: item, setSelectedItem } = useContext(AppContext);
            
            const onClose = () => setSelectedItem(null);

            if (!item) return null;

            const currentItem = transactions.find(t => t.id === item.id) || item;

            const updateStatus = (newStatus) => {
                setTransactions(prev => prev.map(t => t.id === currentItem.id ? {...t, status: newStatus} : t));
                showSnackbar(`Sip, Status diubah ke ${newStatus}`);
            };

            const handleDelete = () => {
                if(confirm('Yakin mau buang data ini ke tong sampah?')) {
                    setTransactions(prev => prev.filter(t => t.id !== currentItem.id));
                    showSnackbar('Satu data dibuang'); onClose();
                }
            };

            return (
                <BottomSheet isOpen={!!item} onClose={onClose} title="Detailnya Nih">
                    <div className="space-y-5 pt-4">
                        <div className="text-center bg-[var(--md-sys-color-surface)] p-6 rounded-[var(--md-shape-3xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)] relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10">
                                <span className="material-symbols-rounded text-[100px]">{currentItem.jenis === 'Servis' ? 'build' : currentItem.jenis === 'Sparepart' ? 'memory' : 'headphones'}</span>
                            </div>
                            <h2 className="text-2xl font-extrabold text-[var(--md-sys-color-on-surface)] mb-2 leading-tight relative z-10">{currentItem.nama}</h2>
                            <p className="text-[var(--md-sys-color-on-surface-variant)] text-sm font-medium mb-4 relative z-10">{formatDateLong(currentItem.tanggal)}</p>
                            <div className="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-full bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] text-[15px] font-bold relative z-10 shadow-sm">
                                <span className="material-symbols-rounded text-lg">person</span> {currentItem.pelanggan}
                            </div>
                        </div>

                        <div className="bg-[var(--md-sys-color-surface-container)] rounded-[var(--md-shape-3xl)] p-6 shadow-md border border-[var(--md-sys-color-outline-variant)]">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jumlah</span>
                                <span className="font-extrabold text-[var(--md-sys-color-on-surface)] text-lg">{currentItem.jumlah}x</span>
                            </div>
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Modal Keluar /pcs</span>
                                <span className="font-extrabold text-[var(--md-sys-color-error)] text-lg">Rp{formatRupiah(currentItem.modal)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-[15px] font-bold text-[var(--md-sys-color-on-surface-variant)]">Jual Harga /pcs</span>
                                <span className="font-extrabold text-[var(--md-sys-color-success)] text-lg">Rp{formatRupiah(currentItem.jual)}</span>
                            </div>
                            <div className="border-t-2 border-dashed border-[var(--md-sys-color-outline-variant)] pt-5 flex justify-between items-center">
                                <div>
                                    <span className="font-extrabold text-base text-[var(--md-sys-color-on-surface)] block tracking-wide uppercase">Cuan Murni</span>
                                </div>
                                <span className="text-3xl font-extrabold text-[var(--md-sys-color-primary)] tracking-tighter">Rp{formatRupiah(currentItem.laba)}</span>
                            </div>
                        </div>

                        <div>
                            <p className="text-[13px] font-extrabold tracking-widest uppercase text-[var(--md-sys-color-on-surface-variant)] mb-3 ml-2">Status Kerjaan</p>
                            <div className="flex gap-2">
                                {['Jalan', 'Beres', 'Gagal'].map(s => (
                                    <button key={s} onClick={() => updateStatus(s)}
                                        className={`flex-1 h-14 rounded-[var(--md-shape-xl)] text-[15px] font-extrabold border-2 transition-all duration-300 ${
                                            currentItem.status === s 
                                            ? `bg-[var(--md-sys-color-${s==='Beres'?'success':s==='Jalan'?'primary':'error'}-container)] text-[var(--md-sys-color-on-${s==='Beres'?'success':s==='Jalan'?'primary':'error'}-container)] border-transparent shadow-lg scale-[1.03]`
                                            : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface)] bg-transparent hover:bg-[var(--md-sys-color-surface-variant)]'
                                        }`}>{s}</button>
                                ))}
                            </div>
                        </div>

                        <Button variant="text" icon="delete" fullWidth className="text-[var(--md-sys-color-error)] mt-4 h-16 bg-[var(--md-sys-color-error-container)]/10 hover:bg-[var(--md-sys-color-error-container)]/30 rounded-[var(--md-shape-2xl)]" onClick={handleDelete}>Buang Data Ini</Button>
                    </div>
                </BottomSheet>
            );
        };

        // ==========================================================================
        // APP SHELL
        // ==========================================================================
        const MainApp = () => {
            const { settings, activeTab, setActiveTab } = useContext(AppContext);

            if (!settings.hasStarted) return <SplashScreen />;

            const tabs = [
                { id: 'dasbor', icon: 'home', label: 'Beranda' },
                { id: 'catet', icon: 'add_circle', label: 'Catet' },
                { id: 'riwayat', icon: 'history', label: 'Riwayat' },
                { id: 'analisis', icon: 'monitoring', label: 'Ngecek' },
                { id: 'seting', icon: 'tune', label: 'Seting' }
            ];

            return (
                <div className="h-[100dvh] w-full max-w-lg mx-auto flex flex-col relative bg-[var(--md-sys-color-background)] overflow-hidden sm:border-x sm:border-[var(--md-sys-color-outline-variant)] sm:shadow-2xl">
                    <main className="flex-1 overflow-hidden relative">
                        {activeTab === 'dasbor' && <TabDasbor />}
                        {activeTab === 'catet' && <TabCatet />}
                        {activeTab === 'riwayat' && <TabRiwayat />}
                        {activeTab === 'analisis' && <TabAnalisis />}
                        {activeTab === 'seting' && <TabSeting />}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="absolute bottom-0 w-full h-[96px] bg-[var(--md-sys-color-surface-container)] flex justify-around items-center px-2 z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.5)]" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        {tabs.map(t => {
                            const active = activeTab === t.id;
                            
                            return (
                                <Ripple key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 pb-1 relative group cursor-pointer">
                                    <div className={`w-14 h-8 rounded-full flex items-center justify-center transition-all duration-300 ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] scale-110 shadow-sm' : 'text-[var(--md-sys-color-on-surface-variant)] scale-100 group-hover:bg-[var(--md-sys-color-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded text-2xl transition-all duration-300 ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                    </div>
                                    <span className={`text-[12px] font-extrabold mt-1.5 transition-colors tracking-wide ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>{t.label}</span>
                                </Ripple>
                            );
                        })}
                    </nav>

                    {/* Global Sheet for details */}
                    <DetailSheet />
                    
                    <SnackbarContainer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

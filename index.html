<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbfdf8" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zona Poncell M3 Pro</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        /* ==========================================================================
           MATERIAL 3 DESIGN TOKENS & THEMING ENGINE
           ========================================================================== */
        :root {
            --sa-top: env(safe-area-inset-top, 0px);
            --sa-bottom: env(safe-area-inset-bottom, 0px);
            --sa-left: env(safe-area-inset-left, 0px);
            --sa-right: env(safe-area-inset-right, 0px);

            --md-shape-xs: 4px;
            --md-shape-sm: 8px;
            --md-shape-md: 12px;
            --md-shape-lg: 16px;
            --md-shape-xl: 28px;
            --md-shape-2xl: 32px;
            --md-shape-full: 9999px;

            --md-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --md-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --md-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3);
        }

        /* --- THEMES --- */
        .theme-blue {
            --md-sys-color-primary: #0061a4; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d1e4ff; --md-sys-color-on-primary-container: #001d36;
            --md-sys-color-secondary: #535f70; --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f7; --md-sys-color-on-secondary-container: #101c2b;
            --md-sys-color-tertiary: #6b5778; --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #f2daff; --md-sys-color-on-tertiary-container: #251431;
            --md-sys-color-error: #ba1a1a; --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6; --md-sys-color-on-error-container: #410002;
            --md-sys-color-success: #146c2e; --md-sys-color-on-success: #ffffff;
            --md-sys-color-success-container: #9ff7ae; --md-sys-color-on-success-container: #002108;
            --md-sys-color-background: #fdfcff; --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-surface: #fdfcff; --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb; --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #73777f; --md-sys-color-outline-variant: #c3c7cf;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f7f6f9;
            --md-sys-color-surface-container: #f1f0f4;
            --md-sys-color-surface-container-high: #ebeaef;
            --md-sys-color-surface-container-highest: #e0e0e6;
        }
        .dark.theme-blue {
            --md-sys-color-primary: #9ecaeb; --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497d; --md-sys-color-on-primary-container: #d1e4ff;
            --md-sys-color-secondary: #bbc7db; --md-sys-color-on-secondary: #253140;
            --md-sys-color-secondary-container: #3b4858; --md-sys-color-on-secondary-container: #d7e3f7;
            --md-sys-color-tertiary: #d6bee4; --md-sys-color-on-tertiary: #3b2948;
            --md-sys-color-tertiary-container: #523f5f; --md-sys-color-on-tertiary-container: #f2daff;
            --md-sys-color-error: #ffb4ab; --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a; --md-sys-color-on-error-container: #ffb4ab;
            --md-sys-color-success: #83da93; --md-sys-color-on-success: #003911;
            --md-sys-color-success-container: #00531a; --md-sys-color-on-success-container: #9ff7ae;
            --md-sys-color-background: #1a1c1e; --md-sys-color-on-background: #e2e2e6;
            --md-sys-color-surface: #1a1c1e; --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-variant: #42474e; --md-sys-color-on-surface-variant: #c3c7cf;
            --md-sys-color-outline: #8d9199; --md-sys-color-outline-variant: #42474e;
            --md-sys-color-surface-container-lowest: #0f0f11;
            --md-sys-color-surface-container-low: #1c1b1f;
            --md-sys-color-surface-container: #211f26;
            --md-sys-color-surface-container-high: #2b2930;
            --md-sys-color-surface-container-highest: #36343b;
        }

        .theme-green {
            --md-sys-color-primary: #146c2e; --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #9ff7ae; --md-sys-color-on-primary-container: #002108;
            --md-sys-color-secondary: #526350; --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d5e8cf; --md-sys-color-on-secondary-container: #101f10;
            --md-sys-color-tertiary: #39656b; --md-sys-color-on-tertiary: #ffffff;
            --md-sys-color-tertiary-container: #bcebf1; --md-sys-color-on-tertiary-container: #001f23;
            --md-sys-color-error: #ba1a1a; --md-sys-color-on-error: #ffffff;
            --md-sys-color-error-container: #ffdad6; --md-sys-color-on-error-container: #410002;
            --md-sys-color-success: #006d3a; --md-sys-color-on-success: #ffffff;
            --md-sys-color-success-container: #92f7b4; --md-sys-color-on-success-container: #00210e;
            --md-sys-color-background: #fcfdf6; --md-sys-color-on-background: #1a1c19;
            --md-sys-color-surface: #fcfdf6; --md-sys-color-on-surface: #1a1c19;
            --md-sys-color-surface-variant: #dee5d8; --md-sys-color-on-surface-variant: #424940;
            --md-sys-color-outline: #72796f; --md-sys-color-outline-variant: #c2c9bd;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f6f8f1;
            --md-sys-color-surface-container: #f0f2eb;
            --md-sys-color-surface-container-high: #eaede6;
            --md-sys-color-surface-container-highest: #e4e7e0;
        }
        .dark.theme-green {
            --md-sys-color-primary: #83da93; --md-sys-color-on-primary: #003911;
            --md-sys-color-primary-container: #00531a; --md-sys-color-on-primary-container: #9ff7ae;
            --md-sys-color-secondary: #b9ccb4; --md-sys-color-on-secondary: #253424;
            --md-sys-color-secondary-container: #3a4b39; --md-sys-color-on-secondary-container: #d5e8cf;
            --md-sys-color-tertiary: #a0cfd5; --md-sys-color-on-tertiary: #00363c;
            --md-sys-color-tertiary-container: #1f4d53; --md-sys-color-on-tertiary-container: #bcebf1;
            --md-sys-color-error: #ffb4ab; --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000a; --md-sys-color-on-error-container: #ffb4ab;
            --md-sys-color-success: #76da9a; --md-sys-color-on-success: #00391a;
            --md-sys-color-success-container: #005229; --md-sys-color-on-success-container: #92f7b4;
            --md-sys-color-background: #1a1c19; --md-sys-color-on-background: #e2e3dd;
            --md-sys-color-surface: #1a1c19; --md-sys-color-on-surface: #e2e3dd;
            --md-sys-color-surface-variant: #424940; --md-sys-color-on-surface-variant: #c2c9bd;
            --md-sys-color-outline: #8c9388; --md-sys-color-outline-variant: #424940;
            --md-sys-color-surface-container-lowest: #0e0f0c;
            --md-sys-color-surface-container-low: #1c1d1a;
            --md-sys-color-surface-container: #20211e;
            --md-sys-color-surface-container-high: #2a2b28;
            --md-sys-color-surface-container-highest: #353632;
        }

        /* ==========================================================================
           GLOBAL UTILITIES & ANTI-SELECTION
           ========================================================================== */
        body { 
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            margin: 0; padding: 0; overflow: hidden;
            transition: background-color 0.4s cubic-bezier(0.2, 0, 0, 1), color 0.4s ease;
            
            /* GLOBAL NATIVE APP FEEL - DISABLE TEXT SELECTION */
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Re-enable selection ONLY for input fields */
        input, textarea {
            -webkit-user-select: auto; user-select: auto;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .material-symbols-rounded { 
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; 
            display: inline-block; transition: all 0.2s ease;
        }
        .icon-outlined { font-variation-settings: 'FILL' 0; }

        /* ==========================================================================
           ANIMATIONS (M3 Emphasized Decelerate)
           ========================================================================== */
        @keyframes pageFadeIn {
            0% { opacity: 0; transform: translateY(12px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-page { animation: pageFadeIn 0.4s cubic-bezier(0.05, 0.7, 0.1, 1) forwards; }

        @keyframes slideUpSheet { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-sheet-up { animation: slideUpSheet 0.5s cubic-bezier(0.2, 0, 0, 1) forwards; }
        
        @keyframes slideDownSheet { 0% { transform: translateY(0); } 100% { transform: translateY(100%); } }
        .animate-sheet-down { animation: slideDownSheet 0.4s cubic-bezier(0.3, 0, 0.8, 0.15) forwards; }

        @keyframes slideDownAppBar { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        .animate-appbar-down { animation: slideDownAppBar 0.3s cubic-bezier(0.2, 0, 0, 1) forwards; }

        @keyframes fadeInOverlay { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-overlay-in { animation: fadeInOverlay 0.4s ease forwards; }
        
        @keyframes fabPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-fab { animation: fabPop 0.5s cubic-bezier(0.2, 0, 0, 1) forwards; }

        /* ==========================================================================
           CUSTOM COMPONENTS STYLES
           ========================================================================== */
        
        /* 1. RIPPLE EFFECT */
        .ripple-root { position: relative; overflow: hidden; cursor: pointer; }
        .ripple-span {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-animation 0.6s linear; background-color: currentColor;
            opacity: 0.15; pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        /* 2. TEXT FIELD (FIXED LABEL OVERLAP) */
        .m3-text-field {
            position: relative; background-color: var(--md-sys-color-surface-container-highest);
            border-radius: var(--md-shape-xs) var(--md-shape-xs) 0 0;
            display: flex; flex-direction: column; min-height: 56px; transition: 0.2s;
        }
        .m3-text-field:hover { background-color: var(--md-sys-color-surface-variant); }
        .m3-text-field::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background-color: var(--md-sys-color-on-surface-variant); transition: 0.2s;
        }
        .m3-text-field:focus-within::after { height: 2px; background-color: var(--md-sys-color-primary); }
        .m3-input {
            width: 100%; border: none; outline: none; background: transparent;
            padding: 24px 16px 8px 16px; font-size: 16px;
            color: var(--md-sys-color-on-surface); font-family: inherit;
        }
        .m3-input.has-icon { padding-left: 52px; }
        .m3-label {
            position: absolute; left: 16px; top: 16px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant); font-size: 16px;
            transition: 0.2s cubic-bezier(0.2, 0, 0, 1); transform-origin: left top;
        }
        .m3-input.has-icon ~ .m3-label { left: 52px; }
        
        /* THE FIX: Check for .has-value class added via React instead of relying solely on CSS pseudo */
        .m3-input:focus ~ .m3-label, .m3-input.has-value ~ .m3-label {
            transform: translateY(-8px) scale(0.75);
        }
        .m3-input:focus ~ .m3-label { color: var(--md-sys-color-primary); }
        
        .m3-icon {
            position: absolute; left: 16px; top: 16px; pointer-events: none;
            color: var(--md-sys-color-on-surface-variant);
        }
        .m3-input:focus ~ .m3-icon { color: var(--md-sys-color-on-surface); }

        /* 3. SWITCH (M3) */
        .m3-switch-track {
            width: 52px; height: 32px; border-radius: 16px; border: 2px solid var(--md-sys-color-outline);
            background-color: var(--md-sys-color-surface-container-highest); display: flex; align-items: center; padding: 2px;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); cursor: pointer;
        }
        .m3-switch-track.active { background-color: var(--md-sys-color-primary); border-color: var(--md-sys-color-primary); }
        .m3-switch-thumb {
            width: 16px; height: 16px; border-radius: 50%; background-color: var(--md-sys-color-outline);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); display: flex; justify-content: center; align-items: center;
        }
        .m3-switch-track.active .m3-switch-thumb {
            width: 24px; height: 24px; background-color: var(--md-sys-color-on-primary); transform: translateX(20px);
        }
        .m3-switch-icon { font-size: 16px !important; opacity: 0; color: var(--md-sys-color-on-primary-container); transition: 0.2s; }
        .m3-switch-track.active .m3-switch-icon { opacity: 1; }

        /* 4. SLIDER (M3) */
        .m3-slider {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
            background: var(--md-sys-color-surface-variant); outline: none;
        }
        .m3-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--md-sys-color-primary); cursor: pointer;
            box-shadow: 0 0 0 4px var(--md-sys-color-surface);
            transition: 0.2s;
        }
        .m3-slider::-webkit-slider-thumb:active { box-shadow: 0 0 0 10px rgba(0, 97, 164, 0.2); }

    </style>
</head>
<body class="theme-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

        // ==========================================================================
        // UTILITIES & DATA
        // ==========================================================================
        const formatRupiah = (angka) => {
            if (!angka && angka !== 0) return '0';
            return new Intl.NumberFormat('id-ID').format(angka);
        };
        const getRawNumber = (str) => parseInt(str.toString().replace(/[^0-9]/g, ''), 10) || 0;
        
        const formatDateLong = (isoString) => {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Intl.DateTimeFormat('id-ID', options).format(new Date(isoString));
        };
        const formatDateShort = (isoString) => {
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit' }).format(new Date(isoString));
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

        // Dummy Data Generator 
        const generateDummyData = () => {
            const data = [];
            const types = ['Servis', 'Sparepart', 'Aksesoris'];
            const statuses = ['Selesai', 'Selesai', 'Selesai', 'Proses', 'Batal'];
            const names = ['Ganti LCD Samsung', 'Softcase iPhone 13', 'Baterai Xiaomi', 'Tempered Glass', 'Servis IC Power', 'Kabel Data Type-C'];
            
            for(let i=0; i<25; i++) {
                const date = new Date();
                date.setDate(date.getDate() - Math.floor(Math.random() * 14)); 
                const type = types[Math.floor(Math.random() * types.length)];
                const modal = Math.floor(Math.random() * 10) * 15000;
                const jual = modal + (Math.floor(Math.random() * 5 + 1) * 20000);
                const jumlah = type === 'Servis' ? 1 : Math.floor(Math.random() * 4) + 1;
                
                data.push({
                    id: generateId() + i,
                    tanggal: date.toISOString(),
                    jenis: type,
                    nama: names[Math.floor(Math.random() * names.length)],
                    pelanggan: `Pelanggan ${Math.floor(Math.random() * 100)}`,
                    modal: type === 'Servis' ? (Math.random() > 0.5 ? modal : 0) : modal,
                    jual: jual,
                    jumlah: jumlah,
                    laba: type === 'Servis' ? (jual - (Math.random() > 0.5 ? modal : 0)) * jumlah : (jual - modal) * jumlah,
                    status: statuses[Math.floor(Math.random() * statuses.length)],
                    catatan: 'Data contoh otomatis.'
                });
            }
            return data.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
        };

        // ==========================================================================
        // CONTEXT: GLOBAL STATE
        // ==========================================================================
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [transactions, setTransactions] = useState([]);
            const [settings, setSettings] = useState({
                theme: 'blue',
                isDark: false,
                storeName: 'Zona Poncell',
                ownerName: 'Farhan', // Diubah sesuai request
                hasStarted: false 
            });
            const [snackbars, setSnackbars] = useState([]);

            // Load Data
            useEffect(() => {
                const savedDb = localStorage.getItem('zp_m3_data');
                if (savedDb) {
                    // Update legacy data yg ga ada jumlah
                    const parsed = JSON.parse(savedDb).map(item => ({...item, jumlah: item.jumlah || 1}));
                    setTransactions(parsed);
                } else {
                    const dummy = generateDummyData();
                    setTransactions(dummy);
                    localStorage.setItem('zp_m3_data', JSON.stringify(dummy));
                }

                const savedSettings = localStorage.getItem('zp_m3_config');
                if (savedSettings) setSettings(prev => ({...prev, ...JSON.parse(savedSettings)}));
            }, []);

            // Save Data
            useEffect(() => {
                if(transactions.length > 0) localStorage.setItem('zp_m3_data', JSON.stringify(transactions));
            }, [transactions]);

            // Apply Theme
            useEffect(() => {
                localStorage.setItem('zp_m3_config', JSON.stringify(settings));
                const body = document.body;
                body.className = ''; 
                body.classList.add(`theme-${settings.theme}`);
                if (settings.isDark) body.classList.add('dark');

                setTimeout(() => {
                    const surfaceColor = getComputedStyle(document.body).getPropertyValue('--md-sys-color-surface').trim();
                    document.getElementById('meta-theme-color').content = surfaceColor;
                }, 100);
            }, [settings.theme, settings.isDark]);

            const showSnackbar = (message) => {
                const id = Date.now();
                setSnackbars(prev => [...prev, { id, message }]);
                setTimeout(() => setSnackbars(prev => prev.filter(s => s.id !== id)), 4000);
            };

            return (
                <AppContext.Provider value={{ transactions, setTransactions, settings, setSettings, snackbars, showSnackbar }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // ==========================================================================
        // M3 UI COMPONENTS
        // ==========================================================================
        
        const Ripple = ({ children, className = '', onClick, onPointerDown, onPointerUp, onPointerMove, onPointerLeave, style }) => {
            const [ripples, setRipples] = useState([]);
            
            const addRipple = (e) => {
                if (onPointerDown) onPointerDown(e);
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const size = Math.max(rect.width, rect.height);
                setRipples(prev => [...prev, { x, y, size, id: Date.now() }]);
            };
            const cleanUp = (e) => {
                if (onPointerUp && e.type === 'pointerup') onPointerUp(e);
                if (onPointerLeave && e.type === 'pointerleave') onPointerLeave(e);
                setTimeout(() => setRipples([]), 600); 
            };
            const handleMove = (e) => {
                if(onPointerMove) onPointerMove(e);
            }

            return (
                <div className={`ripple-root ${className}`} style={style}
                     onPointerDown={addRipple} onPointerUp={cleanUp} onPointerLeave={cleanUp} onPointerMove={handleMove} onClick={onClick}>
                    {children}
                    {ripples.map(r => (
                        <span key={r.id} className="ripple-span"
                              style={{ top: r.y - r.size/2, left: r.x - r.size/2, width: r.size, height: r.size }} />
                    ))}
                </div>
            );
        };

        const Button = ({ variant = 'filled', children, icon, className='', onClick, fullWidth }) => {
            let colors = '';
            if (variant === 'filled') colors = 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)]';
            if (variant === 'tonal') colors = 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)]';
            if (variant === 'outlined') colors = 'border border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-primary)]';
            if (variant === 'text') colors = 'text-[var(--md-sys-color-primary)] bg-transparent';
            if (variant === 'error') colors = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            return (
                <Ripple className={`h-12 px-6 rounded-full flex items-center justify-center font-medium text-sm transition-shadow ${fullWidth ? 'w-full' : ''} ${colors} ${className}`} onClick={onClick}>
                    {icon && <span className="material-symbols-rounded mr-2 text-[20px]">{icon}</span>}
                    {children}
                </Ripple>
            );
        };

        const TextField = ({ label, value, onChange, icon, type="text", inputMode="text", multiline, prefix }) => {
            // Fix input bug: check string length
            const hasVal = value !== null && value !== undefined && value.toString().length > 0;
            return (
                <div className="m3-text-field">
                    {icon && <span className="material-symbols-rounded m3-icon icon-outlined">{icon}</span>}
                    {multiline ? (
                        <textarea 
                            className={`m3-input no-scrollbar resize-none ${icon ? 'has-icon' : ''} ${hasVal ? 'has-value' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)} placeholder=" " rows="3"
                        />
                    ) : (
                        <input 
                            type={type} inputMode={inputMode}
                            className={`m3-input ${icon ? 'has-icon' : ''} ${hasVal ? 'has-value' : ''}`}
                            value={value} onChange={e => onChange(e.target.value)} placeholder=" "
                        />
                    )}
                    <label className="m3-label">{label}</label>
                    {prefix && value && (
                        <span className="absolute right-4 top-[24px] text-sm text-[var(--md-sys-color-on-surface-variant)]">{prefix}</span>
                    )}
                </div>
            );
        };

        const BottomSheet = ({ isOpen, onClose, title, children }) => {
            const [isClosing, setIsClosing] = useState(false);
            useEffect(() => { if (isOpen) setIsClosing(false); }, [isOpen]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(() => { onClose(); setIsClosing(false); }, 350); 
            };

            if (!isOpen && !isClosing) return null;

            return (
                <div className="fixed inset-0 z-[100] flex flex-col justify-end">
                    <div className={`absolute inset-0 bg-black/50 ${isClosing ? 'opacity-0' : 'animate-overlay-in'} transition-opacity duration-300`} onClick={handleClose} />
                    <div className={`relative w-full max-h-[92vh] flex flex-col rounded-t-[var(--md-shape-xl)] bg-[var(--md-sys-color-surface-container-low)] shadow-2xl ${isClosing ? 'animate-sheet-down' : 'animate-sheet-up'}`}
                         style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        <div className="w-full flex justify-center pt-4 pb-2" onClick={handleClose}>
                            <div className="w-8 h-1.5 rounded-full bg-[var(--md-sys-color-outline-variant)] opacity-50" />
                        </div>
                        <div className="px-6 pb-2 flex justify-between items-center shrink-0">
                            <h2 className="text-[22px] font-medium text-[var(--md-sys-color-on-surface)]">{title}</h2>
                            <button onClick={handleClose} className="w-8 h-8 rounded-full flex items-center justify-center text-[var(--md-sys-color-on-surface-variant)] bg-[var(--md-sys-color-surface-container-highest)]">
                                <span className="material-symbols-rounded text-xl">close</span>
                            </button>
                        </div>
                        <div className="px-6 pb-6 overflow-y-auto no-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };

        const Switch = ({ checked, onChange }) => (
            <div className={`m3-switch-track ${checked ? 'active' : ''}`} onClick={() => onChange(!checked)}>
                <div className="m3-switch-thumb">
                    <span className="material-symbols-rounded m3-switch-icon">check</span>
                </div>
            </div>
        );

        const SnackbarContainer = () => {
            const { snackbars } = useContext(AppContext);
            return (
                <div className="fixed bottom-[110px] left-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                    {snackbars.map(snack => (
                        <div key={snack.id} className="bg-[var(--md-sys-color-on-surface)] text-[var(--md-sys-color-surface)] px-4 py-3 rounded-[var(--md-shape-sm)] shadow-lg animate-page flex items-center justify-between">
                            <span className="text-sm font-medium">{snack.message}</span>
                        </div>
                    ))}
                </div>
            );
        };

        // ==========================================================================
        // APP SCREENS
        // ==========================================================================

        // --- SPLASH ---
        const SplashScreen = () => {
            const { settings, setSettings } = useContext(AppContext);
            const startApp = async () => {
                try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (e) {}
                setSettings(s => ({...s, hasStarted: true}));
            };
            return (
                <div className="h-[100dvh] w-full flex flex-col items-center justify-center bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] p-6 relative">
                    <div className="w-28 h-28 rounded-[36px] bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] flex items-center justify-center mb-8 shadow-2xl animate-fab">
                        <span className="material-symbols-rounded text-[56px]">smartphone</span>
                    </div>
                    <h1 className="text-4xl font-semibold mb-2 text-center animate-page" style={{animationDelay: '0.1s'}}>Zona Poncell</h1>
                    <p className="text-[var(--md-sys-color-primary-container)] opacity-90 mb-12 text-center text-lg animate-page" style={{animationDelay: '0.2s'}}>Sistem Manajemen Konter Cerdas</p>
                    
                    <div className="absolute bottom-16 w-full px-6 flex justify-center animate-page" style={{animationDelay: '0.4s'}}>
                        <Ripple className="w-full max-w-xs h-14 bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] rounded-full flex items-center justify-center font-medium text-lg shadow-lg" onClick={startApp}>
                            Buka Sistem
                            <span className="material-symbols-rounded ml-3">login</span>
                        </Ripple>
                    </div>
                </div>
            );
        };

        // --- TAB 1: DASBOR (Scrollable) ---
        const TabDasbor = () => {
            const { transactions, settings } = useContext(AppContext);
            const cm = new Date().getMonth(); const cy = new Date().getFullYear();
            const pm = cm === 0 ? 11 : cm - 1; const py = cm === 0 ? cy - 1 : cy;
            
            const monthData = transactions.filter(d => new Date(d.tanggal).getMonth() === cm && new Date(d.tanggal).getFullYear() === cy);
            const prevMonthData = transactions.filter(d => new Date(d.tanggal).getMonth() === pm && new Date(d.tanggal).getFullYear() === py);

            const laba = monthData.filter(d => d.status === 'Selesai').reduce((s, i) => s + i.laba, 0);
            const omset = monthData.filter(d => d.status === 'Selesai').reduce((s, i) => s + (i.jual * i.jumlah), 0);
            
            const labaPrev = prevMonthData.filter(d => d.status === 'Selesai').reduce((s, i) => s + i.laba, 0);
            const growth = labaPrev === 0 ? 100 : Math.round(((laba - labaPrev) / labaPrev) * 100);
            
            const activeJobs = transactions.filter(d => d.status === 'Proses').length;
            const hour = new Date().getHours();
            const greeting = hour < 11 ? 'Selamat Pagi' : hour < 15 ? 'Selamat Siang' : hour < 19 ? 'Selamat Sore' : 'Selamat Malam';

            return (
                <div className="p-4 space-y-6 animate-page h-full overflow-y-auto no-scrollbar pb-32" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    {/* Header */}
                    <div className="flex justify-between items-center mb-2">
                        <div>
                            <p className="text-sm text-[var(--md-sys-color-on-surface-variant)]">{greeting},</p>
                            <h1 className="text-3xl font-semibold text-[var(--md-sys-color-on-surface)] tracking-tight">{settings.ownerName}</h1>
                        </div>
                        <div className="w-14 h-14 rounded-full bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] flex items-center justify-center shadow-sm border-2 border-[var(--md-sys-color-surface)]">
                            <span className="material-symbols-rounded text-2xl">account_circle</span>
                        </div>
                    </div>

                    {/* Main Card (Hero) */}
                    <div className="p-6 rounded-[var(--md-shape-2xl)] bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] relative overflow-hidden shadow-xl">
                        <div className="absolute top-0 right-0 w-40 h-40 bg-white opacity-10 rounded-bl-full transform translate-x-10 -translate-y-10"></div>
                        <div className="absolute bottom-0 left-0 w-24 h-24 bg-black opacity-10 rounded-tr-full transform -translate-x-5 translate-y-5"></div>
                        
                        <div className="relative z-10">
                            <div className="flex justify-between items-start mb-1">
                                <p className="text-sm opacity-90 font-medium tracking-wide">Laba Bersih Bulan Ini</p>
                                <div className={`flex items-center text-xs font-bold px-2 py-1 rounded-full ${growth >= 0 ? 'bg-white/20' : 'bg-red-500/30'}`}>
                                    <span className="material-symbols-rounded text-[14px] mr-1">{growth >= 0 ? 'trending_up' : 'trending_down'}</span>
                                    {Math.abs(growth)}%
                                </div>
                            </div>
                            <h2 className="text-[38px] font-semibold tracking-tighter mb-6">Rp{formatRupiah(laba)}</h2>
                            
                            <div className="flex gap-3">
                                <div className="bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] px-4 py-3 rounded-[var(--md-shape-xl)] flex-1 flex flex-col justify-center shadow-sm">
                                    <span className="text-[10px] uppercase font-bold opacity-70 mb-0.5">Total Omset</span>
                                    <span className="font-semibold text-sm">Rp{formatRupiah(omset)}</span>
                                </div>
                                <div className="bg-[var(--md-sys-color-on-primary)] text-[var(--md-sys-color-primary)] px-4 py-3 rounded-[var(--md-shape-xl)] flex-1 flex flex-col justify-center shadow-sm">
                                    <span className="text-[10px] uppercase font-bold opacity-70 mb-0.5">Antrian Aktif</span>
                                    <span className="font-semibold text-sm">{activeJobs} Pekerjaan</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Pintasan Cepat */}
                    <div>
                        <h3 className="text-sm font-semibold text-[var(--md-sys-color-on-surface-variant)] uppercase tracking-wider mb-3 ml-1">Kinerja Kategori</h3>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="p-4 rounded-[var(--md-shape-xl)] bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-[var(--md-sys-color-on-secondary-container)] text-[var(--md-sys-color-secondary-container)] flex items-center justify-center shrink-0">
                                    <span className="material-symbols-rounded text-[20px]">build_circle</span>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-sm">Servis</h3>
                                    <p className="text-xs opacity-80">{monthData.filter(d=>d.jenis==='Servis').length} Selesai</p>
                                </div>
                            </div>
                            <div className="p-4 rounded-[var(--md-shape-xl)] bg-[var(--md-sys-color-tertiary-container)] text-[var(--md-sys-color-on-tertiary-container)] flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-[var(--md-sys-color-on-tertiary-container)] text-[var(--md-sys-color-tertiary-container)] flex items-center justify-center shrink-0">
                                    <span className="material-symbols-rounded text-[20px]">inventory_2</span>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-sm">Barang</h3>
                                    <p className="text-xs opacity-80">{monthData.filter(d=>d.jenis!=='Servis').reduce((s,i)=>s+i.jumlah,0)} Terjual</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Recent Activity */}
                    <div>
                        <div className="flex justify-between items-center mb-3 ml-1">
                            <h3 className="text-sm font-semibold text-[var(--md-sys-color-on-surface-variant)] uppercase tracking-wider">Aktivitas Terakhir</h3>
                        </div>
                        <div className="space-y-3">
                            {transactions.slice(0, 5).map((item, index) => (
                                <ActivityItem key={item.id} item={item} delay={index * 0.05} />
                            ))}
                            {transactions.length === 0 && (
                                <p className="text-center text-[var(--md-sys-color-on-surface-variant)] py-6 bg-[var(--md-sys-color-surface-container-low)] rounded-[var(--md-shape-xl)]">Belum ada transaksi</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- HELPER: ACTIVITY ITEM (With Long Press Logic) ---
        const ActivityItem = ({ item, delay = 0, onClick, selectable, selected, onSelect }) => {
            const isServis = item.jenis === 'Servis';
            const icon = isServis ? 'build' : item.jenis === 'Sparepart' ? 'memory' : 'headphones';
            
            let statusColor = 'bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)]';
            if (item.status === 'Selesai') statusColor = 'bg-[var(--md-sys-color-success-container)] text-[var(--md-sys-color-on-success-container)]';
            if (item.status === 'Proses') statusColor = 'bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)]';
            if (item.status === 'Batal') statusColor = 'bg-[var(--md-sys-color-error-container)] text-[var(--md-sys-color-on-error-container)]';

            // Long Press Logic
            const timerRef = useRef(null);
            const isDragging = useRef(false);

            const handlePointerDown = (e) => {
                if(e.button !== 0 && e.pointerType !== 'touch') return; // Ensure left click or touch
                isDragging.current = false;
                timerRef.current = setTimeout(() => {
                    if(!isDragging.current && onSelect && !selectable) {
                        onSelect();
                        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50); // Haptic feedback
                    }
                }, 500);
            };

            const handlePointerMove = () => { isDragging.current = true; clearTimeout(timerRef.current); };
            const handlePointerUp = () => { clearTimeout(timerRef.current); };
            
            const handleClick = () => {
                if(selectable && onSelect) onSelect();
                else if(!selectable && onClick) onClick();
            };

            return (
                <div onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} onClick={handleClick}
                     className={`flex items-center gap-4 p-4 rounded-[var(--md-shape-xl)] shadow-sm ripple-root transition-all duration-200
                     ${selected ? 'bg-[var(--md-sys-color-secondary-container)] scale-[0.98]' : 'bg-[var(--md-sys-color-surface-container-low)]'}
                     `} 
                     style={{ animation: delay !== null ? `staggerFade 0.4s ${delay}s ease forwards` : 'none', opacity: delay !== null ? 0 : 1 }}>
                    
                    {selectable ? (
                        <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 transition-colors ${selected ? 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)]' : 'bg-[var(--md-sys-color-surface-variant)] text-[var(--md-sys-color-on-surface-variant)]'}`}>
                            <span className="material-symbols-rounded">{selected ? 'check' : 'circle'}</span>
                        </div>
                    ) : (
                        <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${statusColor}`}>
                            <span className="material-symbols-rounded">{icon}</span>
                        </div>
                    )}
                    
                    <div className="flex-1 min-w-0">
                        <h4 className="font-semibold text-[var(--md-sys-color-on-surface)] truncate text-base">{item.nama}</h4>
                        <p className="text-[13px] text-[var(--md-sys-color-on-surface-variant)] truncate">{formatDateShort(item.tanggal)} • {item.pelanggan}</p>
                    </div>
                    <div className="text-right shrink-0">
                        <p className="font-semibold text-[var(--md-sys-color-primary)] text-[15px] mb-1">Rp{formatRupiah(item.laba)}</p>
                        <div className="flex items-center justify-end gap-1">
                            {item.jumlah > 1 && <span className="text-[10px] font-bold bg-[var(--md-sys-color-surface-variant)] px-1.5 py-0.5 rounded text-[var(--md-sys-color-on-surface-variant)]">x{item.jumlah}</span>}
                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${statusColor}`}>{item.status}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TAB 2: RIWAYAT (Multi-Select Enabled) ---
        const TabRiwayat = () => {
            const { transactions, setTransactions, showSnackbar } = useContext(AppContext);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            const [selectedItem, setSelectedItem] = useState(null);
            
            // Selection Mode State
            const [selectedIds, setSelectedIds] = useState([]);
            const isSelectionMode = selectedIds.length > 0;

            const filteredData = useMemo(() => {
                return transactions.filter(t => {
                    const matchSearch = t.nama.toLowerCase().includes(search.toLowerCase()) || t.pelanggan.toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'Semua' || t.jenis === filterType;
                    return matchSearch && matchFilter;
                });
            }, [transactions, search, filterType]);

            const toggleSelection = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const handleBulkDelete = () => {
                if(confirm(`Hapus ${selectedIds.length} transaksi?`)) {
                    setTransactions(prev => prev.filter(t => !selectedIds.includes(t.id)));
                    setSelectedIds([]);
                    showSnackbar(`${selectedIds.length} item dihapus`);
                }
            };

            const handleBulkCopy = () => {
                const toCopy = transactions.filter(t => selectedIds.includes(t.id));
                const newItems = toCopy.map(item => ({ ...item, id: generateId(), tanggal: new Date().toISOString(), status: 'Proses' }));
                setTransactions(prev => [...newItems, ...prev]);
                setSelectedIds([]);
                showSnackbar(`${newItems.length} item diduplikasi`);
            };

            return (
                <div className="flex flex-col h-full animate-page relative" style={{ paddingTop: 'calc(16px + var(--sa-top))' }}>
                    
                    {/* Contextual App Bar (Selection Mode) */}
                    {isSelectionMode && (
                        <div className="absolute top-0 left-0 right-0 z-50 bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] h-16 flex items-center justify-between px-4 animate-appbar-down shadow-md" style={{ paddingTop: 'var(--sa-top)', height: 'calc(64px + var(--sa-top))' }}>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSelectedIds([])} className="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/10 transition-colors">
                                    <span className="material-symbols-rounded">close</span>
                                </button>
                                <span className="text-xl font-medium">{selectedIds.length} Terpilih</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleBulkCopy} className="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/10 transition-colors">
                                    <span className="material-symbols-rounded">content_copy</span>
                                </button>
                                <button onClick={handleBulkDelete} className="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/10 transition-colors text-[var(--md-sys-color-error)]">
                                    <span className="material-symbols-rounded">delete</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Standard Header */}
                    <div className="px-4 space-y-4 pb-2 z-10 bg-[var(--md-sys-color-background)]">
                        <h1 className="text-3xl font-semibold text-[var(--md-sys-color-on-surface)] tracking-tight">Riwayat</h1>
                        
                        <div className="flex items-center h-14 bg-[var(--md-sys-color-surface-container-high)] rounded-full px-4 text-[var(--md-sys-color-on-surface)] shadow-sm focus-within:ring-2 ring-[var(--md-sys-color-primary)] transition-all">
                            <span className="material-symbols-rounded mr-3 opacity-70">search</span>
                            <input type="text" placeholder="Cari nama, pelanggan..." value={search} onChange={e => setSearch(e.target.value)}
                                className="bg-transparent border-none outline-none flex-1 text-base placeholder:text-[var(--md-sys-color-on-surface-variant)]" />
                            {search && <span className="material-symbols-rounded cursor-pointer opacity-70 ml-2" onClick={() => setSearch('')}>close</span>}
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {['Semua', 'Servis', 'Sparepart', 'Aksesoris'].map(f => (
                                <button key={f} onClick={() => setFilterType(f)}
                                    className={`px-5 h-10 rounded-full text-sm font-semibold border transition-all shrink-0 ${
                                        filterType === f 
                                        ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] border-transparent shadow-sm' 
                                        : 'border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)] bg-transparent'
                                    }`}>{f}</button>
                            ))}
                        </div>
                    </div>

                    {/* List Area */}
                    <div className="flex-1 overflow-y-auto px-4 pb-32 space-y-3 pt-2">
                        {filteredData.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-24 text-[var(--md-sys-color-on-surface-variant)]">
                                <span className="material-symbols-rounded text-6xl mb-4 opacity-40">manage_search</span>
                                <p className="font-medium text-lg opacity-60">Tidak ada data</p>
                                <p className="text-sm opacity-50">Coba ubah kata kunci pencarian.</p>
                            </div>
                        ) : (
                            filteredData.map((item, index) => (
                                <ActivityItem key={item.id} item={item} delay={search || filterType!=='Semua' ? null : index * 0.05} 
                                              selectable={isSelectionMode} 
                                              selected={selectedIds.includes(item.id)}
                                              onSelect={() => toggleSelection(item.id)}
                                              onClick={() => setSelectedItem(item)} />
                            ))
                        )}
                    </div>

                    <DetailSheet item={selectedItem} onClose={() => setSelectedItem(null)} />
                </div>
            );
        };

        // --- TAB 3: ANALISIS MENDALAM ---
        const TabAnalisis = () => {
            const { transactions, settings } = useContext(AppContext);
            const refLine = useRef(null); const refPie = useRef(null); const refBar = useRef(null);
            const inst = useRef({ line: null, pie: null, bar: null });

            const getColors = useCallback(() => {
                const style = getComputedStyle(document.body);
                return {
                    primary: style.getPropertyValue('--md-sys-color-primary').trim(),
                    tertiary: style.getPropertyValue('--md-sys-color-tertiary').trim(),
                    error: style.getPropertyValue('--md-sys-color-error').trim(),
                    text: style.getPropertyValue('--md-sys-color-on-surface-variant').trim(),
                    grid: style.getPropertyValue('--md-sys-color-outline-variant').trim(),
                    surface: style.getPropertyValue('--md-sys-color-surface-container').trim()
                };
            }, [settings.theme, settings.isDark]);

            useEffect(() => {
                if (transactions.length === 0) return;
                const c = getColors();
                Object.values(inst.current).forEach(chart => chart && chart.destroy());

                // 1. Line Chart (7 Days Revenue)
                const last7 = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d.toISOString().split('T')[0]; });
                const laba7 = last7.map(date => transactions.filter(t => t.tanggal.startsWith(date) && t.status === 'Selesai').reduce((s,i) => s + i.laba, 0));
                
                inst.current.line = new Chart(refLine.current.getContext('2d'), {
                    type: 'line',
                    data: { labels: last7.map(d => new Date(d).toLocaleDateString('id-ID', { weekday:'short'})), datasets: [{ label: 'Laba Bersih', data: laba7, borderColor: c.primary, backgroundColor: `${c.primary}20`, fill: true, tension: 0.5, pointBackgroundColor: c.primary, borderWidth: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: c.text } }, y: { grid: { color: c.grid, borderDash: [5,5] }, ticks: { color: c.text, callback: v => `${v/1000}k` } } } }
                });

                // 2. Doughnut (Category)
                const counts = ['Servis', 'Sparepart', 'Aksesoris'].map(j => transactions.filter(t => t.jenis === j && t.status === 'Selesai').length);
                inst.current.pie = new Chart(refPie.current.getContext('2d'), {
                    type: 'doughnut',
                    data: { labels: ['Servis', 'Sparepart', 'Aks'], datasets: [{ data: counts, backgroundColor: [c.primary, c.tertiary, c.error], borderWidth: 0, hoverOffset: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { color: c.text, font: {family: 'Readex Pro', weight: '500'} } } } }
                });

                // 3. Horizontal Bar (Top Items by Quantity)
                const itemsMap = {};
                transactions.filter(t=>t.status==='Selesai' && t.jenis!=='Servis').forEach(t => { itemsMap[t.nama] = (itemsMap[t.nama] || 0) + t.jumlah; });
                const topItems = Object.entries(itemsMap).sort((a,b)=>b[1]-a[1]).slice(0, 4);

                if(topItems.length > 0 && refBar.current) {
                    inst.current.bar = new Chart(refBar.current.getContext('2d'), {
                        type: 'bar',
                        data: { labels: topItems.map(i=>i[0]), datasets: [{ data: topItems.map(i=>i[1]), backgroundColor: c.tertiary, borderRadius: 6 }] },
                        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x: { display: false }, y: { grid: {display:false}, ticks: {color: c.text, font: {family:'Readex Pro'}} } } }
                    });
                }

                return () => Object.values(inst.current).forEach(chart => chart && chart.destroy());
            }, [transactions, settings.theme, settings.isDark, getColors]);

            const totalSelesai = transactions.filter(t => t.status === 'Selesai');
            const totalOmset = totalSelesai.reduce((s,i) => s + (i.jual * i.jumlah), 0);
            const totalLaba = totalSelesai.reduce((s,i) => s + i.laba, 0);
            const margin = totalOmset > 0 ? ((totalLaba / totalOmset) * 100).toFixed(1) : 0;

            return (

                        </div>

                            <p className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Pekerjaan</p>

                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-semibold text-[var(--md-sys-color-on-surface)]">Tren Laba (7 Hari)</h3>
                            <span className="material-symbols-rounded text-[var(--md-sys-color-on-surface-variant)] text-sm">show_chart</span>
                        </div>
                        <div className="h-[200px] relative">
                            {transactions.length > 0 ? <canvas ref={refLine}></canvas> : <p className="text-center mt-16 text-[var(--md-sys-color-on-surface-variant)]">Data tidak cukup</p>}
                        </div>

                    <div className="bg-[var(--md-sys-color-surface-container-low)] p-5 rounded-[var(--md-shape-2xl)] shadow-sm border border-[var(--md-sys-color-outline-variant)]">

                        </div>
                    </div>

        // --- TAB 4: SETING ---
        const TabSeting = () => {
            const { settings, setSettings, transactions, setTransactions, showSnackbar } = useContext(AppContext);

            const themes = [

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));

                showSnackbar('Data berhasil di-backup');
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if(Array.isArray(json)) { setTransactions(json); showSnackbar('Data berhasil dipulihkan'); }

                reader.readAsText(file);

                            <div className="text-left"><p className="font-semibold">Hapus Semua</p><p className="text-xs opacity-80">Reset pabrik aplikasi</p></div>

            const [catatan, setCatatan] = useState('');

            useEffect(() => {
                if (isOpen) { setJenis('Servis'); setNama(''); setPelanggan(''); setModalStr('0'); setJualStr('0'); setJumlah(1); setCatatan(''); }
            }, [isOpen]);

            const handleSave = () => {
                if(!nama.trim()) { showSnackbar('Nama barang/servis wajib diisi!'); return; }
                
                const m = getRawNumber(modalStr); const j = getRawNumber(jualStr);
                const newData = {
                    id: generateId(), tanggal: new Date().toISOString(),
                    jenis, nama: nama.trim(), pelanggan: pelanggan.trim() || 'Umum',
                    modal: m, jual: j, jumlah: jumlah,
                    laba: (j - m) * jumlah, status: 'Proses', catatan: catatan.trim()
                };

                setTransactions(prev => [newData, ...prev]); showSnackbar('Transaksi dicatat'); onClose();
            };

            const laba = (getRawNumber(jualStr) - getRawNumber(modalStr)) * jumlah;

            return (
                <BottomSheet isOpen={isOpen} onClose={onClose} title="Catat Transaksi">

                                    className={`flex-1 text-sm font-semibold rounded-full transition-all duration-300 ${

                                    }`}>{j}</button>

            if (!item) return null;

            const updateStatus = (newStatus) => {
                setTransactions(prev => prev.map(t => t.id === item.id ? {...t, status: newStatus} : t));
                showSnackbar(`Status menjadi ${newStatus}`); onClose();
            };

            const handleDelete = () => {
                if(confirm('Hapus transaksi ini secara permanen?')) {
                    setTransactions(prev => prev.filter(t => t.id !== item.id));
                    showSnackbar('Transaksi dihapus'); onClose();
                }

            let statusColor = 'text-[var(--md-sys-color-on-surface-variant)]';
            if (item.status === 'Selesai') statusColor = 'text-[var(--md-sys-color-success)]';
            if (item.status === 'Proses') statusColor = 'text-[var(--md-sys-color-primary)]';

                                <span className="text-sm font-medium text-[var(--md-sys-color-on-surface-variant)]">Kuantitas</span>
                                <span className="font-bold text-[var(--md-sys-color-on-surface)]">{item.jumlah}x</span>
                            </div>

                            </div>

                        <Ripple onClick={() => setIsAddOpen(true)} className="m3-fab flex items-center h-16 px-6 cursor-pointer bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] shadow-[var(--md-elevation-3)] rounded-[20px] hover:shadow-[var(--md-elevation-4)] hover:-translate-y-1 transition-all">
                            <span className="material-symbols-rounded mr-3 text-[26px]">edit_document</span>
                            <span className="font-semibold text-base">Catat Baru</span>
                        </Ripple>
                    </div>

                    {/* Navigation Bar */}
                    <nav className="absolute bottom-0 w-full h-[88px] bg-[var(--md-sys-color-surface-container)] flex justify-around items-center px-2 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]" style={{ paddingBottom: 'var(--sa-bottom)' }}>
                        {tabs.map(t => {
                            const active = activeTab === t.id;
                            return (
                                <Ripple key={t.id} onClick={() => setActiveTab(t.id)} className="flex-1 h-full flex flex-col items-center justify-center pt-2 pb-1 relative group cursor-pointer">
                                    <div className={`w-16 h-8 rounded-full flex items-center justify-center transition-all duration-300 ${active ? 'bg-[var(--md-sys-color-secondary-container)] text-[var(--md-sys-color-on-secondary-container)] scale-110' : 'text-[var(--md-sys-color-on-surface-variant)] scale-100 group-hover:bg-[var(--md-sys-color-surface-variant)]'}`}>
                                        <span className={`material-symbols-rounded text-2xl transition-all duration-300 ${active ? '' : 'icon-outlined'}`}>{t.icon}</span>
                                    </div>
                                    <span className={`text-[12px] font-bold mt-1.5 transition-colors tracking-wide ${active ? 'text-[var(--md-sys-color-on-surface)]' : 'text-[var(--md-sys-color-on-surface-variant)]'}`}>{t.label}</span>
                                </Ripple>
                            );
                        })}
                    </nav>

                    <AddTransactionSheet isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} />
                    <SnackbarContainer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>
